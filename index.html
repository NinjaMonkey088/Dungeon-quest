// Point-buy cost to RAISE a stat from one value to the next. Per-step cost, only applies to
// character creation (level-up uses flat 1-point-per-+1). 18 is the creation cap.
//   8→9..12→13: 1 pt each step
//   13→14, 14→15: 2 pts each step
//   15→16: 3 pts
//   16→17: 4 pts
//   17→18: 5 pts
const POINT_COST_STEP = (fromScore) => {
  if (fromScore < 8) return 0;
  if (fromScore < 13) return 1;
  if (fromScore < 15) return 2;
  if (fromScore === 15) return 3;
  if (fromScore === 16) return 4;
  if (fromScore === 17) return 5;
  return Infinity; // 18 is the cap at creation
};
// Total cost to bring a stat from 8 to `score`.
const POINT_COST_TOTAL = (score) => {
  let cost = 0;
  for (let s = 8; s < score; s++) cost += POINT_COST_STEP(s);
  return cost;
};

const DICE_PROGRESSION = (() => {
  const d = (c,s) => ({ count:c, size:s, label:c>1?`${c}D${s}`:`D${s}` });
  const p=[];
  for (let n=1; n<=5; n++) for (const s of [4,6,8,10,12,20]) p.push(d(n,s));
  return p.sort((a, b) => (a.count * a.size) - (b.count * b.size));
})();

const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const pct   = c => roll(100)<=c;
const getDie = i => DICE_PROGRESSION[Math.min(i||0,DICE_PROGRESSION.length-1)];

function rollDiceV(idx) {
  const {count,size,label} = getDie(idx);
  const rs = Array.from({length:count},()=>roll(size));
  return { total:rs.reduce((a,b)=>a+b,0), text:`[${label}:${rs.join('+')}]` };
}

function d20Hit(chance) {
  const rolled = roll(20);
  return { rolled, hit:rolled >= Math.max(1,Math.round(21-chance/5)) };
}

function dmgRange(atk, die) {
  const d = (die && typeof die==='object') ? die : getDie(die);
  return `${Math.max(0,atk+d.count)}-${atk+d.count*d.size}`;
}

function applyBuffs(p, buffs) {
  const out = {...p};
  buffs.forEach(b => { out[b.stat]=(out[b.stat]||0)+b.val; });
  return out;
}

function applyEquipment(p, equip) {
  const out = {...p};
  [...BODY_SLOTS.map(s=>equip[s.key]), ...equip.rings]
    .filter(Boolean)
    .forEach(item => Object.entries(item.stats||{}).forEach(([k,v]) => { out[k]=(out[k]||0)+v; }));
  // Both swinging weapons go into out.weapons. Offhand only counts if it's a weapon (has dieIdx) — shields just contribute stats.
  const offIsWeapon = equip.offhand?.dieIdx != null;
  const weapons = [equip.weapon, offIsWeapon ? equip.offhand : null].filter(Boolean);
  if (weapons.length > 0) {
    out.weapons = weapons;
    out.dieIdx = weapons[0].dieIdx;
    out.weaponProcs = weapons[0].procs || {};
  }
  return out;
}

const abilityMod = score => Math.floor(((score||10)-10)/2);

// One-line human-readable description of what a given ability score does mechanically. Used by the
// character creation panel (and the level-up panel) to show effects update as the score changes.
// Reflects the bonuses applied in applyAbilityStats — negative-mod-floored stats (poison resist,
// awareness, identify, shop discount) report 0% instead of negative values.
const statEffectLine = (statId, score) => {
  const m = abilityMod(score);
  const sign = (n) => (n >= 0 ? `+${n}` : `${n}`);
  switch (statId) {
    case "strength":     return `ATK ${sign(m)} · HIT ${sign(m*5)}%`;
    case "dexterity":    return `DODGE ${sign(Math.max(0,m*5))}% · CRIT ${sign(Math.max(0,m*5))}% · SPD ${sign(m)}`;
    case "constitution": return `HP DIE ${sign(m)} (RETROACTIVE) · ☠ RES ${Math.max(0,m*5)}%`;
    case "wisdom":       return `AWARENESS +${Math.max(0,m*15)}% · HEAL +${Math.max(0,m)} HP`;
    case "charisma":     return `SHOP DISCOUNT ${Math.max(0,m*5)}%`;
    case "intelligence": return `ITEM IDENTIFY +${Math.max(0,m*15)}%`;
    default:             return "";
  }
};

function applyAbilityStats(p) {
  const out = {...p};
  const str = abilityMod(out.strength);
  const dex = abilityMod(out.dexterity);
  const con = abilityMod(out.constitution);
  const wis = abilityMod(out.wisdom);
  const cha = abilityMod(out.charisma);
  const int = abilityMod(out.intelligence);
  // Max HP = floor((sum of all level rolls + conMod × #levels) / 2), plus any equipment bonus that
  // applyEquipment already summed onto out.maxHp before we got here. CON applies retroactively.
  const dice = out.hitDice || [8];
  const equipBonus = out.maxHp || 0;
  const baseHp = Math.max(1, Math.floor((dice.reduce((a,b)=>a+b,0) + con*dice.length) / 2));
  out.maxHp       = baseHp + equipBonus;
  out.hp          = Math.min(out.hp, out.maxHp);
  out.atkDmg      = Math.max(0,out.atkDmg + str);
  out.hitChance   = clamp(out.hitChance + str*5,5,200);
  out.dodgeChance = clamp(out.dodgeChance + dex*5,0,100);
  out.critChance  = clamp(out.critChance + dex*5,0,80);
  // Speed: drives initiative at battle start. DEX matters. Equipment may also stack onto out.speed via stats.speed.
  out.speed       = Math.max(1,(out.speed||0)+10+dex);
  // Negative ability mods now apply mechanically. Awareness/identify/poison-resist clamp at 0 (you
  // can't have negative resistance/awareness), but shop discount allows negative values — that's how
  // low-charisma characters pay markup.
  out.poisonResist= clamp((out.poisonResist||0)+con*5,0,100);
  out.awareness   = clamp((out.awareness||0)+wis*15,0,100);
  out.identify    = clamp((out.identify||0)+int*15,0,100);
  out.shopDiscount= clamp((out.shopDiscount||0)+cha*5,-100,100);
  return out;
}

// Compute the player's maximum HP given an arbitrary CON score, level, and hitDice array. Used by
// statEffectLine for the CON row so character creation shows actual HP, not "HP DIE +m". The level-1
// default assumes the standard max-roll opener (`[8]`) since players see this in character creation.
function computeMaxHpFor(conScore, level=1, hitDice=null, equipBonus=0) {
  const mod = abilityMod(conScore);
  const dice = hitDice || Array.from({length: level}, () => 8);
  const sum = dice.reduce((a,b)=>a+b, 0);
  return Math.max(1, Math.floor((sum + mod * dice.length) / 2)) + equipBonus;
}

function getEffectivePlayer(p, equip, buffs=[]) {
  return applyBuffs(applyAbilityStats(applyEquipment(p,equip)),buffs);
}

// Weapons are always replaceable (buying a new one supplants the old). Shields too. Other slots only offer once.
const getAvailableEquipment = equip =>
  EQUIPMENT_DEFS.filter(item => {
    if (item.slot==='ring')    return equip.rings.length<5;
    if (item.slot==='weapon')  return equip.weapon?.id !== item.id;
    if (item.slot==='offhand') return equip.offhand?.id !== item.id;
    return !equip[item.slot];
  });

// Runtime equip validation. Used to grey out shop buttons that would be illegal.
function canEquipItem(item, equip, p) {
  if (item.slot === 'offhand') {
    // Two-handed main weapon blocks ANY offhand item (shield or weapon).
    if (equip.weapon?.hand === 'two') return false;
    // Offhand light weapons require dual-wield perk + light main weapon.
    if (item.dieIdx != null) {
      if (!p?.dualWield) return false;
      if (equip.weapon?.hand !== 'light') return false;
    }
  }
  return true;
}

const getShopCost = (item, p) => Math.max(1,Math.ceil(item.cost*(1-(p.shopDiscount||0)/100)));

function describeItem(item, p) {
  if (!item.slot || (p.identify||0)>=50) return item.desc;
  if (item.stats.maxHp) return "VITAL GEAR";
  if (item.stats.armor) return "DEFENSIVE GEAR";
  if (item.stats.atkDmg || item.stats.hitChance || item.stats.critChance) return "COMBAT GEAR";
  return "ENCHANTED GEAR";
}

function pickRandom(pool, n) {
  const src=[...pool], out=[];
  while (out.length<n && src.length) out.push(src.splice(Math.floor(Math.random()*src.length),1)[0]);
  return out;
}

// Inventory helpers — items stack by id so a player can carry e.g. ANTIDOTE (×3) in one slot.
// Both consumables and equipment use the same mechanism; equipment will only ever stack if the player
// buys two of the same item id or repeatedly displaces identical gear into the bag.
const addToInventory = (inv, item) => {
  const idx = inv.findIndex(x => x.id === item.id);
  if (idx >= 0) return inv.map((x,i) => i===idx ? {...x, count:(x.count||1)+1} : x);
  return [...inv, {...item, count:1}];
};
const removeFromInventory = (inv, item) => {
  const idx = inv.findIndex(x => x.id === item.id);
  if (idx < 0) return inv;
  const cur = inv[idx];
  if ((cur.count||1) > 1) return inv.map((x,i) => i===idx ? {...x, count:x.count-1} : x);
  return [...inv.slice(0,idx), ...inv.slice(idx+1)];
};

// Shop equipment is biased toward common items: each pick has a 25% chance to come
// from the rare pool when both pools are non-empty. Falls back gracefully when one is empty.
// If the player has dual-wield + a light main weapon equipped, light weapon picks may be
// re-tagged as offhand variants so they slot into the offhand instead of replacing the main.
function pickShopEquipment(avail, n, p, equip) {
  const src=[...avail], out=[];
  const canDual = p?.dualWield && equip?.weapon?.hand === 'light';
  while (out.length<n && src.length) {
    const common=src.filter(i=>!i.rare), rare=src.filter(i=>i.rare);
    const pool = (rare.length && common.length) ? (pct(25)?rare:common) : (common.length?common:rare);
    let item = pool[Math.floor(Math.random()*pool.length)];
    src.splice(src.indexOf(item),1);
    if (canDual && item.slot === 'weapon' && item.hand === 'light' && pct(40)) {
      item = {...item, slot:'offhand', label: item.label + ' (OFF)', id: item.id + '_off'};
    }
    out.push(item);
  }
  return out;
}

const ROOM_TYPES = [
  { id:"small",  icon:"▦", label:"SMALL ROOM", desc:"A TIGHT, CLEAN FIGHT" },
  // Big rooms: 50% chance of 2 enemies (handled in makeFloorMap). The enemyMod here only adds gold;
  // fighting two foes is already the threat, so +HP would over-pressure the encounter.
  { id:"big",    icon:"▣", label:"BIG ROOM",   desc:"MORE GOLD · MAY HAVE TWO FOES", enemyMod:e=>({...e,goldMin:e.goldMin+1,goldMax:e.goldMax+3}), maybeDouble:true },
  { id:"bridge", icon:"═", label:"BRIDGE",     desc:"SWIFT FOE · GOOD GOLD", enemyMod:e=>({...e,dodgeChance:(e.dodgeChance||0)+15,goldMax:e.goldMax+2}) },
  { id:"shrine", icon:"✚", label:"OLD SHRINE", desc:"WEAKER FOE · SMALL GOLD", enemyMod:e=>({...e,hitChance:Math.max(30,e.hitChance-10),goldMin:Math.max(1,e.goldMin-1)}) },
];

// makeFloorMap builds the persistent layout for a floor. Always 1 boss + (FLOOR_SIZE-1) fight rooms;
// positions are shuffled. Rooms carry a stable `key` so React reconciles correctly and we can flip
// the `cleared` flag in-place after victories. The boss room transforms into a stairs tile on kill
// (see resolveVictory). WIS-based `known` / `enemyKnown` rolls happen once at floor creation. The
// boss room is always fully known — no surprise round on bosses (room-less ambush bosses, future).
// Floor layout uses a 3-wide × 2-tall grid (FLOOR_SIZE === 6). Each room gets a `pos:{col,row}` so the
// fog-of-war map can compute adjacency. The entrance — position {0,0} — is always a fight room and is
// marked `visited:true` so the player spawns somewhere safe (the boss never appears at the start).
const FLOOR_POSITIONS = [
  {col:0,row:0}, {col:1,row:0}, {col:2,row:0},
  {col:0,row:1}, {col:1,row:1}, {col:2,row:1},
];
const isAdjacentPos = (a, b) => !!a && !!b && (Math.abs(a.col-b.col) + Math.abs(a.row-b.row)) === 1;

function makeFloorMap(floorNum, level, p, revealAll=false) {
  const awareness = revealAll ? 100 : (p.awareness||0);
  const enemyKnown = () => revealAll || pct(awareness);
  const known = () => revealAll || pct(35+awareness);
  const bossRoom = {
    id:'boss', icon:'▰', label:'BOSS DOOR', desc:'THE FLOOR GUARDIAN WAITS',
    isBoss:true, enemies:[pickBoss(floorNum, level)], cleared:false,
    known:true, enemyKnown:true, key:'boss',
  };
  const fightRooms = Array.from({length: FLOOR_SIZE - 1}, (_, i) => {
    const type = ROOM_TYPES[Math.floor(Math.random()*ROOM_TYPES.length)];
    // Big rooms have a 50% chance to spawn 2 enemies. Each enemy is rolled independently.
    const enemyCount = (type.maybeDouble && pct(50)) ? 2 : 1;
    const enemies = Array.from({length: enemyCount}, () => pickEnemy(level));
    return {
      ...type,
      enemies,
      cleared:    false,
      known:      known(),
      enemyKnown: enemyKnown(),
      key:        `room_${i}`,
    };
  });
  // The entrance is the first fight room — pinned to position {0,0} and pre-visited so the player
  // can't insta-trigger a boss fight by spawning at the wrong tile.
  const entrance = { ...fightRooms[0], pos: FLOOR_POSITIONS[0], visited: true };
  // Everything else (boss + remaining 4 fight rooms) gets shuffled across positions 1..5.
  const others = [bossRoom, ...fightRooms.slice(1)];
  for (let i = others.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [others[i], others[j]] = [others[j], others[i]];
  }
  others.forEach((r, idx) => { r.pos = FLOOR_POSITIONS[idx + 1]; r.visited = false; });
  return [entrance, ...others];
}

function applyRoomToEnemy(e, room) {
  const next = room?.enemyMod ? room.enemyMod(e) : e;
  return {...next, hp:Math.min(next.hp,next.maxHp)};
}

// Ramps to 100 by level 15, then +1/level above 15 (counters player dodge)
const roundToFive = v => Math.round(v/5)*5;
const scaleHit = (base,level) =>
  roundToFive(base + Math.min(level-1,14)/14*(100-base) + Math.max(0,level-15));

function pickEnemy(level) {
  const wave = WAVES[clamp(level-1,0,WAVES.length-1)];
  const pool = wave.flatMap(([n,w])=>Array(w).fill(n));
  const name = pool[Math.floor(Math.random()*pool.length)];
  const base = ENEMY_DEFS[name];
  const over = Math.max(0,level-WAVES.length);
  return { name, ...base,
    maxHp:     base.maxHp+over,
    hp:        base.maxHp+over,
    attack:    base.attack+Math.floor(over/5),
    hitChance: scaleHit(base.hitChance,level),
  };
}

function pickBoss(waveNumber, level) {
  if (waveNumber<=WAVE_BOSSES.length) {
    const def=WAVE_BOSSES[waveNumber-1];
    return {...def, hp:def.maxHp, hitChance:scaleHit(def.hitChance,level)};
  }
  const idx   = clamp(waveNumber-WAVE_BOSSES.length-1, 0, BOSS_DEFS.length-1);
  const def   = BOSS_DEFS[idx];
  const bonus = Math.max(0, waveNumber-WAVE_BOSSES.length-idx-1);
  return { ...def,
    maxHp:     def.maxHp+bonus*2,
    hp:        def.maxHp+bonus*2,
    attack:    def.attack+Math.floor(bonus/2),
    hitChance: scaleHit(def.hitChance,level),
    goldMin:   def.goldMin+bonus,
    goldMax:   def.goldMax+bonus*2,
    xp:        def.xp+bonus,
    name:      bonus>2?`ELDER ${def.name}`:def.name,
  };
}

// ─── Combat ───────────────────────────────────────────────────────────────────

function playerAttack(p, e, verbose=false) {
  const results = [];
  const weapons = (p.weapons && p.weapons.length) ? p.weapons : [{ dieIdx: p.dieIdx, procs: {} }];

  // 1. BLEED LOGIC: Damage increases based on how "bad" the current bleed is
  const bleedBonus = e.bleed || 0;
  const applyBleed = dmg => dmg + Math.floor(bleedBonus);

  let didPoison = false, didBurn = false, didBleed = false;
  let newBleedVal = 0;

  const doSwing = (weapon, isOffhand = false) => {
    const procs = weapon.procs || {};
    const { rolled, hit } = d20Hit(p.hitChance - e.dodgeChance);
    const wouldCrit = rolled >= 20 - p.critChance / 5;

    if (!hit && !wouldCrit) {
      results.push({ type: "miss", text: `${rolled}! ${e.dodgeChance > 0 ? "DODGE!" : "MISS!"}` });
      return 0;
    }

    const procPierce = procs.pierceChance > 0 && pct(procs.pierceChance);
    const r1 = rollDiceV(weapon.dieIdx);
    let dmg;

    // 2. CRIT & DAMAGE CALCULATION
    const armorUsed = (procPierce || (wouldCrit && p.armorPierce)) ? 0 : e.armor;

    if (wouldCrit && hit && !e.immuneToCrit) {
      const r2 = rollDiceV(weapon.dieIdx);
      dmg = p.atkDmg + r1.total + r2.total - armorUsed;
      results.push({ type: "crit", text: `${rolled}! ★ CRIT! ${dmg} DMG!` });
    } else {
      dmg = p.atkDmg + r1.total - armorUsed;
      const typeText = wouldCrit ? "AUTO-HIT!" : "HIT!";
      results.push({ type: "player", text: `${rolled}! ${typeText} ${Math.max(0, dmg)} DMG` });
    }

    dmg = Math.max(0, dmg);

    // 3. OFFHAND PENALTY: 50% damage unless they have Master Duelist (dualWield is what allows the
    //    second weapon to swing in the first place; masterDuelist removes the damage cut).
    if (isOffhand && !p.masterDuelist) {
      dmg = Math.floor(dmg * 0.5);
    }

    // Apply the current bleed bonus damage to the final result
    dmg = applyBleed(dmg);

    // 4. BLEED PROC: Set to weapon's average damage (Die Average + ATK)
    if (dmg > 0) {
      if (procs.poisonChance && pct(procs.poisonChance)) didPoison = true;
      if (procs.burnChance && pct(procs.burnChance)) didBurn = true;
      if (procs.bleedChance && pct(procs.bleedChance)) {
        didBleed = true;
        const die = getDie(weapon.dieIdx);
        // Average of a die is (max + 1) / 2. Example: D6 average is 3.5
        const avgWeaponDmg = ((die.count * (die.size + 1)) / 2) + p.atkDmg;
        newBleedVal = avgWeaponDmg;
      }
    }
    return dmg;
  };

  // --- Execute Swings ---
  // We track running damage and short-circuit once the enemy would already be dead, so
  // double/triple/offhand swings don't whiff against a corpse.
  let total = 0;
  const enemyDead = () => total >= e.hp;

  // Main Strike
  total += doSwing(weapons[0], false);

  // Offhand Strike (Standard Dual Wielding)
  if (weapons.length > 1 && !enemyDead()) {
    results.push({ type: "player", text: "⚔ OFFHAND STRIKE!" });
    total += doSwing(weapons[1], true);
  }

  // 5. MULTI-STRIKE LOGIC
  // Double Strike uses Main Hand
  if (!enemyDead() && pct(p.doubleStrikeChance)) {
    results.push({ type: "player", text: "⚔⚔ DOUBLE STRIKE!" });
    total += doSwing(weapons[0], false);
  }

  // Triple Strike uses Offhand
  if (!enemyDead() && pct(p.tripleStrikeChance)) {
    results.push({ type: "player", text: "⚔⚔⚔ TRIPLE STRIKE!" });
    // If no offhand weapon is equipped, it defaults to fists/main weapon stats
    total += doSwing(weapons[1] || weapons[0], true);
  }

  return { total, results, didPoison, didBurn, didBleed, newBleedVal };
}

function enemyAttack(p, e, verbose=false) {
  const results=[];
  let dmgToPlayer=0, counterDmg=0, gotCrit=false, didPoison=false, didBurn=false, didBleed=false, didStun=false;
  const hitRoll   = d20Hit(e.hitChance);
  const dodgeRoll = hitRoll.hit ? d20Hit(p.dodgeChance) : null;
  if (!hitRoll.hit) {
    results.push({type:"miss", text:`${e.name} ${hitRoll.rolled}! MISS!`});
  } else if (dodgeRoll?.hit) {
    results.push({type:"dodge", text:`${e.name} ${hitRoll.rolled}! → YOU ${dodgeRoll.rolled}! DODGE!`});
  } else {
    const isCrit = hitRoll.rolled===20;
    const d1 = roll(3);
    const gp  = p.greedPenalty||0;
    if (isCrit) {
      gotCrit=true;
      const d2=roll(3);
      dmgToPlayer = Math.max(0,e.attack+d1+d2-p.armor+gp);
      results.push({type:"enemy", text:`${e.name} 20! ★ CRIT!${verbose?` [D3:${d1}+D3:${d2}]`:""} ${dmgToPlayer} DMG!`});
    } else {
      dmgToPlayer = Math.max(0,e.attack+d1-p.armor+gp);
      results.push({type:"enemy", text:`${e.name} ${hitRoll.rolled}! HIT!${verbose?` [D3:${d1}]`:""} ${dmgToPlayer} DMG${dmgToPlayer===0?" (BLOCKED)":""}`});
    }
    if (dmgToPlayer>0) {
      if (e.poisonOnHit)              didPoison=true;
      if (e.burnsOnHit)               didBurn=true;
      if (e.bleedsOnCrit && isCrit)   didBleed=true;
      if (e.stunsOnHit && pct(30))    didStun=true;
    }
    if (pct(p.counterChance)) {
      counterDmg = Math.max(0,Math.ceil(p.atkDmg/2));
      results.push({type:"counter", text:`COUNTER! ${counterDmg} DMG!`});
    }
  }
  return { dmgToPlayer, counterDmg, results, gotCrit, didPoison, didBurn, didBleed, didStun };
}

// ─── UI Components ────────────────────────────────────────────────────────────

function Hearts({ hp, maxHp }) {
  return (
    <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
      {Array.from({length:Math.ceil(maxHp/2)}).map((_,i) => {
        const full=hp>=i*2+2, half=!full&&hp>=i*2+1;
        if (full) return <span key={i} style={{ fontSize:18, lineHeight:1 }}>❤️</span>;
        if (half) return (
          <span key={i} style={{ fontSize:18, lineHeight:1, position:"relative", display:"inline-block" }}>
            🤍
            <span aria-hidden="true" style={{ position:"absolute", left:0, top:0, clipPath:"inset(0 50% 0 0)", pointerEvents:"none" }}>❤️</span>
          </span>
        );
        return <span key={i} style={{ fontSize:18, lineHeight:1 }}>🤍</span>;
      })}
    </div>
  );
}

function TileBox({ children, style={}, highlight=false }) {
  return (
    <div style={{ border:`3px solid ${highlight?"#f8e000":"#5a4a18"}`, outline:"3px solid #000", outlineOffset:-6, background:"#0e0e04", padding:"16px 18px", boxShadow:highlight?"0 0 14px rgba(248,224,0,0.2)":"none", ...style }}>
      {children}
    </div>
  );
}

const BTN_VARIANTS = {
  attack:  ["#180808","#802020","#e05050"],
  flee:    ["#0e0e04","#484818","#909020"],
  neutral: ["#080e08","#205020","#50c050"],
  stat:    ["#080814","#304860","#80b8e8"],
  gold:    ["#140e04","#806010","#f8c840"],
  shop:    ["#0c0820","#604090","#c080f8"],
};

function Btn({ children, onClick, variant="neutral", disabled=false, style={} }) {
  const [bg,border,color] = BTN_VARIANTS[variant]||BTN_VARIANTS.neutral;
  return (
    <button onClick={onClick} disabled={disabled}
            style={{ background:bg, border:`3px solid ${border}`, outline:"2px solid #000", color,
                     fontFamily:"'Press Start 2P', monospace", fontSize:10, padding:"12px 16px",
                     cursor:disabled?"default":"pointer", width:"100%", textAlign:"left",
                     letterSpacing:"0.04em", lineHeight:1.8, opacity:disabled?0.4:1, ...style }}>
      {children}
    </button>
  );
}

const LOG_COLORS = { sys:"#b8a840", player:"#50d850", enemy:"#e04040", crit:"#f8e000", warn:"#e08020", level:"#80d0f8", counter:"#e080f8", dodge:"#80e0f0", miss:"#506050", gold:"#f8c840" };

function EquipDisplay({ equip }) {
  return (
    <div style={{ display:"flex", flexWrap:"wrap", gap:2, justifyContent:"center" }}>
      {BODY_SLOTS.map(({key,emoji}) => (
        <span key={key} title={equip[key]?.label||key.toUpperCase()}
              style={{ fontSize:13, opacity:equip[key]?1:0.18, filter:equip[key]?"none":"grayscale(1)" }}>
          {equip[key]?.emoji||emoji}
        </span>
      ))}
      {[0,1,2,3,4].map(i => (
        <span key={i} title={equip.rings[i]?.label||`RING SLOT ${i+1}`}
              style={{ fontSize:12, opacity:equip.rings[i]?1:0.18 }}>💍</span>
      ))}
    </div>
  );
}

function BodyLayout({ equip, selected, onSelect, cellSize=36 }) {
  const cell = (selKey, emoji, col, row, filled) => (
    <div key={selKey} onClick={()=>onSelect?.(selKey)}
         style={{ gridColumn:col, gridRow:row, display:"flex", alignItems:"center", justifyContent:"center",
                  cursor:onSelect?"pointer":"default",
                  background:selected===selKey?"rgba(248,224,0,0.12)":"transparent",
                  border:selected===selKey?"2px solid rgba(248,224,0,0.55)":"2px solid transparent",
                  borderRadius:4 }}>
      <span style={{ fontSize:cellSize*0.68, opacity:filled?1:0.18, filter:filled?"none":"grayscale(1)", userSelect:"none" }}>
        {emoji}
      </span>
    </div>
  );
  return (
    <div style={{ display:"grid", gridTemplateColumns:`repeat(5,${cellSize}px)`, gridTemplateRows:`repeat(8,${cellSize}px)`, gap:3, flexShrink:0 }}>
      {BODY_SLOTS.map(s=>cell(s.key,equip[s.key]?.emoji||s.emoji,s.col,s.row,!!equip[s.key]))}
      {[0,1,2,3,4].map(i=>cell(`ring:${i}`,"💍",i+1,8,!!equip.rings[i]))}
    </div>
  );
}

// FloorMap: spatial 3×2 grid with fog of war. Each room sits at a fixed `pos` set by makeFloorMap.
// A tile is visible if it's been visited OR is adjacent (Manhattan-1) to any visited tile; everything
// else renders as a fog "?" cell. Clicking a tile fires `onEnter(room)` — the App decides whether to
// move silently (cleared / fast-travel) or kick off combat / stairs. Adjacent-or-visited tiles are
// clickable; foggy tiles are inert. Player avatar (🧝) renders at `playerPos`.
function FloorMap({ waveNumber, floorRooms, playerPos, revealAll=false, onEnter, playerEmoji }) {
  const cleared = floorRooms.filter(r => r.cleared && !r.isBoss && !r.descend).length;
  const total   = floorRooms.filter(r => !r.isBoss && !r.descend).length;
  const visible = room => room.visited || floorRooms.some(o => o.visited && isAdjacentPos(o.pos, room.pos)) || revealAll;
  const canEnter = room => room.visited || isAdjacentPos(room.pos, playerPos);
  return (
    <div style={{ background:"#050b06", border:"2px solid #2e2808", padding:"12px 10px", marginBottom:16 }}>
      <div style={{ color:"#806030", fontSize:7, letterSpacing:"0.1em", marginBottom:10, textAlign:"center" }}>
        DUNGEON FLOOR {waveNumber} · {cleared}/{total} CLEARED
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gridTemplateRows:"repeat(2, 1fr)", gap:6 }}>
        {FLOOR_POSITIONS.map(({col, row}) => {
          const room = floorRooms.find(r => r.pos && r.pos.col === col && r.pos.row === row);
          if (!room) return <div key={`${col}_${row}`} />;
          const isCurrent  = playerPos.col === col && playerPos.row === row;
          const isVisible  = visible(room);
          const isClickable = isVisible && canEnter(room);
          // Hidden fog tile — no info leaks.
          if (!isVisible) {
            return (
              <div key={room.key}
                   style={{ minHeight:78, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                            background:"#0a0a06", border:"2px solid #181810", outline:"1px solid #000",
                            color:"#3a3010", fontSize:22, cursor:"default" }}>
                ?
              </div>
            );
          }
          const isBoss   = !!room.isBoss;
          const isStairs = !!room.descend;
          const done     = room.cleared;
          const showEnemies = !done && (room.enemyKnown || revealAll) && room.enemies && room.enemies.length;
          const bg = isCurrent ? "#1a2010"
                   : isStairs  ? "#08081c"
                   : done      ? "#0a220a"
                   : isBoss    ? "#220808"
                   : "#101006";
          const border = isCurrent ? "#f8e000"
                       : isStairs  ? "#5060a0"
                       : done      ? "#50c050"
                       : isBoss    ? "#a05050"
                       : isClickable ? "#806030"
                       : "#3a3010";
          return (
            <div key={room.key}
                 onClick={isClickable ? () => onEnter(room) : undefined}
                 style={{ minHeight:78, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                          gap:2, background:bg, border:`2px solid ${border}`, outline:"1px solid #000", padding:"4px 2px",
                          position:"relative", cursor:isClickable?"pointer":"default" }}>
              {isCurrent && <div style={{ position:"absolute", top:2, left:3, fontSize:13 }}>{playerEmoji||"🧝"}</div>}
              <div style={{ fontSize:16, color: isStairs?"#80b8e8":done?"#50c050":isBoss?"#e07070":"#a08a40" }}>
                {done && !isStairs ? "✓" : room.icon}
              </div>
              {showEnemies && (
                <div style={{ fontSize:11, display:"flex", gap:1, justifyContent:"center" }}>
                  {room.enemies.map((e,i) => <span key={i}>{e.emoji}</span>)}
                </div>
              )}
              <div style={{ fontSize:6, color: isStairs?"#6080a0":done?"#608060":isBoss?"#a06060":"#5a4a18", textAlign:"center" }}>
                {isStairs ? "STAIRS" : isBoss ? "BOSS" : done ? "CLEAR" : room.label.split(" ")[0]}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function GearDetail({ selectedSlot, equipment }) {
  if (!selectedSlot) return (
    <div style={{ color:"#3a2e0a", fontSize:10, lineHeight:2, marginTop:8 }}>← CLICK A SLOT<br />TO INSPECT</div>
  );
  const isRing  = selectedSlot.startsWith("ring:");
  const ringIdx = isRing ? parseInt(selectedSlot.split(":")[1]) : null;
  const item    = isRing ? equipment.rings[ringIdx] : equipment[selectedSlot];
  const slotDef = isRing ? null : BODY_SLOTS.find(s=>s.key===selectedSlot);
  const label   = isRing ? `RING SLOT ${ringIdx+1}` : selectedSlot.toUpperCase();
  return (
    <>
      <div style={{ fontSize:9, color:"#806030", letterSpacing:"0.1em", marginBottom:12 }}>
        {slotDef?.emoji??"💍"} {label}
      </div>
      {item ? (
        <>
          <div style={{ fontSize:13, color:"#c080f8", marginBottom:10, lineHeight:1.5 }}>{item.label}</div>
          <div style={{ fontSize:10, color:"#9070b0", lineHeight:1.8, marginBottom:14 }}>{item.desc}</div>
          <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
            {Object.entries(item.stats).map(([k,v]) => {
              const bad = v<0 || k==='greedPenalty';
              return <div key={k} style={{ fontSize:11, color:bad?"#e08020":"#50d850" }}>{v>0?"+":""}{v} {STAT_LABEL[k]||k.toUpperCase()}</div>;
            })}
          </div>
          {item.vampiric && <div style={{ fontSize:10, color:"#e040e0", marginTop:10 }}>🩸 HEAL 2 HP ON CRIT</div>}
          <div style={{ fontSize:10, color:"#a07020", marginTop:14 }}>COST {item.cost}💰</div>
        </>
      ) : (
        <div style={{ fontSize:11, color:"#5a4018", marginTop:18, lineHeight:2 }}>
          — EMPTY —<br /><span style={{ fontSize:9, color:"#3a2e0a" }}>VISIT THE SHOP<br />AFTER A BOSS</span>
        </div>
      )}
    </>
  );
}

function ItemButtons({ items, onUse, inBattle=true }) {
  return items.map((item,i) => {
    const isEquip = !!item.slot;
    const count = item.count||1;
    const countTag = count>1 ? ` (×${count})` : '';
    return (
      <Btn key={i} onClick={()=>onUse(item,inBattle)} variant={isEquip?"stat":"shop"}>
        {isEquip ? `⚔ EQUIP ${item.label}${countTag}` : `▶ ${item.label}${countTag}`}<br />
        <span style={{ color:isEquip?"#405870":"#503870", fontSize:8 }}>{item.desc}</span>
      </Btn>
    );
  });
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [player,       setPlayer]       = useState({...PLAYER_BASE});
  // Multi-enemy combat: `enemies` is the array of foes in the current battle (1 or 2 entries).
  // `targetIdx` is which enemy the player is currently aiming at. `enemy` is derived below — it
  // points to the alive enemy at targetIdx (or the first alive if the target has died) so existing
  // single-enemy UI and combat code keeps working.
  const [enemies,      setEnemies]      = useState([]);
  const [targetIdx,    setTargetIdx]    = useState(0);
  const [log,          setLog]          = useState([{text:"PRESS START TO BEGIN",type:"sys"}]);
  const [phase,        setPhase]        = useState("title");
  const [showScores,   setShowScores]   = useState(false);
  const [ironUsed,     setIronUsed]     = useState(false);
  const [level,        setLevel]        = useState(1);
  const [xp,           setXp]           = useState(0);
  const [restXpLost,   setRestXpLost]   = useState(0);
  const [restUsed,     setRestUsed]     = useState(false);
  const [gold,         setGold]         = useState(0);
  const [shaking,      setShaking]      = useState(null);
  const [levelUpOpts,  setLevelUpOpts]  = useState([]);
  const [pickedStats,  setPickedStats]  = useState([]);
  const [perkOpts,     setPerkOpts]     = useState([]);
  // wavePos removed — progression now tracked by `cleared` flags on each room in floorRooms.
  const [waveNumber,   setWaveNumber]   = useState(1);
  const [floorRooms,   setFloorRooms]   = useState(()=>makeFloorMap(1,1,applyAbilityStats(PLAYER_BASE),false));
  // Fog-of-war navigation. The player occupies one tile at a time and can move to adjacent rooms
  // (Manhattan-distance 1) or fast-travel back to any previously-visited tile. Resets to {0,0} every
  // time the floor regenerates (boss kill / stairs descent / restart).
  const [playerPos,    setPlayerPos]    = useState({col:0, row:0});
  const [shopItems,    setShopItems]    = useState([]);
  const [equipment,    setEquipment]    = useState({...EMPTY_EQUIP});
  const [inventory,    setInventory]    = useState([]);
  const [tempBuffs,    setTempBuffs]    = useState([]);
  const [shopUnlocked, setShopUnlocked] = useState(false);
  const [selectingItem,setSelectingItem]= useState(false);
  const [arenaAnim,    setArenaAnim]    = useState({player:'idle',enemy:'idle'});
  const [devMode,      setDevMode]      = useState(false);
  const [equipOpen,    setEquipOpen]    = useState(false);
  const [selectedSlot, setSelectedSlot] = useState(null);
  const [poison,       setPoison]       = useState(0);
  const [burn,         setBurn]         = useState(0);
  const [bleed,        setBleed]        = useState(0);
  const [stun,         setStun]         = useState(0);
  // Temp HP — granted by Sage's Reservoir on every heal. Absorbed before real HP during enemy
  // attacks. Capped at maxHp. Cleared at battle start (does not carry between fights).
  const [tempHp,       setTempHp]       = useState(0);
  // Unspent stat points. Topped up by 27 at character creation and +2 per level-up. Spendable in
  // the "create" and "levelup" phases via pickStat. Persist on the player between sessions of the run.
  const [unspentPoints,setUnspentPoints]= useState(0);
  // Character creation working state — name, emoji, and a draft scores object. Initialized when the
  // player enters the "create" phase from the title screen.
  const [draft,        setDraft]        = useState(null);
  const [gameStats,    setGameStats]    = useState({biggestHit:0,biggestHitTaken:0,killCounts:{},itemsUsed:{}});
  const [highScores,   setHighScores]   = useState(()=>JSON.parse(localStorage.getItem('dq_scores')||'[]'));
  const logRef = useRef(null);

  const ep         = getEffectivePlayer(player,equipment,tempBuffs);
  const idlePlayer = getEffectivePlayer(player,equipment);
  const roomPlayer = devMode ? {...idlePlayer,awareness:95,wisdom:30,intelligence:30,identify:95} : idlePlayer;
  const XP_NEEDED = level*3;

  // Derived "current target": the alive enemy at targetIdx, or the first alive if the target died,
  // or null if the battle is over. Single-enemy UI/logic reading `enemy` continues to work transparently.
  const enemy = (enemies[targetIdx] && enemies[targetIdx].hp > 0)
    ? enemies[targetIdx]
    : (enemies.find(e => e && e.hp > 0) || null);

  useEffect(()=>{ if(logRef.current) logRef.current.scrollTop=logRef.current.scrollHeight; },[log]);

  const addLog = (text,type="sys") => setLog(prev=>[...prev.slice(-60),{text,type}]);
  const shake  = who => { setShaking(who); setTimeout(()=>setShaking(null),350); };

  const triggerArenaAnim = (p,e,dur=620) => {
    setArenaAnim({player:p,enemy:e});
    setTimeout(()=>setArenaAnim({player:'idle',enemy:'idle'}),dur);
  };

  function saveHighScore(finalGold) {
    const scores = [...JSON.parse(localStorage.getItem('dq_scores')||'[]'), {gold:finalGold,date:new Date().toLocaleDateString()}]
      .sort((a,b)=>b.gold-a.gold).slice(0,5);
    localStorage.setItem('dq_scores',JSON.stringify(scores));
    setHighScores(scores);
  }

  function triggerLevelUp(newLevel, currentPlayer) {
    setLevelUpOpts(STAT_POOL);
    setPickedStats([]);
    // Level-up grants +2 stat points, added to any leftover unspent points the player banked.
    setUnspentPoints(p => p + 2);
    // Every 5th level (capped at 20), offer a perk pick from any not-yet-taken perks.
    if (newLevel % 5 === 0 && newLevel <= 20) {
      const remaining = PERK_POOL.filter(p => !currentPlayer[p.id]);
      if (remaining.length > 0) { setPerkOpts(remaining); setPhase("perk"); return; }
    }
    setPhase("levelup");
  }

  // Spend ONE stat point during level-up (called per-click — player picks individually, no escalating
  // cost). If WIS hits 20 for the first time, route to the WIS milestone perk choice before resuming.
  function pickStat(stat) {
    if (unspentPoints <= 0) return;
    const updated = stat.apply({...player});
    setPlayer(updated);
    setUnspentPoints(p => p - 1);
    if (stat.id === "wisdom" && updated.wisdom >= 20 && !player.wisPerk) {
      setPhase("wisperk");
      return;
    }
    // Stay in levelup — player can keep spending until they click DONE.
  }

  // Player chooses to leave the level-up panel; any unspent points carry forward to future level-ups.
  function finishLevelUp() {
    setPhase("win");
  }

  function pickPerk(perk) {
    setPlayer(p => perk.apply({...p}));
    setPerkOpts([]);
    addLog(`${perk.label} UNLOCKED!`, "level");
    setPhase("levelup");
  }

  function pickWisPerk(perk) {
    setPlayer(p => ({...p, wisPerk: perk.id}));
    addLog(`${perk.label} AWAKENED!`, "level");
    setPhase("levelup"); // Return to stat-pick panel so any remaining points can still be spent.
  }

  // ── Character creation ────────────────────────────────────────────────────
  // Enter the create phase from the title screen. Initializes the draft to all-8s and grants 27 points.
  function beginCreation() {
    setDraft({
      name: "Hero",
      emoji: "🧝",
      strength:8, dexterity:8, constitution:8,
      wisdom:8, charisma:8, intelligence:8,
    });
    setUnspentPoints(27);
    setPhase("create");
  }

  // Adjust a draft stat by +1 / -1 during character creation. Uses the escalating POINT_COST table.
  // Refunds the exact cost when decrementing. Caps at 18 (creation cap) and 8 (floor).
  function draftAdjust(statId, delta) {
    if (!draft) return;
    const cur = draft[statId];
    const next = cur + delta;
    if (next < 8 || next > 18) return;
    if (delta > 0) {
      const cost = POINT_COST_STEP(cur);
      if (cost > unspentPoints) return;
      setDraft(d => ({...d, [statId]: next}));
      setUnspentPoints(p => p - cost);
    } else {
      const refund = POINT_COST_STEP(cur - 1);
      setDraft(d => ({...d, [statId]: next}));
      setUnspentPoints(p => p + refund);
    }
  }

  // Commit the character creation draft to the player state and start the run.
  function finishCreation() {
    if (!draft) return;
    setPlayer(p => ({...p, name: draft.name, emoji: draft.emoji,
      strength: draft.strength, dexterity: draft.dexterity, constitution: draft.constitution,
      wisdom: draft.wisdom, charisma: draft.charisma, intelligence: draft.intelligence,
    }));
    setDraft(null);
    setPhase("idle");
  }

  function enterRest() {
    // We no longer reset XP here
    setEnemies([]);
    setPhase("rest");
    setRestUsed(true);
  }
  // Stairs are unlocked only by defeating the floor's boss (resolveVictory transforms the boss tile
  // into a descend tile). Walking onto the stairs advances waveNumber and regenerates the next floor.
  function descendStairs() {
    const nextFloor = waveNumber + 1;
    setWaveNumber(nextFloor);
    setRestUsed(false);
    setFloorRooms(makeFloorMap(nextFloor, level, idlePlayer, devMode));
    setPlayerPos({col:0, row:0});
    addLog(`⇣ YOU DESCEND TO FLOOR ${nextFloor}.`, "level");
    setPhase("idle");
  }

  // Navigation handler for fog-of-war map clicks. Validates that the player can actually reach the
  // target tile (adjacent OR already visited for fast-travel), updates `playerPos`, marks the room
  // visited, then dispatches to combat / stairs / silent-walk based on the room's state.
  function handleRoomEnter(room) {
    if (!room || !room.pos) return;
    const visible = room.visited || floorRooms.some(o => o.visited && isAdjacentPos(o.pos, room.pos)) || devMode;
    if (!visible) return;
    const reachable = room.visited || isAdjacentPos(room.pos, playerPos);
    if (!reachable) {
      addLog("▷ TOO FAR — EXPLORE CLOSER FIRST.", "miss");
      return;
    }
    setPlayerPos(room.pos);
    if (!room.visited) {
      setFloorRooms(rooms => rooms.map(r => r.key === room.key ? {...r, visited:true} : r));
    }
    // Stairs always descend, whether walked-onto fresh or revisited.
    if (room.descend) { descendStairs(); return; }
    if (!room.cleared) { startBattle(room); return; }
    // Cleared & visited: silent walk-through.
    addLog(`▷ YOU CROSS BACK THROUGH ${room.label}.`, "miss");
  }

  function startBattle(room) {
    const isBoss = !!room?.isBoss;
    // Pull pre-rolled enemies from the room (always an array now). Fall back to a fresh roll if the
    // room is malformed somehow (defensive — shouldn't happen with the new makeFloorMap).
    const baseEnemies = (room?.enemies && room.enemies.length)
      ? room.enemies
      : [isBoss ? pickBoss(waveNumber,level) : pickEnemy(level)];
    // Surprise: if the player failed to spot the foe (low WIS / room.enemyKnown === false), every
    // enemy in the room gets a +5 speed bonus for this battle. The surprise flag rides on each enemy
    // so the panel can show 💢 individually.
    const surprised = room && room.enemyKnown === false;
    const battleEnemies = baseEnemies.map(be => {
      const finalSpeed = (be.speed||10) + (surprised ? 5 : 0);
      return {
        ...applyRoomToEnemy(be, room),
        roomKey:   room?.key,
        roomLabel: room?.label,
        speed:     finalSpeed,
        surprised,
      };
    });
    setEnemies(battleEnemies);
    setTargetIdx(0);
    setIronUsed(false);
    setTempBuffs(prev=>prev.map(b=>({...b,battles:b.battles-1})).filter(b=>b.battles>0));
    setSelectingItem(false);
    setArenaAnim({player:'idle',enemy:'idle'});
    // Stun is a single-turn-skip effect and never carries between battles. Poison / burn / bleed
    // persist across battles intentionally — they're only cleared via rest, an item with a cure
    // flag, or game restart.
    setStun(0);
    setTempHp(0);

    // Initiative compares player speed vs the fastest enemy in the room. Player wins ties.
    const playerSpeed = ep.speed || 10;
    const maxEnemySpeed = Math.max(...battleEnemies.map(e => e.speed||10));
    const enemyFirst  = maxEnemySpeed > playerSpeed;
    const intro = battleEnemies.length === 1
      ? `${room?.icon||"▶"} ${room?.label||"ROOM"}: ${battleEnemies[0].emoji} ${battleEnemies[0].name}!`
      : `${room?.icon||"▶"} ${room?.label||"ROOM"}: ${battleEnemies.map(e=>`${e.emoji} ${e.name}`).join(" + ")}!`;
    const logs = [{ text: isBoss ? `★★ ${battleEnemies[0].name} APPROACHES! ★★` : intro, type: isBoss?"crit":"sys" }];
    if (surprised) logs.push({ text: `💢 SURPRISE! THEY CATCH YOU OFF-GUARD! (+5 SPD)`, type: "warn" });
    logs.push({ text: enemyFirst ? `THEY STRIKE FIRST! (SPD ${maxEnemySpeed} vs YOU ${playerSpeed})` : `YOU MOVE FIRST! (SPD ${playerSpeed} vs ${maxEnemySpeed})`, type: enemyFirst ? "enemy" : "level" });
    setLog(logs);

    if (enemyFirst) runEnemyTurn(ep, battleEnemies);
    else            setPhase("player");
  }

  function handleAction(key) {
    if (phase!=="player"||!enemy) return;
    if (key==="flee") {
      if (pct(75)) {
        addLog("YOU FLEE INTO THE DARKNESS!","warn");
        enterRest();
      } else {
        addLog("BLOCKED! CAN'T ESCAPE!","warn"); runEnemyTurn(ep,enemies);
      }
      return;
    }
    // Target = the currently-selected live enemy. `enemy` is already derived to fall back to first
    // alive when targetIdx points to a corpse.
    const target = enemy;
    if (!target || target.hp <= 0) return;
    const targetSlot = enemies.findIndex(e => e === target);
    if (targetSlot < 0) return;

    const {total,results,didPoison,didBurn,didBleed,newBleedVal} = playerAttack(ep,target,devMode);

    // Vampiric blade: heal on crit (still works from either hand)
    let effectivePlayer = ep;
    if ((equipment.weapon?.vampiric || equipment.offhand?.vampiric) && results.some(r=>r.type==='crit')) {
      const heal=2;
      effectivePlayer = {...ep, hp:Math.min(ep.hp+heal, ep.maxHp)};
      setPlayer(p=>({...p, hp:Math.min(p.hp+heal, ep.maxHp)}));
      addLog(`🗡️ VAMPIRIC! +${heal} HP!`,"level");
    }

    if (total>0) setGameStats(s=>({...s,biggestHit:Math.max(s.biggestHit,total)}));
    const r0=results[0];
    if      (r0.type==='crit') triggerArenaAnim('attack','crit',700);
    else if (r0.type==='miss') triggerArenaAnim('miss','dodge',620);
    else                       triggerArenaAnim('attack','hit',620);
    shake("enemy");
    results.forEach(r=>addLog(r.text,r.type));

    const newHp = target.hp - total;
    let next = {...target, hp: Math.max(0, newHp)};

    // Weapon procs only land if the target survives the swing.
    if (next.hp>0) {
      if (didPoison) { next={...next, poison:3}; addLog(target.poison>0?`☠ ${target.name} POISON REFRESHED!`:`☠ ${target.name} POISONED! 3 TURNS!`,"level"); }
      if (didBurn)   { next={...next, burn:3};   addLog(target.burn>0  ?`🔥 ${target.name} BURN REFRESHED!`:`🔥 ${target.name} BURNING! 3 TURNS!`,"level"); }
      if (didBleed)  {
        const bleedVal = Math.max(newBleedVal||3, target.bleed||0);
        next = {...next, bleed: bleedVal};
        addLog(target.bleed>0 ? `🩸 ${target.name} BLEED DEEPENS! +${Math.floor(bleedVal)} DMG/HIT` : `🩸 ${target.name} BLEEDING! +${Math.floor(bleedVal)} DMG/HIT`, "level");
      }
    }

    // Berserker enrages at half HP
    if (target.enragesWhenLow && !target.enraged && next.hp>0 && next.hp<=Math.ceil(target.maxHp/2)) {
      next = {...next, enraged:true, attack:next.attack+3};
      addLog(`${target.name} ENRAGES! ATK +3!`,"enemy");
    }

    // Splice the updated target back into the array.
    const newEnemies = enemies.map((e, i) => i === targetSlot ? next : e);
    setEnemies(newEnemies);

    // Target died — auto-fall-back the selection to the next alive foe (if any).
    if (next.hp <= 0) {
      const nextAlive = newEnemies.findIndex(e => e && e.hp > 0);
      if (nextAlive >= 0) {
        setTargetIdx(nextAlive);
        addLog(`▶ ${target.name} DOWN! NOW TARGETING ${newEnemies[nextAlive].name}.`, "sys");
      }
    }

    // Victory check — all enemies must be down.
    if (newEnemies.every(e => !e || e.hp <= 0)) { resolveVictory(newEnemies); return; }
    runEnemyTurn(effectivePlayer, newEnemies);
  }

  function handleUseItem(item, inBattle=true) {
    // Slotted items in the inventory are equipment — route to the equip handler instead of treating them as consumables.
    if (item.slot) { handleEquipFromInventory(item, inBattle); return; }
    const ep = getEffectivePlayer(player, equipment, tempBuffs);
    const wisMod = Math.max(0, abilityMod(ep.wisdom));

    let np = {...player};
    let nb = tempBuffs;

    // Heal items: heal = base + wisMod (always); "full" tops the player off. Reservoir grants
    // tempHp on top equal to wisMod (capped at maxHp). Swift Cure rolls below to skip enemy turn.
    if (item.heal !== undefined) {
      const heal = item.heal === "full" ? ep.maxHp - np.hp : item.heal + wisMod;
      const newHp = Math.min(ep.maxHp, np.hp + heal);
      const actual = newHp - np.hp;
      np = {...np, hp: newHp};
      if (actual > 0) addLog(`+${actual} HP from ${item.label}!`, "level");
      if (player.wisPerk === "reservoir" && wisMod > 0) {
        const newTempHp = Math.min(ep.maxHp, tempHp + wisMod);
        const tmpGain = newTempHp - tempHp;
        if (tmpGain > 0) { setTempHp(newTempHp); addLog(`✦ SAGE'S RESERVOIR! +${tmpGain} TEMP HP`, "level"); }
      }
    } else if (item.onUse) {
      // Buff items (and any remaining items with custom onUse logic).
      const effectiveMaxHp = ep.maxHp;
      const {p:usedPlayer, b:newBuffs} = item.onUse({...np, maxHp:effectiveMaxHp}, nb);
      np = {...usedPlayer, maxHp:player.maxHp};
      nb = newBuffs;
    }

    if (item.curePoison) setPoison(0);
    if (item.cureBurn)   setBurn(0);
    if (item.cureBleed)  setBleed(0);
    if (item.cureStun)   setStun(0);
    if (item.cureAll)    { setPoison(0); setBurn(0); setBleed(0); setStun(0); }

    setPlayer(np); setTempBuffs(nb);
    setGameStats(s=>({...s,itemsUsed:{...s.itemsUsed,[item.label]:(s.itemsUsed[item.label]||0)+1}}));
    setInventory(inv=>removeFromInventory(inv, item));
    setSelectingItem(false);
    addLog(`USED ${item.label}!`,"level");

    if (inBattle) {
      // Swift Cure: heals roll wisMod × 10% to skip the enemy's response turn.
      if (item.heal !== undefined && player.wisPerk === "swift" && wisMod > 0 && pct(wisMod * 10)) {
        addLog("✦ SWIFT CURE! THE FOE HESITATES — YOUR TURN AGAIN!", "level");
        return;
      }
      runEnemyTurn(applyBuffs(np,nb), enemies);
    }
  }

  // Equip a piece of equipment from inventory. Any item displaced from the slot (or the offhand when
  // the equipped item is two-handed) goes back into inventory. Mid-fight swaps cost the player their
  // turn — the enemy gets a free strike, but the swing uses the newly-equipped gear's stats.
  function handleEquipFromInventory(item, inBattle=false) {
    if (!canEquipItem(item, equipment, idlePlayer)) {
      addLog(`✖ CAN'T EQUIP ${item.label} — slot conflict.`, "warn");
      setSelectingItem(false);
      return;
    }
    const displaced = [];
    if (item.slot !== 'ring') {
      if (equipment[item.slot]) displaced.push(equipment[item.slot]);
      if (item.slot === 'weapon' && item.hand === 'two' && equipment.offhand) displaced.push(equipment.offhand);
    }
    // Build new equipment and inventory synchronously so we can compute the post-swap effective player
    // for the enemy's free strike (otherwise React's pending state update would leave us swinging
    // — i.e. taking — damage based on stale stats).
    const newEquip = (item.slot === 'ring')
      ? { ...equipment, rings:[...equipment.rings, item] }
      : { ...equipment, [item.slot]: item, ...(item.slot==='weapon' && item.hand==='two' ? {offhand:null} : {}) };
    const newInv = displaced.reduce(
      (acc, d) => addToInventory(acc, d),
      removeFromInventory(inventory, item)
    );
    setInventory(newInv);
    setEquipment(newEquip);
    addLog(`⚔ EQUIPPED ${item.label}.`, "level");
    displaced.forEach(d => addLog(`📦 ${d.label} → INVENTORY`, "sys"));
    setSelectingItem(false);
    if (inBattle && enemies.length && enemies.some(e => e && e.hp > 0)) {
      addLog("⏳ GEAR SWAP — ENEMY GETS A FREE STRIKE!", "warn");
      const newEp = getEffectivePlayer(player, newEquip, tempBuffs);
      runEnemyTurn(newEp, enemies);
    }
  }

  // Sell one of an inventory item at the shop. Stacked items sell one at a time. Half of base cost (rounded down, min 1).
  function handleSellItem(item) {
    const sellValue = Math.max(1, Math.floor((item.cost||0)/2));
    setInventory(inv => removeFromInventory(inv, item));
    setGold(g => g + sellValue);
    addLog(`💰 SOLD ${item.label} (+${sellValue}g)`, "gold");
  }

  // Multi-enemy round. `snapshotEnemies` is the array of enemies as of the start of this enemy phase
  // (player just acted, or we recursed here from a stun). Per round:
  //   1. Each enemy's poison / burn / bleed ticks. Enemies can die from status here.
  //   2. Player's poison / burn / bleed ticks once. Player can die from status.
  //   3. Archer flee check per enemy (low-HP archers may bail for half reward).
  //   4. Each alive enemy attacks the player. Counter damage routes back to the attacking enemy.
  //      Per-attack player statuses (poison/burn/bleed/stun) accumulate from any successful hits.
  //   5. If the player got stunned this round, we recurse for another enemy round after a delay.
  function runEnemyTurn(p, snapshotEnemies) {
    setPhase("enemy");
    setTimeout(()=>{
      let curP = p;
      let curEnemies = snapshotEnemies.map(e => e ? {...e} : e);
      let curTempHp = tempHp;

      // --- 1. Enemy status ticks ---
      for (let i = 0; i < curEnemies.length; i++) {
        let e = curEnemies[i];
        if (!e || e.hp <= 0) continue;
        if ((e.poison||0) > 0) {
          const newHp = e.hp - 1, left = e.poison - 1;
          addLog(`☠ ${e.name} POISON! 1 DMG${left>0?` (${left} LEFT)`:" CURED!"}`, "level");
          e = { ...e, hp: Math.max(0, newHp), poison: left };
          if (e.hp === 0) addLog(`${e.name} SUCCUMBS TO POISON!`, "gold");
        }
        if (e.hp > 0 && (e.burn||0) > 0) {
          const newHp = e.hp - 2, left = e.burn - 1;
          addLog(`🔥 ${e.name} BURN! 2 DMG${left>0?` (${left} LEFT)`:" FADED!"}`, "level");
          e = { ...e, hp: Math.max(0, newHp), burn: left };
          if (e.hp === 0) addLog(`${e.name} IS CONSUMED BY FLAMES!`, "gold");
        }
        if (e.hp > 0 && (e.bleed||0) > 0) {
          const left = e.bleed - 1;
          e = { ...e, bleed: Math.max(0, left) };
          if (left <= 0) addLog(`🩸 ${e.name} BLEED FADED.`, "miss");
        }
        curEnemies[i] = e;
      }

      // --- 2. Player status ticks (once per round) ---
      if (poison > 0) {
        const newHp = curP.hp - 1, left = poison - 1;
        setPoison(left);
        addLog(`☠ POISON! 1 DMG!${left>0?` (${left} LEFT)`:" CURED!"}`, "warn");
        if (newHp <= 0) {
          setPlayer(prev=>({...prev,hp:0})); setEnemies(curEnemies);
          saveHighScore(gold); setPhase("lose"); addLog("POISON CLAIMED YOUR LIFE...","warn");
          return;
        }
        curP = {...curP, hp:newHp};
      }
      if (burn > 0) {
        const newHp = curP.hp - 2, left = burn - 1;
        setBurn(left);
        addLog(`🔥 BURN! 2 DMG!${left>0?` (${left} LEFT)`:" FADED!"}`, "warn");
        if (newHp <= 0) {
          setPlayer(prev=>({...prev,hp:0})); setEnemies(curEnemies);
          saveHighScore(gold); setPhase("lose"); addLog("THE FLAMES TOOK YOU...","warn");
          return;
        }
        curP = {...curP, hp:newHp};
      }
      if (bleed > 0) {
        const left = bleed - 1;
        setBleed(left);
        if (left <= 0) addLog("🩸 BLEED FADED.", "miss");
      }

      // --- 3. Archer flee check (per enemy) ---
      for (let i = 0; i < curEnemies.length; i++) {
        const e = curEnemies[i];
        if (!e || e.hp <= 0) continue;
        if (e.fleesWhenLow && e.hp <= Math.ceil(e.maxHp*0.3) && pct(35)) {
          addLog(`${e.name} FLEES! HALF REWARD.`, "warn");
          curEnemies[i] = { ...e, hp:0, fled:true };
        }
      }

      // Check if all enemies are dead (from status or flee) before attacks.
      if (curEnemies.every(en => !en || en.hp <= 0)) {
        setEnemies(curEnemies);
        if (curP.hp < player.hp) setPlayer(prev=>({...prev,hp:curP.hp})); // commit status damage
        resolveVictory(curEnemies);
        return;
      }

      // --- 4. Each alive enemy attacks (staggered) ---
      // Each enemy swings in its own frame: own log, own animation, own player-HP commit, own shake.
      // This makes multi-enemy rooms visibly feel like a one-vs-many fight rather than a single blur
      // of damage at the end. Walks the array recursively via setTimeout so React can render between.
      let stunApplied = false;

      const finishTurn = () => {
        // Post-round victory check (counter kills).
        if (curEnemies.every(en => !en || en.hp <= 0)) { resolveVictory(curEnemies); return; }
        if (stunApplied) {
          setTimeout(() => {
            setStun(0); addLog("💫 STUN WEARS OFF.", "miss");
            runEnemyTurn(curP, curEnemies);
          }, 1100);
        } else {
          setPhase("player"); addLog("YOUR TURN.", "sys");
        }
      };

      const attackOne = (i) => {
        // Skip dead/null enemies (may be several in a row after counter kills, witch heals, etc.).
        while (i < curEnemies.length && (!curEnemies[i] || curEnemies[i].hp <= 0)) i++;
        if (i >= curEnemies.length) { finishTurn(); return; }
        const e = curEnemies[i];

        // Healer behavior: a Witch with allies present heals the most-wounded other foe instead of
        // attacking. If she's alone (or no ally is hurt) but she's below half HP, she self-heals.
        if (e.healsAllies) {
          const wounded = curEnemies
            .map((other, j) => ({other, j}))
            .filter(x => x.j !== i && x.other && x.other.hp > 0 && x.other.hp < x.other.maxHp)
            .sort((a,b) => (a.other.hp/a.other.maxHp) - (b.other.hp/b.other.maxHp))[0];
          if (wounded) {
            const heal = 3;
            const tgt = wounded.other;
            const newHp = Math.min(tgt.maxHp, tgt.hp + heal);
            const actual = newHp - tgt.hp;
            curEnemies[wounded.j] = { ...tgt, hp: newHp };
            addLog(`✦ ${e.name} HEALS ${tgt.name} +${actual} HP!`, "enemy");
            setEnemies([...curEnemies]);
            setTimeout(() => attackOne(i + 1), 700);
            return;
          }
          if (e.hp < e.maxHp * 0.5) {
            const heal = 2;
            const newHp = Math.min(e.maxHp, e.hp + heal);
            const actual = newHp - e.hp;
            curEnemies[i] = { ...e, hp: newHp };
            addLog(`✦ ${e.name} CHANNELS HEALING! +${actual} HP!`, "enemy");
            setEnemies([...curEnemies]);
            setTimeout(() => attackOne(i + 1), 700);
            return;
          }
          // Otherwise fall through to a normal (weak) attack.
        }

        const {dmgToPlayer:rawDmg, counterDmg, results, gotCrit, didPoison, didBurn, didBleed, didStun} = enemyAttack(curP, e, devMode);
        const dmgToPlayer = devMode ? 0 : (bleed > 0 ? Math.ceil(rawDmg * 1.5) : rawDmg);
        results.forEach(r => addLog(r.text, r.type));

        if (didPoison) {
          if (pct(curP.poisonResist||0)) addLog("☠ POISON RESISTED!", "level");
          else { setPoison(3); addLog(poison>0?"☠ POISON REFRESHED!":"☠ POISONED! 3 TURNS!", "warn"); }
        }
        if (didBurn)  { setBurn(3);  addLog(burn>0?"🔥 BURN REFRESHED!":"🔥 BURNING! 3 TURNS!", "warn"); }
        if (didBleed) { setBleed(3); addLog(bleed>0?"🩸 BLEED REFRESHED!":"🩸 BLEEDING! 3 TURNS! (+50% DMG)", "warn"); }
        if (didStun)  { setStun(1);  addLog("💫 STUNNED! YOUR NEXT TURN IS SKIPPED!", "warn"); stunApplied = true; }

        if (dmgToPlayer > 0) setGameStats(s=>({...s,biggestHitTaken:Math.max(s.biggestHitTaken,dmgToPlayer)}));

        // Counter damage routes back to THIS attacker only.
        if (counterDmg > 0) {
          const newEnemyHp = Math.max(0, e.hp - counterDmg);
          curEnemies[i] = { ...curEnemies[i], hp: newEnemyHp };
          if (newEnemyHp === 0) addLog(`${e.name} FELL TO YOUR COUNTER!`, "level");
        }

        // Temp HP absorbs incoming damage before real HP (Sage's Reservoir).
        let dmgRemaining = dmgToPlayer;
        if (curTempHp > 0 && dmgRemaining > 0) {
          const absorbed = Math.min(curTempHp, dmgRemaining);
          curTempHp -= absorbed;
          dmgRemaining -= absorbed;
          if (absorbed > 0) addLog(`✦ TEMP HP ABSORBS ${absorbed}${curTempHp > 0 ? ` (${curTempHp} LEFT)` : " (DEPLETED)"}`, "level");
        }

        // Apply this swing's damage to the player.
        let newHp = curP.hp - dmgRemaining;
        if (newHp <= 0 && curP.ironWill && !ironUsed) {
          newHp = 1; setIronUsed(true); addLog("IRON WILL! SURVIVED WITH 1 HP!", "level");
        }
        curP = { ...curP, hp: newHp };

        // Per-attack visual: animation, HP commit, shake — so this enemy's swing is visibly its own.
        setPlayer(prev => ({...prev, hp: curP.hp}));
        setEnemies([...curEnemies]);
        setTempHp(curTempHp);
        const r0 = results[0];
        if      (r0?.type === 'dodge') triggerArenaAnim('dodge',    'attack', 600);
        else if (r0?.type === 'miss')  triggerArenaAnim('idle',     'attack', 600);
        else if (gotCrit)              triggerArenaAnim('crit-hit', 'attack', 700);
        else                           triggerArenaAnim('hit',      'attack', 600);
        shake("player");

        if (newHp <= 0) {
          setPlayer(prev=>({...prev,hp:0})); setEnemies(curEnemies);
          saveHighScore(gold); setPhase("lose"); addLog("YOU HAVE FALLEN...", "warn");
          return;
        }

        setTimeout(() => attackOne(i + 1), 700);
      };

      attackOne(0);
    }, 750);
  }

  // resolveVictory accepts an array of defeated enemies (a single-enemy room passes a length-1 array).
  // XP, gold, and kill-count stats are aggregated per enemy. Fled enemies (Archer) contribute half
  // rewards. Boss kills (only solo, in boss rooms) regenerate the floor + open shop.
  function resolveVictory(defeatedList) {
    const defeated = Array.isArray(defeatedList) ? defeatedList.filter(Boolean) : [defeatedList].filter(Boolean);
    if (defeated.length === 0) { setPhase("win"); return; }
    const greedMult = equipment.rings.some(r=>r.id==='ring_greed') ? 1.5 : 1;
    let xpGained = 0;
    let goldEarned = 0;
    const killStatsPatch = {};
    for (const e of defeated) {
      const fled    = !!e.fled;
      const baseXp  = e.xp ?? 1;
      const xp      = fled ? Math.ceil(baseXp/2) : baseXp;
      const gMin    = fled ? 1 : e.goldMin;
      const gMax    = fled ? Math.ceil((e.goldMax||2)/2) : e.goldMax;
      const goldRaw = gMin + Math.floor(Math.random()*(gMax-gMin+1));
      xpGained   += xp;
      goldEarned += Math.round(goldRaw * greedMult);
      killStatsPatch[e.name] = (killStatsPatch[e.name]||0) + 1;
    }
    setGold(g => g + goldEarned);
    setGameStats(s => ({
      ...s,
      killCounts: Object.entries(killStatsPatch).reduce(
        (acc, [name, n]) => ({...acc, [name]: (acc[name]||0) + n}),
        {...s.killCounts}
      ),
    }));
    let newXp = xp + xpGained, newLevel = level, nextPlayer = {...player}, didLevel = false;
    if (newXp >= XP_NEEDED) {
      newXp -= XP_NEEDED; newLevel++; didLevel = true;
      const hpRoll = roll(8);
      nextPlayer = {...nextPlayer, hitDice:[...(nextPlayer.hitDice||[8]), hpRoll]};
      const effectiveMax = getEffectivePlayer(nextPlayer, equipment).maxHp;
      const heal = Math.ceil(effectiveMax/2);
      nextPlayer = {...nextPlayer, hp: Math.min(nextPlayer.hp+heal, effectiveMax)};
      setPlayer(nextPlayer);
      addLog(`★ LEVEL UP! LV ${newLevel}! HD8 ROLLED ${hpRoll} · +${heal} HP! ★`, "level");
    }
    setXp(newXp); setLevel(newLevel);
    setTimeout(()=>{
      // Defeat log — single enemy reads natural, multi summarises with "&".
      const names = defeated.map(e => e.name).join(" & ");
      addLog(`${names} DEFEATED! +${goldEarned} 💰`, "gold");
      setRestUsed(false);
      const wasBossFight = defeated.some(e => e.isBoss);
      const roomKey = defeated[0]?.roomKey;
      if (wasBossFight) {
        // Boss kill transforms the boss tile into stairs. Player stays put; floor persists until
        // they choose to descend (walk onto the stairs tile or click DESCEND from the HERE strip).
        setFloorRooms(rooms => rooms.map(r => r.isBoss ? {
          ...r,
          isBoss: false,
          descend: true,
          cleared: true,
          enemies: [],
          icon: "⇣",
          label: "STAIRS DOWN",
          desc: "DESCEND TO NEXT FLOOR",
        } : r));
        addLog("⇣ STAIRS REVEALED — DESCEND WHEN READY.", "level");
      } else if (roomKey) {
        // Mark the room cleared; the rest of the floor persists.
        setFloorRooms(rooms => rooms.map(r => r.key === roomKey ? {...r, cleared:true} : r));
      }
      if (newLevel >= 21) { saveHighScore(gold + goldEarned); setEnemies([]); setPhase("gamewon"); return; }
      if (wasBossFight) {
        const avail = getAvailableEquipment(equipment);
        setShopItems([...pickRandom(SHOP_CONSUMABLES,3), ...pickShopEquipment(avail, Math.min(2,avail.length), idlePlayer, equipment)]);
        setShopUnlocked(true);
      }
      didLevel ? triggerLevelUp(newLevel, nextPlayer) : setPhase("win");
    }, 200);
  }

  function buyItem(item) {
    const cost = getShopCost(item,idlePlayer);
    if (gold<cost) return;
    if (!canEquipItem(item, equipment, idlePlayer)) return;
    setGold(g=>g-cost);
    if (item.slot) {
      // Anything displaced from a slot moves to inventory so the player can re-equip or sell later.
      const displaced = [];
      if (item.slot !== 'ring') {
        if (equipment[item.slot]) displaced.push(equipment[item.slot]);
        // Equipping a 2H weapon also evicts the offhand (shield or off-weapon).
        if (item.slot === 'weapon' && item.hand === 'two' && equipment.offhand) {
          displaced.push(equipment.offhand);
        }
      }
      if (displaced.length) {
        setInventory(inv => displaced.reduce((acc, d) => addToInventory(acc, d), inv));
        displaced.forEach(d => addLog(`📦 ${d.label} → INVENTORY`, "sys"));
      }
      setEquipment(eq=>{
        if (item.slot==='ring') return {...eq,rings:[...eq.rings,item]};
        const next = {...eq,[item.slot]:item};
        if (item.slot==='weapon' && item.hand==='two') next.offhand = null;
        return next;
      });
      setShopItems(prev=>prev.filter(i=>i.id!==item.id&&(item.slot==='ring'||i.slot!==item.slot)));
    } else {
      // Consumables stay in the shop after purchase so the player can stock up on antidotes, potions etc.
      setInventory(inv=>addToInventory(inv, item));
    }
  }

  function restart() {
    setPlayer({...PLAYER_BASE}); setEnemies([]); setPhase("title"); setShowScores(false);
    setLog([{text:"PRESS START TO BEGIN",type:"sys"}]);
    setLevel(1); setXp(0); setRestXpLost(0); setGold(0);
    setPickedStats([]); setLevelUpOpts([]); setShopItems([]);
    setInventory([]); setTempBuffs([]); setShopUnlocked(false);
    setEquipment({...EMPTY_EQUIP});
    setWaveNumber(1); setFloorRooms(makeFloorMap(1,1,applyAbilityStats(PLAYER_BASE),false)); setPlayerPos({col:0, row:0}); setSelectingItem(false);
    setArenaAnim({player:'idle',enemy:'idle'});
    setPoison(0); setBurn(0); setBleed(0); setStun(0); setTempHp(0);
    setUnspentPoints(0); setDraft(null);
    setGameStats({biggestHit:0,biggestHitTaken:0,killCounts:{},itemsUsed:{}});
  }

  const inBattle   = ["player","enemy","win","lose","levelup","perk","wisperk"].includes(phase);
  // Floor progression — count of cleared fight rooms (excludes boss/stairs, which regen the floor).
  const clearedFightRooms = floorRooms.filter(r => r.cleared && !r.isBoss && !r.descend).length;
  const totalFightRooms   = floorRooms.filter(r => !r.isBoss && !r.descend).length;
  const pa=arenaAnim.player, ea=arenaAnim.enemy;

  const playerAnim =
    pa==='attack'   ? 'playerSwing 0.56s ease-in-out'         :
    pa==='miss'     ? 'missSwing 0.56s ease-in-out'           :
    pa==='hit'      ? 'getHit 0.56s ease-in-out'              :
    pa==='crit-hit' ? 'getCrit 0.68s ease-in-out'             :
    pa==='dodge'    ? 'playerDodge 0.56s ease-in-out'         :
    stun>0          ? 'stunPulse 0.5s ease-in-out infinite'    :
    burn>0          ? 'burnPulse 0.8s ease-in-out infinite'   :
    poison>0        ? 'poisonPulse 1.2s ease-in-out infinite' : 'none';

  const enemyAnim =
    ea==='attack' ? 'enemySwing 0.56s ease-in-out'    :
    ea==='hit'    ? 'getHit 0.56s ease-in-out'        :
    ea==='crit'   ? 'getCrit 0.68s ease-in-out'       :
    ea==='dodge'  ? 'enemyDodge 0.56s ease-in-out'    :
    enemy?.isBoss ? 'bossGlow 2s ease-in-out infinite': 'none';

  const mostKilled = Object.entries(gameStats.killCounts).sort((a,b)=>b[1]-a[1])[0];
  const mostUsed   = Object.entries(gameStats.itemsUsed).sort((a,b)=>b[1]-a[1])[0];

  return (
    <>
      <style>{CSS}</style>
      <div style={{ minHeight:"100vh", background:"#080804", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24, fontFamily:"'Press Start 2P', monospace" }}>

        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}>
          <div style={{ color:"#f8e000", fontSize:15, letterSpacing:"0.12em", textShadow:"2px 2px #000, 0 0 18px rgba(248,224,0,0.35)" }}>✦ DUNGEON QUEST ✦</div>
          <button onClick={()=>setDevMode(d=>!d)}
                  style={{ fontFamily:"'Press Start 2P', monospace", fontSize:7, padding:"4px 8px", background:devMode?"#00101a":"#0a0a0a", border:`2px solid ${devMode?"#00c8f8":"#3a3010"}`, color:devMode?"#00c8f8":"#3a3010", cursor:"pointer", letterSpacing:"0.04em" }}>
            {devMode?"★ DEV":"DEV"}
          </button>
        </div>
        {phase!=="title" && (
          <>
            <div style={{ color:"#5a4a18", fontSize:8, marginBottom:6, letterSpacing:"0.12em" }}>
              LV {level}  ·  XP {xp}/{XP_NEEDED}  ·  💰 {gold}
              {player.doubleStrikeChance>0 && <span>  ·  {player.tripleStrikeChance>0?`⚔⚔⚔ ${player.tripleStrikeChance}%`:player.doubleStrikeChance>=100?"⚔⚔ 100%":`⚔⚔ ${player.doubleStrikeChance}%`}</span>}
              {player.ironWill    && "  ·  🛡"}
              {player.armorPierce && "  ·  💥"}
              {player.dualWield   && "  ·  ⚔⚔"}
              {poison>0           && <span style={{color:"#80d050"}}>  ·  ☠×{poison}</span>}
              {burn>0             && <span style={{color:"#e08020"}}>  ·  🔥×{burn}</span>}
              {bleed>0            && <span style={{color:"#e04040"}}>  ·  🩸×{bleed}</span>}
              {stun>0             && <span style={{color:"#80d0f8"}}>  ·  💫 STUNNED</span>}
            </div>
            <div style={{ color:"#3a2e0a", fontSize:7, marginBottom:14 }}>FLOOR {waveNumber} · ROOMS CLEARED {clearedFightRooms}/{totalFightRooms}</div>

            <div style={{ width:"100%", maxWidth:560, height:6, background:"#14140a", border:"2px solid #2e2808", marginBottom:18 }}>
              <div style={{ width:`${clamp((xp/XP_NEEDED)*100,0,100)}%`, height:"100%", background:"#80d0f8", transition:"width 0.5s" }} />
            </div>
          </>
        )}

        <div style={{ width:"100%", maxWidth:560 }}>

          {phase==="title" && (
            <TileBox highlight style={{ textAlign:"center", padding:32 }}>
              <div style={{ fontSize:38, marginBottom:18 }}>🧝⚔️🏰</div>
              <div style={{ color:"#b8a840", fontSize:10, marginBottom:8, lineHeight:2.4 }}>DUNGEON GATES<br />STAND OPEN</div>
              <div style={{ color:"#3a3010", fontSize:8, marginBottom:22, lineHeight:2.2 }}>
                LV {level} · HP {idlePlayer.hp}/{idlePlayer.maxHp} · ATK {dmgRange(idlePlayer.atkDmg,idlePlayer.dieIdx)}<br />
                STR {player.strength} · DEX {player.dexterity} · CON {player.constitution} · WIS {player.wisdom} · CHA {player.charisma} · INT {player.intelligence}
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                <Btn onClick={()=>{ setShowScores(false); beginCreation(); }} variant="neutral">▶ START</Btn>
                <Btn onClick={()=>setShowScores(s=>!s)} variant="gold">🏆 HIGH SCORES</Btn>
              </div>
              {showScores && (
                <div style={{ marginTop:20, borderTop:"2px solid #2e2808", paddingTop:16 }}>
                  {highScores.length>0 ? highScores.map((s,i)=>(
                    <div key={i} style={{ fontSize:7, color:"#5a4018", lineHeight:2.4 }}>
                      {i+1}. 💰 {s.gold} <span style={{color:"#3a2e0a"}}>— {s.date}</span>
                    </div>
                  )) : <div style={{ fontSize:8, color:"#5a4a18", lineHeight:2.4 }}>NO HIGH SCORES YET</div>}
                </div>
              )}
            </TileBox>
          )}
          {phase==="create" && draft && (() => {
            const STATS = [
              { id:"strength",     short:"STR", label:"STRENGTH"     },
              { id:"dexterity",    short:"DEX", label:"DEXTERITY"    },
              { id:"constitution", short:"CON", label:"CONSTITUTION" },
              { id:"wisdom",       short:"WIS", label:"WISDOM"       },
              { id:"charisma",     short:"CHA", label:"CHARISMA"     },
              { id:"intelligence", short:"INT", label:"INTELLIGENCE" },
            ];
            return (
              <TileBox highlight style={{ padding:20 }}>
                <div style={{ color:"#f8e000", fontSize:12, marginBottom:14, textAlign:"center" }}>★ FORGE YOUR HERO ★</div>
                <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                  <div>
                    <div style={{ fontSize:8, color:"#806010", marginBottom:6 }}>NAME</div>
                    <input value={draft.name} onChange={e=>setDraft(d=>({...d, name: e.target.value.slice(0,16) || "Hero"}))}
                           style={{ width:"100%", boxSizing:"border-box", background:"#08080a", border:"2px solid #5a4a18", color:"#f8e000",
                                    fontFamily:"'Press Start 2P', monospace", fontSize:10, padding:"8px 10px", outline:"none" }} />
                  </div>
                  <div>
                    <div style={{ fontSize:8, color:"#806010", marginBottom:6 }}>EMOJI · CURRENT {draft.emoji}</div>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(6, 1fr)", gap:4 }}>
                      {EMOJI_POOL.map(e => (
                        <button key={e} onClick={()=>setDraft(d=>({...d, emoji:e}))}
                                style={{ fontSize:20, padding:"8px 4px", cursor:"pointer",
                                         background: draft.emoji===e ? "#1a2010" : "#08080a",
                                         border:`2px solid ${draft.emoji===e ? "#f8e000" : "#3a3010"}`,
                                         outline:"1px solid #000" }}>{e}</button>
                      ))}
                    </div>
                  </div>
                  <div style={{ background:"#08080a", border:"2px solid #2e2808", padding:"8px 10px", fontSize:9, color:"#80b8e8", textAlign:"center" }}>
                    POINTS REMAINING · {unspentPoints}
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                    {STATS.map(s => {
                      const v = draft[s.id];
                      const mod = abilityMod(v);
                      const upCost = POINT_COST_STEP(v);
                      const canUp = v < 18 && upCost <= unspentPoints;
                      const canDown = v > 8;
                      return (
                        <div key={s.id} style={{ background:"#06060a", border:"1px solid #2e2808", padding:"6px 8px" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                            <div style={{ flex:1, fontSize:9, color:"#b8a840" }}>{s.short} <span style={{color:"#3a3010"}}>—</span> <span style={{color:"#80d050"}}>{v}</span> <span style={{color:"#3a3010", fontSize:7}}>(mod {mod>=0?"+":""}{mod})</span></div>
                            <button onClick={()=>draftAdjust(s.id, -1)} disabled={!canDown}
                                    style={{ width:30, height:26, cursor: canDown ? "pointer" : "default",
                                             background:"#180808", border:`2px solid ${canDown ? "#802020" : "#3a3010"}`, outline:"1px solid #000",
                                             color: canDown ? "#e05050" : "#3a3010", fontFamily:"'Press Start 2P', monospace", fontSize:10 }}>−</button>
                            <button onClick={()=>draftAdjust(s.id, +1)} disabled={!canUp}
                                    style={{ width:30, height:26, cursor: canUp ? "pointer" : "default",
                                             background:"#080e08", border:`2px solid ${canUp ? "#205020" : "#3a3010"}`, outline:"1px solid #000",
                                             color: canUp ? "#50c050" : "#3a3010", fontFamily:"'Press Start 2P', monospace", fontSize:10 }}>+</button>
                            <div style={{ width:36, fontSize:7, color: canUp ? "#806030" : "#3a3010", textAlign:"right" }}>{v < 18 ? `−${upCost}` : "MAX"}</div>
                          </div>
                          <div style={{ marginTop:4, fontSize:7, color:"#608060", lineHeight:1.6 }}>{statEffectLine(s.id, v)}</div>
                        </div>
                      );
                    })}
                  </div>
                  <Btn onClick={finishCreation} variant="neutral">▶ BEGIN ADVENTURE{unspentPoints>0 && <span style={{color:"#806030",fontSize:8}}> ({unspentPoints} PTS BANKED)</span>}</Btn>
                </div>
              </TileBox>
            );
          })()}

          {phase==="gamewon" && (
            <TileBox highlight style={{ textAlign:"center", padding:24 }}>
              <div style={{ color:"#f8e000", fontSize:12, marginBottom:6, animation:"blink 0.8s infinite" }}>★ DUNGEON CLEARED! ★</div>
              <div style={{ color:"#80d0f8", fontSize:8, marginBottom:20, lineHeight:2.4 }}>LEVEL {level} REACHED!<br />FINAL GOLD: 💰 {gold}</div>
              <div style={{ textAlign:"left", fontSize:8, color:"#5a4a18", lineHeight:2.4, marginBottom:20 }}>
                {gameStats.biggestHit>0      && <div>⚔ BIGGEST HIT: <span style={{color:"#50d850"}}>{gameStats.biggestHit} DMG</span></div>}
                {gameStats.biggestHitTaken>0 && <div>💥 BIGGEST HIT TAKEN: <span style={{color:"#e04040"}}>{gameStats.biggestHitTaken} DMG</span></div>}
                {mostKilled && <div>💀 MOST KILLED: <span style={{color:"#f8c840"}}>{mostKilled[0]} ×{mostKilled[1]}</span></div>}
                {mostUsed   && <div>🎒 MOST USED ITEM: <span style={{color:"#c080f8"}}>{mostUsed[0]} ×{mostUsed[1]}</span></div>}
              </div>
              <Btn onClick={restart} variant="gold">▶ PLAY AGAIN</Btn>
            </TileBox>
          )}

          {inBattle && enemies.length > 0 && (
            <>
              <div style={{ border:"3px solid #1a1a0a", outline:"3px solid #000", outlineOffset:-6, background:"#050b06", marginBottom:14, padding:"18px 12px 14px" }}>
                <div style={{ display:"flex", justifyContent:"space-around", alignItems:"flex-end", minHeight:86 }}>
                  <div style={{ textAlign:"center", flex:1 }}>
                    <div style={{ fontSize:44, lineHeight:1, display:"inline-block", animation:playerAnim }}>{player.emoji}</div>
                    <div style={{ height:2, background:"#1c2210", margin:"6px auto 0", width:56 }} />
                    <div style={{ fontSize:6, color:"#303820", marginTop:4 }}>
                      {player.name}
