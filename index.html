                    {shopItems.filter(i=>i.slot).map(item=>{
                      const cost = getShopCost(item,idlePlayer);
                      const equipOK = canEquipItem(item, equipment, idlePlayer);
                      // Offhand path: a light weapon can be sent straight to the offhand slot when
                      // the player has Dual Wield + a light main. Shows up as a second BUY button.
                      const offhandOK = canEquipToOffhand(item);
                      let reason = '';
                      if (!equipOK && item.slot==='offhand') {
                        if (equipment.weapon?.hand==='two')                       reason = 'TWO-HANDED WEAPON BLOCKS OFFHAND';
                        else if (item.dieIdx!=null && !idlePlayer.dualWield)      reason = 'NEEDS DUAL WIELD PERK';
                        else if (item.dieIdx!=null && equipment.weapon?.hand!=='light') reason = 'NEEDS LIGHT MAIN WEAPON';
                      }
                      const illiterate = isIlliterate(roomPlayer);
                      const slotTag = offhandOK ? "MAIN" : `${item.slot.toUpperCase()}${item.hand?` ${item.hand.toUpperCase()}`:''}`;
                      return (
                        <React.Fragment key={item.id}>
                          <Btn onClick={()=>buyItem(item)} variant="shop" disabled={gold<cost || !equipOK}>
                            {item.emoji} {labelItem(item,roomPlayer)}  <span style={{color:"#f8c840"}}>[{cost}💰]</span>
                            {!illiterate && <span style={{color:"#806040",fontSize:10}}> [{slotTag}]</span>}<br />
                            <span style={{color:"#503870",fontSize:11}}>{describeItem(item,roomPlayer)}</span>
                            {reason && !illiterate && <><br /><span style={{color:"#e08020",fontSize:10}}>⚠ {reason}</span></>}
                          </Btn>
                          {offhandOK && (
                            <Btn onClick={()=>buyItem(item, 'offhand')} variant="stat" disabled={gold<cost}>
                              🛡 {item.emoji} {labelItem(item,roomPlayer)} → OFFHAND  <span style={{color:"#f8c840"}}>[{cost}💰]</span><br />
                              <span style={{color:"#405870",fontSize:11}}>DUAL WIELD · SECOND LIGHT WEAPON</span>
                            </Btn>
                          )}
                        </React.Fragment>
                      );
                    })}
                  </div>
                </>
              )}
              {shopItems.filter(i=>!i.slot).length>0 && (
                <>
                  <div style={{ fontSize:10, color:"#806030", letterSpacing:"0.1em", marginBottom:8 }}>🧪 CONSUMABLES</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:14 }}>
                    {shopItems.filter(i=>!i.slot).map(item=>{
                      const cost=getShopCost(item,idlePlayer);
                      return (
                        <Btn key={item.id} onClick={()=>buyItem(item)} variant="shop" disabled={gold<cost}>
                          ▶ {labelItem(item,roomPlayer)}  <span style={{color:"#f8c840"}}>[{cost}💰]</span><br />
                          <span style={{color:"#503870",fontSize:11}}>{describeItem(item,roomPlayer)}</span>
                        </Btn>
                      );
                    })}
                  </div>
                </>
              )}
              {shopItems.length===0 && <div style={{ color:"#604090", fontSize:9, textAlign:"center", padding:12, marginBottom:14 }}>SOLD OUT</div>}
              {inventory.length>0 && (
                <>
                  <div style={{ fontSize:10, color:"#806030", letterSpacing:"0.1em", marginBottom:8 }}>💰 SELL FROM BAG ({inventory.length})</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:14 }}>
                    {inventory.map((item,i)=>{
                      const sellValue = Math.max(1, Math.floor((item.cost||0)/2));
                      const isEquip = !!item.slot;
                      const count = item.count||1;
                      const countTag = count>1 ? ` (×${count})` : '';
                      return (
                        <Btn key={`sell_${i}`} onClick={()=>handleSellItem(item)} variant="gold">
                          {isEquip?'⚔':'▶'} {item.label}{countTag}  <span style={{color:"#f8c840"}}>[+{sellValue}💰]</span><br />
                          <span style={{color:"#806010",fontSize:11}}>{item.desc}</span>
                        </Btn>
                      );
                    })}
                  </div>
                </>
              )}
              <Btn onClick={()=>{ setShopUnlocked(false); setPhase("idle"); }} variant="flee">🚪  BACK TO DUNGEON</Btn>
            </TileBox>
          )}

          {phase==="rest" && (
            <TileBox style={{ textAlign:"center", padding:32 }}>
              <div style={{ fontSize:32, marginBottom:16 }}>🏕️</div>
              <div style={{ color:"#b8a840", fontSize:10, marginBottom:8, lineHeight:2.4 }}>CAMPFIRE LIT<br />WOUNDS MENDED</div>
              <div style={{ color:"#5a4a18", fontSize:11, marginBottom:6, lineHeight:2 }}>
                ENEMIES STILL ROAM THE HALLS
              </div>
              <div style={{ color:"#50c050", fontSize:11, marginBottom:24, lineHeight:2 }}>HP FULLY RESTORED · STATUS CLEARED</div>
              <Btn onClick={()=>{ setPlayer(p=>({...p,hp:getEffectivePlayer(p,equipment).maxHp})); setPoison(0); setBurn(0); setBleed(0); setStun(0); setPhase("idle"); }} variant="neutral">▶ BREAK CAMP</Btn>
            </TileBox>
          )}

          {phase==="idle" && (
            <TileBox style={{ textAlign:"center", padding:28 }}>
              <div style={{ fontSize:34, marginBottom:14 }}>🧝🧭🕯️</div>
              <div style={{ color:"#b8a840", fontSize:10, marginBottom:8, lineHeight:2.4 }}>CHOOSE YOUR PATH</div>
              <div style={{ color:"#a88a52", fontSize:11, marginBottom:14, letterSpacing:"0.06em" }}>
                FLOOR {waveNumber} · {clearedFightRooms}/{totalFightRooms} CLEARED
              </div>
              <FloorMap waveNumber={waveNumber} floorRooms={floorRooms} playerPos={playerPos}
                        revealAll={devMode} onEnter={handleRoomEnter} playerEmoji={player.emoji} />
              {/* Selected-tile detail strip — shows the room the player is hovering / standing on.
                  We render the player's current tile by default since touch devices have no hover. */}
              {(() => {
                const here = floorRooms.find(r => r.pos && r.pos.col === playerPos.col && r.pos.row === playerPos.row);
                if (!here) return null;
                const showEnemies = (here.enemyKnown || devMode) && here.enemies && here.enemies.length > 0;
                const preview = showEnemies
                  ? (here.enemies.length === 1
                      ? `${here.enemies[0].emoji} ${here.enemies[0].name}`
                      : here.enemies.map(e => `${e.emoji} ${e.name}`).join(" + "))
                  : null;
                const trapSpotted = here.isTrap && (here.trapAware || devMode);
                const desc = here.descend ? "STAIRS DOWN · DESCEND TO NEXT FLOOR"
                           : (here.isTrap && here.cleared) ? "TRAP SPRUNG · YOU MAY MOVE ON"
                           : here.cleared ? "ROOM IS EMPTY · YOU MAY MOVE ON"
                           : here.isTrap  ? (trapSpotted ? "TRAP SPOTTED! ZIP SHRUG-OFF GETS +5" : "SOMETHING'S RIGGED · ZIP SHRUG-OFF TO DODGE")
                           : here.isBoss  ? "BOSS WAITS BEYOND"
                           : here.desc;
                return (
                  <div style={{ background:"linear-gradient(165deg,#1b130a,#100b06)", border:"2px solid #4a371d", borderRadius:12, padding:"11px 13px", marginBottom:14, textAlign:"left", boxShadow:"inset 0 2px 0 rgba(255,224,160,0.06)" }}>
                    <div style={{ fontSize:13, color:"#f8e000", fontWeight:600, marginBottom:8 }}>{here.icon} HERE: {here.label}{here.cleared?(here.isTrap?" (SPRUNG)":" (CLEARED)"):""}</div>
                    <div style={{ fontSize:12, color: here.isTrap&&!here.cleared?"#e0a040":"#a3c79f", lineHeight:1.6 }}>{desc}</div>
                    {preview && <div style={{ fontSize:11, color:"#e08020", marginTop:6 }}>⚠ {preview}</div>}
                    {!here.cleared && !here.descend && (
                      <div style={{ marginTop:8 }}>
                        <Btn onClick={()=>handleRoomEnter(here)} variant={here.isBoss?"attack":here.isTrap?"flee":"neutral"}>
                          {here.isBoss?"⚔ FIGHT THE BOSS":here.isTrap?"⚠ RISK THE TRAP":"⚔ ENGAGE"}
                        </Btn>
                      </div>
                    )}
                    {here.descend && (
                      <div style={{ marginTop:8 }}>
                        <Btn onClick={()=>handleRoomEnter(here)} variant="stat">⇣ DESCEND</Btn>
                      </div>
                    )}
                  </div>
                );
              })()}
              <div style={{ color:"#9a7c44", fontSize:11, marginBottom:14, lineHeight:1.6, textAlign:"center" }}>
                ▷ CLICK A LIT TILE TO MOVE · ?-TILES UNKNOWN · ENGAGE FROM CURRENT TILE
              </div>
              {unspentPoints>0 && (
                <div style={{ background:"#120c06", border:"2px solid #4a371d", borderRadius:10, padding:"7px 11px", marginBottom:12, fontSize:10, color:"#a3daf6", textAlign:"center" }}>
                  ✦ {unspentPoints} UNSPENT POINTS BANKED · USE ON NEXT LEVEL-UP
                </div>
              )}

              <div style={{ color:"#d9bd86", fontSize:12, marginBottom:16, lineHeight:1.9 }}>
                HP {idlePlayer.hp}/{idlePlayer.maxHp} · ARM -{idlePlayer.armor} · ATK {dmgRange(idlePlayer.atkDmg,idlePlayer.dieIdx)} · SPD {idlePlayer.speed}<br />
                HIT {idlePlayer.hitChance}% · DOD {idlePlayer.dodgeChance}% · CRT {idlePlayer.critChance}% · ☠ RES {idlePlayer.poisonResist}%<br />
                {statLine(roomPlayer)}
                {player.counterChance>0 && <><br />CTR {player.counterChance}%</>}
                {player.doubleStrikeChance>0 && <><br /><span style={{color:"#e0a040"}}>⚔⚔ DOUBLE STRIKE {player.doubleStrikeChance}%</span></>}
                {player.tripleStrikeChance>0 && <><br /><span style={{color:"#f8c840"}}>⚔⚔⚔ TRIPLE STRIKE {player.tripleStrikeChance}% (AFTER A DOUBLE)</span></>}
                {player.ironWill    && <><br /><span style={{color:"#80d0f8"}}>🛡 IRON WILL READY</span></>}
                {player.armorPierce && <><br /><span style={{color:"#e080f8"}}>💥 ARMOR PIERCE READY</span></>}
                {player.dualWield   && <><br /><span style={{color:"#f8c840"}}>⚔⚔ DUAL WIELD ENABLED</span></>}
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {inventory.length>0 && !selectingItem && (
                  <Btn onClick={()=>setSelectingItem(true)} variant="shop">🎒 USE ITEM  ({inventory.reduce((s,i)=>s+(i.count||1),0)} in bag)</Btn>
                )}
                {selectingItem && (
                  <>
                    <div style={{ fontSize:11, color:"#c080f8", marginTop:4, marginBottom:6 }}>🎒 USE WHICH ITEM?</div>
                    <ItemButtons items={inventory} onUse={handleUseItem} onEquipOffhand={equipToOffhand} canEquipOffhand={canEquipToOffhand} inBattle={false} />
                    <Btn onClick={()=>setSelectingItem(false)} variant="flee">✕ CANCEL</Btn>
                  </>
                )}
                <Btn onClick={()=>{ setSelectedSlot(null); setEquipOpen(true); maybeHint("gear"); }} variant="stat">🧍 VIEW GEAR</Btn>
                <Btn onClick={enterRest} variant="flee">🏕  MAKE CAMP  (HEAL ALL · CLEAR STATUS)</Btn>
              </div>
              <div style={{ marginTop:18, display:"flex", justifyContent:"center" }}>
                <BodyLayout equip={equipment} cellSize={32} selected={null}
                            onSelect={k=>{ setSelectedSlot(k); setEquipOpen(true); maybeHint("gear"); }} />
              </div>

            </TileBox>
          )}

        </div>
      </div>

     {equipOpen && (
  // Overlay scrolls vertically (alignItems:"flex-start" + overflowY:"auto") so on phone-sized
  // viewports the gear modal can't push CLOSE GEAR off-screen. A floating ✕ in the top-right is a
  // belt-and-suspenders escape so the player can always dismiss regardless of scroll position.
  <div style={{ position:"fixed", inset:0, background:"rgba(4,3,1,0.92)", zIndex:200, display:"flex", alignItems:"flex-start", justifyContent:"center", padding:16, overflowY:"auto", WebkitOverflowScrolling:"touch" }}
       onClick={e=>{ if(e.target===e.currentTarget) setEquipOpen(false); }}>
    <div style={{ width:"100%", maxWidth:580, position:"relative" }}>
      <button onClick={()=>setEquipOpen(false)}
              aria-label="Close gear"
              style={{ position:"absolute", top:8, right:8, zIndex:1, width:38, height:38, borderRadius:"50%",
                       background:"#2a1010", border:"2px solid #c04040", color:"#ffd0d0",
                       fontSize:18, lineHeight:1, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
                       boxShadow:"0 2px 0 #501010" }}>✕</button>
      <TileBox highlight style={{ padding:24 }}>
        <div style={{ fontSize:14, color:"#f8e000", textAlign:"center", marginBottom:20, letterSpacing:"0.08em" }}>
          🧍 CHARACTER GEAR
        </div>
        
        <div style={{ display:"flex", flexWrap:"wrap", gap:24, alignItems:"flex-start", justifyContent:"center" }}>
          <BodyLayout equip={equipment} selected={selectedSlot} onSelect={setSelectedSlot} cellSize={48} />

          <div style={{ flex:"1 1 240px", minWidth:240 }}>
            <GearDetail selectedSlot={selectedSlot} equipment={equipment} />

            {/* HERO STATS — readable cartoon cards (cartoon stat names, not raw STR/DEX) */}
            {(() => {
              const chip = (label, value, tip) => (
                <div key={label} title={tip} style={{ flex:"1 1 64px", minWidth:64, background:"linear-gradient(165deg,#30220f,#1d1308)", border:"2px solid #6b4a28", borderRadius:12, padding:"7px 6px", textAlign:"center", boxShadow:"inset 0 2px 0 rgba(255,224,160,0.1), 0 3px 0 rgba(0,0,0,0.28)" }}>
                  <div style={{ fontSize:9, color:"#caa06a", letterSpacing:"0.04em" }}>{label}</div>
                  <div style={{ fontSize:14, color:"#ffe7ad", fontWeight:600, marginTop:3 }}>{value}</div>
                </div>
              );
              const statMeta = {
                strength:     { icon:"💪", perk:player.strPerk, names:{brute:"Brute Force", cleave:"Cleaving Blow"} },
                dexterity:    { icon:"💨", perk:player.dexPerk, names:{reflex:"Lightning Reflexes", flurry:"Flurry"} },
                constitution: { icon:"🪨", perk:player.conPerk, names:{vital:"Vital Surge", hide:"Iron Hide"} },
                wisdom:       { icon:"🔮", perk:player.wisPerk, names:{reservoir:"Sage's Reservoir", swift:"Swift Cure"} },
                charisma:     { icon:"😎", perk:player.chaPerk, names:{silver:"Silver Tongue", lucky:"Lucky Coin"} },
                intelligence: { icon:"🧠", perk:player.intPerk, names:{tactician:"Tactician", arcane:"Arcane Sense"} },
              };
              const specials = [];
              if (ep.poisonResist>0)       specials.push(["☠ RESIST", `${ep.poisonResist}%`]);
              if (ep.counterChance>0)      specials.push(["🗡 COUNTER", `${ep.counterChance}%`]);
              if (ep.doubleStrikeChance>0) specials.push(["⚔ DBL STRIKE", `${ep.doubleStrikeChance}%${ep.tripleStrikeChance>0?` · TPL ${ep.tripleStrikeChance}%`:""}`]);
              if (ep.armorPierce)          specials.push(["💥 PIERCE", "crits ignore armor"]);
              return (
                <div style={{ marginTop:24, padding:16, background:"linear-gradient(165deg,#241a0e,#170f07)", border:"3px solid #6b4a28", borderRadius:16, boxShadow:"inset 0 2px 0 rgba(255,224,160,0.1)" }}>
                  <div style={{ fontSize:13, color:"#ffd24a", fontWeight:600, marginBottom:12, letterSpacing:"0.05em", textShadow:"0 1px 2px rgba(0,0,0,0.5)" }}>📊 HERO STATS</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:7, marginBottom:14 }}>
                    {chip("HP", `${ep.hp}/${ep.maxHp}`, "Health — you fall at 0")}
                    {chip("ATK", dmgRange(ep.atkDmg, ep.dieIdx), "Damage before the dice roll")}
                    {chip("ARM", ep.armor, "Softens incoming hits")}
                    {chip("HIT", `${ep.hitChance}%`, "Chance to land a swing")}
                    {chip("DODGE", `${ep.dodgeChance}%`, "Chance to slip a blow")}
                    {chip("CRIT", `${ep.critChance}%`, "Chance for double damage")}
                    {chip("SPD", ep.speed, "Turn order in a fight")}
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {STAT_KEYS.map(key => {
                      const meta = statMeta[key];
                      const perkName = meta.perk ? meta.names[meta.perk] : null;
                      return (
                        <div key={key} style={{ display:"flex", alignItems:"center", gap:10, background:"rgba(255,238,200,0.045)", border:"1.5px solid #4a371d", borderRadius:11, padding:"8px 11px" }}>
                          <div style={{ fontSize:19, width:26, textAlign:"center", flexShrink:0 }}>{meta.icon}</div>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ display:"flex", alignItems:"baseline", flexWrap:"wrap", gap:8 }}>
                              <span style={{ fontSize:12, color:"#ffe7ad", fontWeight:600, letterSpacing:"0.03em" }}>{STAT_FULL[key]}</span>
                              <span style={{ fontSize:15, color:"#93e78d", fontWeight:600 }}>{ep[key]}</span>
                              {perkName && <span style={{ fontSize:11, color:"#2a1d07", background:"linear-gradient(180deg,#ffd76a,#e0a82e)", borderRadius:8, padding:"3px 9px", fontWeight:600 }}>★ {perkName}</span>}
                            </div>
                            <div style={{ fontSize:10, color:"#bda06f", marginTop:3, lineHeight:1.5 }}>{statEffectLine(key, ep[key], {level, hitDice:player.hitDice})}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  {specials.length>0 && (
                    <div style={{ display:"flex", flexWrap:"wrap", gap:7, marginTop:14, paddingTop:12, borderTop:"1.5px solid #4a371d" }}>
                      {specials.map(([label,val]) => (
                        <div key={label} style={{ background:"linear-gradient(180deg,#2a1838,#1a0f24)", border:"2px solid #a06fe0", borderRadius:10, padding:"6px 10px" }}>
                          <span style={{ fontSize:10, color:"#d0a9f5", fontWeight:600 }}>{label}</span>
                          <span style={{ fontSize:9, color:"#9b7bc0", marginLeft:6 }}>{val}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
        </div>

        <div style={{ marginTop:24, textAlign:"center" }}>
          <Btn onClick={()=>setEquipOpen(false)} variant="flee">✕ CLOSE GEAR</Btn>
        </div>
      </TileBox>
    </div>
  </div>
)}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
