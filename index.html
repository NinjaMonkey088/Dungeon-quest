const DICE_PROGRESSION = (() => {
  const d = (c,s) => ({ count:c, size:s, label:c>1?`${c}D${s}`:`D${s}` });
  const p=[];
  for (let n=1; n<=5; n++) for (const s of [4,6,8,10,12,20]) p.push(d(n,s));
  return p.sort((a, b) => (a.count * a.size) - (b.count * b.size));
})();

// ─── Helpers ──────────────────────────────────────────────────────────────────

const roll  = n => Math.floor(Math.random()*n)+1;
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const pct   = c => roll(100)<=c;
const getDie = i => DICE_PROGRESSION[Math.min(i||0,DICE_PROGRESSION.length-1)];

function rollDiceV(idx) {
  const {count,size,label} = getDie(idx);
  const rs = Array.from({length:count},()=>roll(size));
  return { total:rs.reduce((a,b)=>a+b,0), text:`[${label}:${rs.join('+')}]` };
}

function d20Hit(chance) {
  const rolled = roll(20);
  return { rolled, hit:rolled >= Math.max(1,Math.round(21-chance/5)) };
}

function dmgRange(atk, die) {
  const d = (die && typeof die==='object') ? die : getDie(die);
  return `${Math.max(0,atk+d.count)}-${atk+d.count*d.size}`;
}

function applyBuffs(p, buffs) {
  const out = {...p};
  buffs.forEach(b => { out[b.stat]=(out[b.stat]||0)+b.val; });
  return out;
}

function applyEquipment(p, equip) {
  const out = {...p};
  [...BODY_SLOTS.map(s=>equip[s.key]), ...equip.rings]
    .filter(Boolean)
    .forEach(item => Object.entries(item.stats||{}).forEach(([k,v]) => { out[k]=(out[k]||0)+v; }));
  // Both swinging weapons go into out.weapons. Offhand only counts if it's a weapon (has dieIdx) — shields just contribute stats.
  const offIsWeapon = equip.offhand?.dieIdx != null;
  const weapons = [equip.weapon, offIsWeapon ? equip.offhand : null].filter(Boolean);
  if (weapons.length > 0) {
    out.weapons = weapons;
    out.dieIdx = weapons[0].dieIdx;
    out.weaponProcs = weapons[0].procs || {};
  }
  return out;
}

const abilityMod = score => Math.floor(((score||10)-10)/2);

function applyAbilityStats(p) {
  const out = {...p};
  const str = abilityMod(out.strength);
  const dex = abilityMod(out.dexterity);
  const con = abilityMod(out.constitution);
  const wis = abilityMod(out.wisdom);
  const cha = abilityMod(out.charisma);
  const int = abilityMod(out.intelligence);
  // Max HP = floor((sum of all level rolls + conMod × #levels) / 2), plus any equipment bonus that
  // applyEquipment already summed onto out.maxHp before we got here. CON applies retroactively.
  const dice = out.hitDice || [8];
  const equipBonus = out.maxHp || 0;
  const baseHp = Math.max(1, Math.floor((dice.reduce((a,b)=>a+b,0) + con*dice.length) / 2));
  out.maxHp       = baseHp + equipBonus;
  out.hp          = Math.min(out.hp, out.maxHp);
  out.atkDmg      = Math.max(0,out.atkDmg + str);
  out.hitChance   = clamp(out.hitChance + str*5,5,200);
  out.dodgeChance = clamp(out.dodgeChance + dex*5,0,100);
  out.critChance  = clamp(out.critChance + dex*5,0,80);
  out.poisonResist= clamp((out.poisonResist||0)+Math.max(0,con)*5,0,100);
  out.awareness   = clamp((out.awareness||0)+Math.max(0,wis)*15,0,100);
  out.identify    = clamp((out.identify||0)+Math.max(0,int)*15,0,100);
  out.shopDiscount= clamp((out.shopDiscount||0)+Math.max(0,cha)*5,0,100);
  return out;
}

function getEffectivePlayer(p, equip, buffs=[]) {
  return applyBuffs(applyAbilityStats(applyEquipment(p,equip)),buffs);
}

// Weapons are always replaceable (buying a new one supplants the old). Shields too. Other slots only offer once.
const getAvailableEquipment = equip =>
  EQUIPMENT_DEFS.filter(item => {
    if (item.slot==='ring')    return equip.rings.length<5;
    if (item.slot==='weapon')  return equip.weapon?.id !== item.id;
    if (item.slot==='offhand') return equip.offhand?.id !== item.id;
    return !equip[item.slot];
  });

// Runtime equip validation. Used to grey out shop buttons that would be illegal.
function canEquipItem(item, equip, p) {
  if (item.slot === 'offhand') {
    // Two-handed main weapon blocks ANY offhand item (shield or weapon).
    if (equip.weapon?.hand === 'two') return false;
    // Offhand light weapons require dual-wield perk + light main weapon.
    if (item.dieIdx != null) {
      if (!p?.dualWield) return false;
      if (equip.weapon?.hand !== 'light') return false;
    }
  }
  return true;
}

const getShopCost = (item, p) => Math.max(1,Math.ceil(item.cost*(1-(p.shopDiscount||0)/100)));

function describeItem(item, p) {
  if (!item.slot || (p.identify||0)>=50) return item.desc;
  if (item.stats.maxHp) return "VITAL GEAR";
  if (item.stats.armor) return "DEFENSIVE GEAR";
  if (item.stats.atkDmg || item.stats.hitChance || item.stats.critChance) return "COMBAT GEAR";
  return "ENCHANTED GEAR";
}

function pickRandom(pool, n) {
  const src=[...pool], out=[];
  while (out.length<n && src.length) out.push(src.splice(Math.floor(Math.random()*src.length),1)[0]);
  return out;
}

// Shop equipment is biased toward common items: each pick has a 25% chance to come
// from the rare pool when both pools are non-empty. Falls back gracefully when one is empty.
// If the player has dual-wield + a light main weapon equipped, light weapon picks may be
// re-tagged as offhand variants so they slot into the offhand instead of replacing the main.
function pickShopEquipment(avail, n, p, equip) {
  const src=[...avail], out=[];
  const canDual = p?.dualWield && equip?.weapon?.hand === 'light';
  while (out.length<n && src.length) {
    const common=src.filter(i=>!i.rare), rare=src.filter(i=>i.rare);
    const pool = (rare.length && common.length) ? (pct(25)?rare:common) : (common.length?common:rare);
    let item = pool[Math.floor(Math.random()*pool.length)];
    src.splice(src.indexOf(item),1);
    if (canDual && item.slot === 'weapon' && item.hand === 'light' && pct(40)) {
      item = {...item, slot:'offhand', label: item.label + ' (OFF)', id: item.id + '_off'};
    }
    out.push(item);
  }
  return out;
}

const ROOM_TYPES = [
  { id:"small",  icon:"▦", label:"SMALL ROOM", desc:"A TIGHT, CLEAN FIGHT" },
  { id:"big",    icon:"▣", label:"BIG ROOM",   desc:"MORE GOLD · TOUGHER FOE", enemyMod:e=>({...e,maxHp:e.maxHp+2,hp:e.hp+2,goldMin:e.goldMin+1,goldMax:e.goldMax+3}) },
  { id:"bridge", icon:"═", label:"BRIDGE",     desc:"SWIFT FOE · GOOD GOLD", enemyMod:e=>({...e,dodgeChance:(e.dodgeChance||0)+15,goldMax:e.goldMax+2}) },
  { id:"stairs", icon:"⇣", label:"STAIRS",     desc:"DEEPER PATH · BONUS XP", enemyMod:e=>({...e,xp:e.xp+1}) },
  { id:"shrine", icon:"✚", label:"OLD SHRINE", desc:"WEAKER FOE · SMALL GOLD", enemyMod:e=>({...e,hitChance:Math.max(30,e.hitChance-10),goldMin:Math.max(1,e.goldMin-1)}) },
];

function makeRoomChoices(pos, p, revealAll=false, level=1, waveNumber=1) {
  const awareness = revealAll ? 100 : (p.awareness||0);
  const enemyKnown = () => revealAll || pct(awareness);
  if (pos>=WAVE_LENGTH-1) {
    return [{ id:"boss", icon:"▰", label:"BOSS DOOR", desc:"THE WAVE GUARDIAN WAITS",
              known:true, isBoss:true, enemy:pickBoss(waveNumber,level), enemyKnown:enemyKnown() }];
  }
  return pickRandom(ROOM_TYPES,3).map(room=>({
    ...room,
    enemy:      pickEnemy(level),
    known:      revealAll || pct(35+awareness),
    enemyKnown: enemyKnown(),
  }));
}

function applyRoomToEnemy(e, room) {
  const next = room?.enemyMod ? room.enemyMod(e) : e;
  return {...next, hp:Math.min(next.hp,next.maxHp)};
}

// Ramps to 100 by level 15, then +1/level above 15 (counters player dodge)
const roundToFive = v => Math.round(v/5)*5;
const scaleHit = (base,level) =>
  roundToFive(base + Math.min(level-1,14)/14*(100-base) + Math.max(0,level-15));

function pickEnemy(level) {
  const wave = WAVES[clamp(level-1,0,WAVES.length-1)];
  const pool = wave.flatMap(([n,w])=>Array(w).fill(n));
  const name = pool[Math.floor(Math.random()*pool.length)];
  const base = ENEMY_DEFS[name];
  const over = Math.max(0,level-WAVES.length);
  return { name, ...base,
    maxHp:     base.maxHp+over,
    hp:        base.maxHp+over,
    attack:    base.attack+Math.floor(over/5),
    hitChance: scaleHit(base.hitChance,level),
  };
}

function pickBoss(waveNumber, level) {
  if (waveNumber<=WAVE_BOSSES.length) {
    const def=WAVE_BOSSES[waveNumber-1];
    return {...def, hp:def.maxHp, hitChance:scaleHit(def.hitChance,level)};
  }
  const idx   = clamp(waveNumber-WAVE_BOSSES.length-1, 0, BOSS_DEFS.length-1);
  const def   = BOSS_DEFS[idx];
  const bonus = Math.max(0, waveNumber-WAVE_BOSSES.length-idx-1);
  return { ...def,
    maxHp:     def.maxHp+bonus*2,
    hp:        def.maxHp+bonus*2,
    attack:    def.attack+Math.floor(bonus/2),
    hitChance: scaleHit(def.hitChance,level),
    goldMin:   def.goldMin+bonus,
    goldMax:   def.goldMax+bonus*2,
    xp:        def.xp+bonus,
    name:      bonus>2?`ELDER ${def.name}`:def.name,
  };
}

// ─── Combat ───────────────────────────────────────────────────────────────────

function playerAttack(p, e, verbose=false) {
  const results = [];
  const weapons = (p.weapons && p.weapons.length) ? p.weapons : [{ dieIdx: p.dieIdx, procs: {} }];

  // 1. BLEED LOGIC: Damage increases based on how "bad" the current bleed is
  const bleedBonus = e.bleed || 0;
  const applyBleed = dmg => dmg + Math.floor(bleedBonus);

  let didPoison = false, didBurn = false, didBleed = false;
  let newBleedVal = 0;

  const doSwing = (weapon, isOffhand = false) => {
    const procs = weapon.procs || {};
    const { rolled, hit } = d20Hit(p.hitChance - e.dodgeChance);
    const wouldCrit = rolled >= 20 - p.critChance / 5;

    if (!hit && !wouldCrit) {
      results.push({ type: "miss", text: `${rolled}! ${e.dodgeChance > 0 ? "DODGE!" : "MISS!"}` });
      return 0;
    }

    const procPierce = procs.pierceChance > 0 && pct(procs.pierceChance);
    const r1 = rollDiceV(weapon.dieIdx);
    let dmg;

    // 2. CRIT & DAMAGE CALCULATION
    const armorUsed = (procPierce || (wouldCrit && p.armorPierce)) ? 0 : e.armor;

    if (wouldCrit && hit && !e.immuneToCrit) {
      const r2 = rollDiceV(weapon.dieIdx);
      dmg = p.atkDmg + r1.total + r2.total - armorUsed;
      results.push({ type: "crit", text: `${rolled}! ★ CRIT! ${dmg} DMG!` });
    } else {
      dmg = p.atkDmg + r1.total - armorUsed;
      const typeText = wouldCrit ? "AUTO-HIT!" : "HIT!";
      results.push({ type: "player", text: `${rolled}! ${typeText} ${Math.max(0, dmg)} DMG` });
    }

    dmg = Math.max(0, dmg);

    // 3. OFFHAND PENALTY: 50% damage unless they have the Dual Wield Perk
    if (isOffhand && !p.dualWield) {
      dmg = Math.floor(dmg * 0.5);
    }

    // Apply the current bleed bonus damage to the final result
    dmg = applyBleed(dmg);

    // 4. BLEED PROC: Set to weapon's average damage (Die Average + ATK)
    if (dmg > 0) {
      if (procs.poisonChance && pct(procs.poisonChance)) didPoison = true;
      if (procs.burnChance && pct(procs.burnChance)) didBurn = true;
      if (procs.bleedChance && pct(procs.bleedChance)) {
        didBleed = true;
        const die = getDie(weapon.dieIdx);
        // Average of a die is (max + 1) / 2. Example: D6 average is 3.5
        const avgWeaponDmg = ((die.count * (die.size + 1)) / 2) + p.atkDmg;
        newBleedVal = avgWeaponDmg;
      }
    }
    return dmg;
  };

  // --- Execute Swings ---
  let total = 0;

  // Main Strike
  total += doSwing(weapons[0], false);

  // Offhand Strike (Standard Dual Wielding)
  if (weapons.length > 1) {
    results.push({ type: "player", text: "⚔ OFFHAND STRIKE!" });
    total += doSwing(weapons[1], true);
  }

  // 5. MULTI-STRIKE LOGIC
  // Double Strike uses Main Hand
  if (pct(p.doubleStrikeChance)) {
    results.push({ type: "player", text: "⚔⚔ DOUBLE STRIKE!" });
    total += doSwing(weapons[0], false);
  }

  // Triple Strike uses Offhand
  if (pct(p.tripleStrikeChance)) {
    results.push({ type: "player", text: "⚔⚔⚔ TRIPLE STRIKE!" });
    // If no offhand weapon is equipped, it defaults to fists/main weapon stats
    total += doSwing(weapons[1] || weapons[0], true);
  }

  return { total, results, didPoison, didBurn, didBleed, newBleedVal };
}

function enemyAttack(p, e, verbose=false) {
  const results=[];
  let dmgToPlayer=0, counterDmg=0, gotCrit=false, didPoison=false, didBurn=false, didBleed=false, didStun=false;
  const hitRoll   = d20Hit(e.hitChance);
  const dodgeRoll = hitRoll.hit ? d20Hit(p.dodgeChance) : null;
  if (!hitRoll.hit) {
    results.push({type:"miss", text:`${e.name} ${hitRoll.rolled}! MISS!`});
  } else if (dodgeRoll?.hit) {
    results.push({type:"dodge", text:`${e.name} ${hitRoll.rolled}! → YOU ${dodgeRoll.rolled}! DODGE!`});
  } else {
    const isCrit = hitRoll.rolled===20;
    const d1 = roll(3);
    const gp  = p.greedPenalty||0;
    if (isCrit) {
      gotCrit=true;
      const d2=roll(3);
      dmgToPlayer = Math.max(0,e.attack+d1+d2-p.armor+gp);
      results.push({type:"enemy", text:`${e.name} 20! ★ CRIT!${verbose?` [D3:${d1}+D3:${d2}]`:""} ${dmgToPlayer} DMG!`});
    } else {
      dmgToPlayer = Math.max(0,e.attack+d1-p.armor+gp);
      results.push({type:"enemy", text:`${e.name} ${hitRoll.rolled}! HIT!${verbose?` [D3:${d1}]`:""} ${dmgToPlayer} DMG${dmgToPlayer===0?" (BLOCKED)":""}`});
    }
    if (dmgToPlayer>0) {
      if (e.poisonOnHit)              didPoison=true;
      if (e.burnsOnHit)               didBurn=true;
      if (e.bleedsOnCrit && isCrit)   didBleed=true;
      if (e.stunsOnHit && pct(30))    didStun=true;
    }
    if (pct(p.counterChance)) {
      counterDmg = Math.max(0,Math.ceil(p.atkDmg/2));
      results.push({type:"counter", text:`COUNTER! ${counterDmg} DMG!`});
    }
  }
  return { dmgToPlayer, counterDmg, results, gotCrit, didPoison, didBurn, didBleed, didStun };
}

function Hearts({ hp, maxHp }) {
  return (
    <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
      {Array.from({length:Math.ceil(maxHp/2)}).map((_,i) => {
        const full=hp>=i*2+2, half=!full&&hp>=i*2+1;
        if (full) return <span key={i} style={{ fontSize:18, lineHeight:1 }}>❤️</span>;
        if (half) return (
          <span key={i} style={{ fontSize:18, lineHeight:1, position:"relative", display:"inline-block" }}>
            🤍
            <span aria-hidden="true" style={{ position:"absolute", left:0, top:0, clipPath:"inset(0 50% 0 0)", pointerEvents:"none" }}>❤️</span>
          </span>
        );
        return <span key={i} style={{ fontSize:18, lineHeight:1 }}>🤍</span>;
      })}
    </div>
  );
}

}

      {BODY_SLOTS.map(({key,emoji}) => (
        <span key={key} title={equip[key]?.label||key.toUpperCase()}

  return (

          const done=i<wavePos, current=i===wavePos, boss=i===WAVE_LENGTH-1;
          const bg=done?"#0a220a":current?"#302a04":"#101006";
          const border=done?"#50c050":current?"#f8e000":"#3a3010";
          const icon=done?"✓":current?"◆":boss?"▰":"?";
          return (
            <div key={i} style={{ minHeight:54, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:5, background:bg, border:`2px solid ${border}`, outline:"1px solid #000" }}>

              <div style={{ fontSize:6, color:current?"#b8a840":"#5a4a18" }}>{boss?"BOSS":`R${i+1}`}</div>
            </div>

      </div>
      <div style={{ display:"flex", justifyContent:"center", gap:6, marginTop:10, flexWrap:"wrap" }}>

function GearDetail({ selectedSlot, equipment }) {
  if (!selectedSlot) return (
    <div style={{ color:"#3a2e0a", fontSize:10, lineHeight:2, marginTop:8 }}>← CLICK A SLOT<br />TO INSPECT</div>
  );
  const isRing  = selectedSlot.startsWith("ring:");
  const ringIdx = isRing ? parseInt(selectedSlot.split(":")[1]) : null;
  const item    = isRing ? equipment.rings[ringIdx] : equipment[selectedSlot];
  const slotDef = isRing ? null : BODY_SLOTS.find(s=>s.key===selectedSlot);
  const label   = isRing ? `RING SLOT ${ringIdx+1}` : selectedSlot.toUpperCase();
  return (
    <>
      <div style={{ fontSize:9, color:"#806030", letterSpacing:"0.1em", marginBottom:12 }}>
        {slotDef?.emoji??"💍"} {label}
      </div>
      {item ? (
        <>
          <div style={{ fontSize:13, color:"#c080f8", marginBottom:10, lineHeight:1.5 }}>{item.label}</div>
          <div style={{ fontSize:10, color:"#9070b0", lineHeight:1.8, marginBottom:14 }}>{item.desc}</div>
          <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
            {Object.entries(item.stats).map(([k,v]) => {
              const bad = v<0 || k==='greedPenalty';
              return <div key={k} style={{ fontSize:11, color:bad?"#e08020":"#50d850" }}>{v>0?"+":""}{v} {STAT_LABEL[k]||k.toUpperCase()}</div>;
            })}
          </div>
          {item.vampiric && <div style={{ fontSize:10, color:"#e040e0", marginTop:10 }}>🩸 HEAL 2 HP ON CRIT</div>}
          <div style={{ fontSize:10, color:"#a07020", marginTop:14 }}>COST {item.cost}💰</div>
        </>
      ) : (
        <div style={{ fontSize:11, color:"#5a4018", marginTop:18, lineHeight:2 }}>
          — EMPTY —<br /><span style={{ fontSize:9, color:"#3a2e0a" }}>VISIT THE SHOP<br />AFTER A BOSS</span>
        </div>
      )}
    </>
  );
}

function ItemButtons({ items, onUse, inBattle=true }) {
  return items.map((item,i) => (
    <Btn key={i} onClick={()=>onUse(item,inBattle)} variant="shop">
      ▶ {item.label}<br /><span style={{ color:"#503870", fontSize:8 }}>{item.desc}</span>

  @keyframes enemyDodge  {0%,100%{transform:translateX(0);opacity:1}28%{transform:translateX(44px);opacity:0.45}64%{transform:translateX(26px);opacity:0.75}}
  @keyframes playerDodge {0%,100%{transform:translateX(0);opacity:1}28%{transform:translateX(-44px);opacity:0.45}64%{transform:translateX(-26px);opacity:0.75}}
  @keyframes bossGlow    {0%,100%{filter:drop-shadow(0 0 5px rgba(248,224,0,0.45))}50%{filter:drop-shadow(0 0 13px rgba(248,224,0,0.85))}}
  @keyframes missSwing   {0%{transform:translateX(0) rotate(0deg)}28%{transform:translateX(30px) rotate(12deg)}55%{transform:translateX(22px) rotate(-4deg)}100%{transform:translateX(0) rotate(0deg)}}
  @keyframes poisonPulse {0%,100%{filter:hue-rotate(0deg)}50%{filter:hue-rotate(80deg) brightness(1.3)}}
  @keyframes burnPulse   {0%,100%{filter:hue-rotate(0deg)}50%{filter:hue-rotate(-70deg) brightness(1.6) saturate(3)}}
  @keyframes stunPulse   {0%,100%{filter:brightness(1) saturate(1)}50%{filter:brightness(0.45) saturate(0) hue-rotate(200deg)}}
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:#3a3010}
`;

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [player,       setPlayer]       = useState({...PLAYER_BASE});
  const [enemy,        setEnemy]        = useState(null);
  const [log,          setLog]          = useState([{text:"PRESS START TO BEGIN",type:"sys"}]);
  const [phase,        setPhase]        = useState("title");
  const [showScores,   setShowScores]   = useState(false);
  const [ironUsed,     setIronUsed]     = useState(false);
  const [level,        setLevel]        = useState(1);
  const [xp,           setXp]           = useState(0);
  const [restXpLost,   setRestXpLost]   = useState(0);
  const [gold,         setGold]         = useState(0);
  const [shaking,      setShaking]      = useState(null);
  const [levelUpOpts,  setLevelUpOpts]  = useState([]);
  const [pickedStats,  setPickedStats]  = useState([]);
  const [perkOpts,     setPerkOpts]     = useState([]);
  const [wavePos,      setWavePos]      = useState(0);
  const [waveNumber,   setWaveNumber]   = useState(1);
  const [roomChoices,  setRoomChoices]  = useState(()=>makeRoomChoices(0,applyAbilityStats(PLAYER_BASE),false,1,1));
  const [shopItems,    setShopItems]    = useState([]);
  const [equipment,    setEquipment]    = useState({...EMPTY_EQUIP});
  const [inventory,    setInventory]    = useState([]);
  const [tempBuffs,    setTempBuffs]    = useState([]);
  const [shopUnlocked, setShopUnlocked] = useState(false);
  const [selectingItem,setSelectingItem]= useState(false);
  const [arenaAnim,    setArenaAnim]    = useState({player:'idle',enemy:'idle'});
  const [devMode,      setDevMode]      = useState(false);
  const [equipOpen,    setEquipOpen]    = useState(false);
  const [selectedSlot, setSelectedSlot] = useState(null);
  const [poison,       setPoison]       = useState(0);
  const [burn,         setBurn]         = useState(0);
  const [bleed,        setBleed]        = useState(0);
  const [stun,         setStun]         = useState(0);
  const [gameStats,    setGameStats]    = useState({biggestHit:0,biggestHitTaken:0,killCounts:{},itemsUsed:{}});
  const [highScores,   setHighScores]   = useState(()=>JSON.parse(localStorage.getItem('dq_scores')||'[]'));
  const logRef = useRef(null);

  const ep         = getEffectivePlayer(player,equipment,tempBuffs);
  const idlePlayer = getEffectivePlayer(player,equipment);
  const roomPlayer = devMode ? {...idlePlayer,awareness:95,wisdom:30,intelligence:30,identify:95} : idlePlayer;
  const XP_NEEDED = level*3;

  useEffect(()=>{ if(logRef.current) logRef.current.scrollTop=logRef.current.scrollHeight; },[log]);

  const addLog = (text,type="sys") => setLog(prev=>[...prev.slice(-60),{text,type}]);
  const shake  = who => { setShaking(who); setTimeout(()=>setShaking(null),350); };

  const triggerArenaAnim = (p,e,dur=620) => {
    setArenaAnim({player:p,enemy:e});
    setTimeout(()=>setArenaAnim({player:'idle',enemy:'idle'}),dur);
  };

  function saveHighScore(finalGold) {
    const scores = [...JSON.parse(localStorage.getItem('dq_scores')||'[]'), {gold:finalGold,date:new Date().toLocaleDateString()}]
      .sort((a,b)=>b.gold-a.gold).slice(0,5);
    localStorage.setItem('dq_scores',JSON.stringify(scores));
    setHighScores(scores);
  }

  function triggerLevelUp(newLevel, currentPlayer) {
    setLevelUpOpts(STAT_POOL);
    setPickedStats([]);
    // Every 5th level (capped at 20), offer a perk pick from any not-yet-taken perks.
    if (newLevel % 5 === 0 && newLevel <= 20) {
      const remaining = PERK_POOL.filter(p => !currentPlayer[p.id]);
      if (remaining.length > 0) { setPerkOpts(remaining); setPhase("perk"); return; }
    }
    setPhase("levelup");
  }

  function pickStat(stat) {
    const updated=stat.apply({...player});
    setPlayer(updated);
    setRoomChoices(makeRoomChoices(wavePos,applyAbilityStats(updated),devMode,level,waveNumber));
    setPhase("win");
  }

  function pickPerk(perk) {
    setPlayer(p => perk.apply({...p}));
    setPerkOpts([]);
    addLog(`${perk.label} UNLOCKED!`, "level");
    setPhase("levelup");
  }

  function enterRest() {
    // We no longer reset XP here
    setEnemy(null);
    setPhase("rest");
    setRestUsed(true);
  }
  function startBattle(room) {
    const newPos = wavePos+1;
    const isBoss = !!room?.isBoss || newPos>=WAVE_LENGTH;
    const baseEnemy = room?.enemy ? room.enemy : (isBoss ? pickBoss(waveNumber,level) : pickEnemy(level));
    const e = {...applyRoomToEnemy(baseEnemy,room), roomPos:newPos, roomLabel:room?.label};
    setWavePos(newPos);
    setEnemy(e); setPhase("player"); setIronUsed(false);
    setTempBuffs(prev=>prev.map(b=>({...b,battles:b.battles-1})).filter(b=>b.battles>0));
    setSelectingItem(false);
    setArenaAnim({player:'idle',enemy:'idle'});
    setLog([{text:isBoss?`★★ ${e.name} APPROACHES! ★★`:`${room?.icon||"▶"} ${room?.label||"ROOM"}: ${e.emoji} ${e.name}!`, type:isBoss?"crit":"sys"}]);
  }

  function handleAction(key) {
    if (phase!=="player"||!enemy) return;
    if (key==="flee") {
      if (pct(75)) {
        addLog(xp>0?`YOU FLEE! –${xp} XP LOST!`:"YOU FLEE INTO THE DARKNESS!","warn");
        enterRest();
      } else {
        addLog("BLOCKED! CAN'T ESCAPE!","warn"); runEnemyTurn(ep,enemy);
      }
      return;
    }
    const {total,results,didPoison,didBurn,didBleed} = playerAttack(ep,enemy,devMode);

    // Vampiric blade: heal on crit
    let effectivePlayer = ep;
    if ((equipment.weapon?.vampiric || equipment.offhand?.vampiric) && results.some(r=>r.type==='crit')) {
      const heal=2;
      effectivePlayer = {...ep, hp:Math.min(ep.hp+heal, ep.maxHp)};
      setPlayer(p=>({...p, hp:Math.min(p.hp+heal, ep.maxHp)}));
      addLog(`🗡️ VAMPIRIC! +${heal} HP!`,"level");
    }

    if (total>0) setGameStats(s=>({...s,biggestHit:Math.max(s.biggestHit,total)}));
    const r0=results[0];
    if      (r0.type==='crit') triggerArenaAnim('attack','crit',700);
    else if (r0.type==='miss') triggerArenaAnim('miss','dodge',620);
    else                       triggerArenaAnim('attack','hit',620);
    shake("enemy");
    results.forEach(r=>addLog(r.text,r.type));

    const newHp=enemy.hp-total;
    let next={...enemy,hp:Math.max(0,newHp)};

    // Weapon procs only land if the enemy survives the swing.
    if (next.hp>0) {
      if (didPoison) { next={...next, poison:3}; addLog(enemy.poison>0?"☠ ENEMY POISON REFRESHED!":"☠ ENEMY POISONED! 3 TURNS!","level"); }
      if (didBurn)   { next={...next, burn:3};   addLog(enemy.burn>0  ?"🔥 ENEMY BURN REFRESHED!":"🔥 ENEMY BURNING! 3 TURNS!","level"); }
      if (didBleed)  { next={...next, bleed:3};  addLog(enemy.bleed>0 ?"🩸 ENEMY BLEED REFRESHED!":"🩸 ENEMY BLEEDING! 3 TURNS! (+50% DMG)","level"); }
    }

    // Berserker enrages at half HP
    if (enemy.enragesWhenLow && !enemy.enraged && next.hp>0 && next.hp<=Math.ceil(enemy.maxHp/2)) {
      next={...next, enraged:true, attack:next.attack+3};
      addLog(`${enemy.name} ENRAGES! ATK +3!`,"enemy");
    }

    setEnemy(next);
    if (newHp<=0) { resolveVictory(next); return; }
    runEnemyTurn(effectivePlayer,next);
  }

  function handleUseItem(item, inBattle=true) {
    const effectiveMaxHp = getEffectivePlayer(player,equipment).maxHp;
    const {p:usedPlayer,b:nb} = item.onUse({...player,maxHp:effectiveMaxHp},tempBuffs);
    const np = {...usedPlayer,maxHp:player.maxHp};
    if (item.curePoison) setPoison(0);
    if (item.cureBurn) setBurn(0);
    if (item.cureBleed) setBleed(0);
    if (item.cureStun) setStun(0);
    if (item.cureAll)    { setPoison(0); setBurn(0); setBleed(0); setStun(0); }
    setPlayer(np); setTempBuffs(nb);
    setGameStats(s=>({...s,itemsUsed:{...s.itemsUsed,[item.label]:(s.itemsUsed[item.label]||0)+1}}));
    setInventory(inv=>{ const i=inv.findIndex(x=>x.id===item.id); return i<0?inv:[...inv.slice(0,i),...inv.slice(i+1)]; });
    setSelectingItem(false);
    addLog(`USED ${item.label}!`,"level");
    if (inBattle) runEnemyTurn(applyBuffs(np,nb),enemy);
  }

  function runEnemyTurn(p, e) {
    setPhase("enemy");
    setTimeout(()=>{
      let curP=p;
      let curE=e;

      // Enemy status ticks (poison/burn drain HP; bleed only decrements — its damage bonus is applied on the player's swing)
      if ((curE.poison||0)>0) {
        const newHp=curE.hp-1, left=curE.poison-1;
        addLog(`☠ ${curE.name} POISON! 1 DMG${left>0?` (${left} LEFT)`:" CURED!"}`,"level");
        if (newHp<=0) { resolveVictory({...curE,hp:0,poison:0}); return; }
        curE={...curE,hp:newHp,poison:left}; setEnemy(curE);
      }
      if ((curE.burn||0)>0) {
        const newHp=curE.hp-2, left=curE.burn-1;
        addLog(`🔥 ${curE.name} BURN! 2 DMG${left>0?` (${left} LEFT)`:" FADED!"}`,"level");
        if (newHp<=0) { resolveVictory({...curE,hp:0,burn:0}); return; }
        curE={...curE,hp:newHp,burn:left}; setEnemy(curE);
      }
      if ((curE.bleed||0)>0) {
        const left=curE.bleed-1;
        curE={...curE,bleed:left}; setEnemy(curE);
        if (left===0) addLog(`🩸 ${curE.name} BLEED FADED.`,"miss");
      }

      // Poison tick
      if (poison>0) {
        const newHp=curP.hp-1, left=poison-1;
        setPoison(left);
        addLog(`☠ POISON! 1 DMG!${left>0?` (${left} LEFT)`:" CURED!"}`, "warn");
        if (newHp<=0) { setPlayer(prev=>({...prev,hp:0})); saveHighScore(gold); setPhase("lose"); addLog("POISON CLAIMED YOUR LIFE...","warn"); return; }
        curP={...curP,hp:newHp};
        setPlayer(prev=>({...prev,hp:newHp}));
      }

      // Burn tick
      if (burn>0) {
        const newHp=curP.hp-2, left=burn-1;
        setBurn(left);
        addLog(`🔥 BURN! 2 DMG!${left>0?` (${left} LEFT)`:" FADED!"}`, "warn");
        if (newHp<=0) { setPlayer(prev=>({...prev,hp:0})); saveHighScore(gold); setPhase("lose"); addLog("THE FLAMES TOOK YOU...","warn"); return; }
        curP={...curP,hp:newHp};
        setPlayer(prev=>({...prev,hp:newHp}));
      }

      // Bleed decrement (effect applied to incoming damage below)
      if (bleed>0) {
        const left=bleed-1;
        setBleed(left);
        if (left===0) addLog("🩸 BLEED FADED.", "miss");
      }

      // Archer flee check (before enemy attacks)
      if (curE.fleesWhenLow && curE.hp<=Math.ceil(curE.maxHp*0.3) && pct(35)) {
        addLog(`${curE.name} FLEES! HALF REWARD.`, "warn");
        resolveVictory({...curE, xp:Math.ceil(curE.xp/2), goldMin:1, goldMax:Math.ceil(curE.goldMax/2)});
        return;
      }

      const {dmgToPlayer:rawDmg, counterDmg, results, gotCrit, didPoison, didBurn, didBleed, didStun} = enemyAttack(curP,curE,devMode);
      const dmgToPlayer = devMode ? 0 : (bleed>0 ? Math.ceil(rawDmg*1.5) : rawDmg);

      const r0=results[0];
      if      (r0.type==='dodge') triggerArenaAnim('dodge',   'attack',650);
      else if (r0.type==='miss')  triggerArenaAnim('idle',    'attack',620);
      else if (gotCrit)           triggerArenaAnim('crit-hit','attack',700);
      else                        triggerArenaAnim('hit',     'attack',620);
      shake("player");
      results.forEach(r=>addLog(r.text,r.type));

      if (didPoison) {
        if (pct(curP.poisonResist||0)) addLog("☠ POISON RESISTED!", "level");
        else { setPoison(3); addLog(poison>0?"☠ POISON REFRESHED!":"☠ POISONED! 3 TURNS!", "warn"); }
      }
      if (didBurn)   { setBurn(3);   addLog(burn>0?"🔥 BURN REFRESHED!":"🔥 BURNING! 3 TURNS!", "warn"); }
      if (didBleed)  { setBleed(3);  addLog(bleed>0?"🩸 BLEED REFRESHED!":"🩸 BLEEDING! 3 TURNS! (+50% DMG)", "warn"); }
      if (didStun)   { setStun(1);   addLog("💫 STUNNED! YOUR NEXT TURN IS SKIPPED!", "warn"); }

      if (dmgToPlayer>0) setGameStats(s=>({...s,biggestHitTaken:Math.max(s.biggestHitTaken,dmgToPlayer)}));

      const newEnemyHp=curE.hp-counterDmg;
      if (counterDmg>0) setEnemy({...curE,hp:Math.max(0,newEnemyHp)});
      if (newEnemyHp<=0&&counterDmg>0) { resolveVictory({...curE,hp:0}); return; }
      const aliveEnemy = counterDmg>0 ? {...curE,hp:Math.max(0,newEnemyHp)} : curE;

      let newHp=curP.hp-dmgToPlayer;
      if (newHp<=0&&curP.ironWill&&!ironUsed) { newHp=1; setIronUsed(true); addLog("IRON WILL! SURVIVED WITH 1 HP!","level"); }
      if (newHp<=0) { setPlayer(prev=>({...prev,hp:0})); saveHighScore(gold); setPhase("lose"); addLog("YOU HAVE FALLEN...","warn"); }
      else {
        setPlayer(prev=>({...prev,hp:newHp}));
        if (didStun) {
          const stunP={...curP,hp:newHp};
          setTimeout(()=>{
            setStun(0); addLog("💫 STUN WEARS OFF.","miss");
            runEnemyTurn(stunP, aliveEnemy);
          }, 1100);
        } else {
          setPhase("player"); addLog("YOUR TURN.","sys");
        }
      }
    },750);
  }

  function resolveVictory(defeatedEnemy) {
    const xpGained   = defeatedEnemy.xp??1;
    const greedMult  = equipment.rings.some(r=>r.id==='ring_greed') ? 1.5 : 1;
    const goldEarned = Math.round((defeatedEnemy.goldMin+Math.floor(Math.random()*(defeatedEnemy.goldMax-defeatedEnemy.goldMin+1)))*greedMult);
    setGold(g=>g+goldEarned);
    setGameStats(s=>({...s,killCounts:{...s.killCounts,[defeatedEnemy.name]:(s.killCounts[defeatedEnemy.name]||0)+1}}));
    let newXp=xp+xpGained, newLevel=level, nextPlayer={...player}, didLevel=false;
    if (newXp>=XP_NEEDED) {
      newXp-=XP_NEEDED; newLevel++; didLevel=true;
      // Roll the new level's hit die (d8) and append. Combined with CON mod × levels via applyAbilityStats.
      const hpRoll = roll(8);
      nextPlayer = {...nextPlayer, hitDice:[...(nextPlayer.hitDice||[8]), hpRoll]};
      const effectiveMax=getEffectivePlayer(nextPlayer,equipment).maxHp;
      const heal=Math.ceil(effectiveMax/2);
      nextPlayer={...nextPlayer,hp:Math.min(nextPlayer.hp+heal,effectiveMax)};
      setPlayer(nextPlayer);
      addLog(`★ LEVEL UP! LV ${newLevel}! HD8 ROLLED ${hpRoll} · +${heal} HP! ★`,"level");
    }
    setXp(newXp); setLevel(newLevel);
    setTimeout(()=>{
      addLog(`${defeatedEnemy.name} DEFEATED! +${goldEarned} 💰`,"gold");
      const nextRoomPos = defeatedEnemy.isBoss ? 0 : (defeatedEnemy.roomPos??wavePos);
      const nextWaveNum = defeatedEnemy.isBoss ? waveNumber+1 : waveNumber;
      setRestUsed(false);
      if (defeatedEnemy.isBoss) { setWavePos(0); setWaveNumber(n=>n+1); }
      setRoomChoices(makeRoomChoices(nextRoomPos,getEffectivePlayer(nextPlayer,equipment),devMode,newLevel,nextWaveNum));
      if (newLevel>=21) { saveHighScore(gold+goldEarned); setEnemy(null); setPhase("gamewon"); return; }
      if (defeatedEnemy.isBoss) {
        const avail=getAvailableEquipment(equipment);
        setShopItems([...pickRandom(SHOP_CONSUMABLES,3),...pickShopEquipment(avail,Math.min(2,avail.length),idlePlayer,equipment)]);
        setShopUnlocked(true);
      }
      didLevel ? triggerLevelUp(newLevel,nextPlayer) : setPhase("win");
    },200);
  }

  function buyItem(item) {
    const cost = getShopCost(item,idlePlayer);
    if (gold<cost) return;
    if (!canEquipItem(item, equipment, idlePlayer)) return;
    setGold(g=>g-cost);
    if (item.slot) {
      // Equipping a 2H weapon clears the offhand slot (shield or off-weapon).
      const clearOffhand = item.slot==='weapon' && item.hand==='two' && equipment.offhand;
      if (clearOffhand) addLog(`⚔ ${equipment.offhand.label} REMOVED — TWO-HANDED WEAPON EQUIPPED.`,"warn");
      setEquipment(eq=>{
        if (item.slot==='ring') return {...eq,rings:[...eq.rings,item]};
        const next = {...eq,[item.slot]:item};
        if (item.slot==='weapon' && item.hand==='two') next.offhand = null;
        return next;
      });
      setShopItems(prev=>prev.filter(i=>i.id!==item.id&&(item.slot==='ring'||i.slot!==item.slot)));
    } else {
      setInventory(inv=>[...inv,item]);
      setShopItems(items=>items.filter(i=>i.id!==item.id));
    }
  }

  function restart() {
    setPlayer({...PLAYER_BASE}); setEnemy(null); setPhase("title"); setShowScores(false);
    setLog([{text:"PRESS START TO BEGIN",type:"sys"}]);
    setLevel(1); setXp(0); setRestXpLost(0); setGold(0);
    setPickedStats([]); setLevelUpOpts([]); setShopItems([]);
    setInventory([]); setTempBuffs([]); setShopUnlocked(false);
    setEquipment({...EMPTY_EQUIP});
    setWavePos(0); setWaveNumber(1); setRoomChoices(makeRoomChoices(0,applyAbilityStats(PLAYER_BASE),false,1,1)); setSelectingItem(false);
    setArenaAnim({player:'idle',enemy:'idle'});
    setPoison(0); setBurn(0); setBleed(0); setStun(0);
    setGameStats({biggestHit:0,biggestHitTaken:0,killCounts:{},itemsUsed:{}});
  }

  const inBattle   = ["player","enemy","win","lose","levelup","perk"].includes(phase);
  const nextBossIn = WAVE_LENGTH-wavePos;
  const pa=arenaAnim.player, ea=arenaAnim.enemy;

  const playerAnim =
    pa==='attack'   ? 'playerSwing 0.56s ease-in-out'         :
    pa==='miss'     ? 'missSwing 0.56s ease-in-out'           :
    pa==='hit'      ? 'getHit 0.56s ease-in-out'              :
    pa==='crit-hit' ? 'getCrit 0.68s ease-in-out'             :
    pa==='dodge'    ? 'playerDodge 0.56s ease-in-out'         :
    stun>0          ? 'stunPulse 0.5s ease-in-out infinite'    :
    burn>0          ? 'burnPulse 0.8s ease-in-out infinite'   :
    poison>0        ? 'poisonPulse 1.2s ease-in-out infinite' : 'none';

  const enemyAnim =
    ea==='attack' ? 'enemySwing 0.56s ease-in-out'    :
    ea==='hit'    ? 'getHit 0.56s ease-in-out'        :
    ea==='crit'   ? 'getCrit 0.68s ease-in-out'       :
    ea==='dodge'  ? 'enemyDodge 0.56s ease-in-out'    :
    enemy?.isBoss ? 'bossGlow 2s ease-in-out infinite': 'none';

  const mostKilled = Object.entries(gameStats.killCounts).sort((a,b)=>b[1]-a[1])[0];
  const mostUsed   = Object.entries(gameStats.itemsUsed).sort((a,b)=>b[1]-a[1])[0];

  return (
    <>
      <style>{CSS}</style>
      <div style={{ minHeight:"100vh", background:"#080804", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24, fontFamily:"'Press Start 2P', monospace" }}>

        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}>
          <div style={{ color:"#f8e000", fontSize:15, letterSpacing:"0.12em", textShadow:"2px 2px #000, 0 0 18px rgba(248,224,0,0.35)" }}>✦ DUNGEON QUEST ✦</div>
          <button onClick={()=>setDevMode(d=>{ const next=!d; setRoomChoices(makeRoomChoices(wavePos,idlePlayer,next,level,waveNumber)); return next; })}
                  style={{ fontFamily:"'Press Start 2P', monospace", fontSize:7, padding:"4px 8px", background:devMode?"#00101a":"#0a0a0a", border:`2px solid ${devMode?"#00c8f8":"#3a3010"}`, color:devMode?"#00c8f8":"#3a3010", cursor:"pointer", letterSpacing:"0.04em" }}>
            {devMode?"★ DEV":"DEV"}
          </button>
        </div>
        {phase!=="title" && (
          <>
            <div style={{ color:"#5a4a18", fontSize:8, marginBottom:6, letterSpacing:"0.12em" }}>
              LV {level}  ·  XP {xp}/{XP_NEEDED}  ·  💰 {gold}
              {player.doubleStrikeChance>0 && <span>  ·  {player.tripleStrikeChance>0?`⚔⚔⚔ ${player.tripleStrikeChance}%`:player.doubleStrikeChance>=100?"⚔⚔ 100%":`⚔⚔ ${player.doubleStrikeChance}%`}</span>}
              {player.ironWill    && "  ·  🛡"}
              {player.armorPierce && "  ·  💥"}
              {player.dualWield   && "  ·  ⚔⚔"}
              {poison>0           && <span style={{color:"#80d050"}}>  ·  ☠×{poison}</span>}
              {burn>0             && <span style={{color:"#e08020"}}>  ·  🔥×{burn}</span>}
              {bleed>0            && <span style={{color:"#e04040"}}>  ·  🩸×{bleed}</span>}
              {stun>0             && <span style={{color:"#80d0f8"}}>  ·  💫 STUNNED</span>}
            </div>
            <div style={{ color:"#3a2e0a", fontSize:7, marginBottom:14 }}>BOSS IN {nextBossIn} {nextBossIn===1?"BATTLE":"BATTLES"}</div>

            <div style={{ width:"100%", maxWidth:560, height:6, background:"#14140a", border:"2px solid #2e2808", marginBottom:18 }}>
              <div style={{ width:`${clamp((xp/XP_NEEDED)*100,0,100)}%`, height:"100%", background:"#80d0f8", transition:"width 0.5s" }} />
            </div>
          </>
        )}

        <div style={{ width:"100%", maxWidth:560 }}>

          {phase==="title" && (
            <TileBox highlight style={{ textAlign:"center", padding:32 }}>
              <div style={{ fontSize:38, marginBottom:18 }}>🧝⚔️🏰</div>
              <div style={{ color:"#b8a840", fontSize:10, marginBottom:8, lineHeight:2.4 }}>DUNGEON GATES<br />STAND OPEN</div>
              <div style={{ color:"#3a3010", fontSize:8, marginBottom:22, lineHeight:2.2 }}>
                LV {level} · HP {idlePlayer.hp}/{idlePlayer.maxHp} · ATK {dmgRange(idlePlayer.atkDmg,idlePlayer.dieIdx)}<br />
                STR {player.strength} · DEX {player.dexterity} · CON {player.constitution} · WIS {player.wisdom} · CHA {player.charisma} · INT {player.intelligence}
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                <Btn onClick={()=>{ setShowScores(false); setPhase("idle"); }} variant="neutral">▶ START</Btn>
                <Btn onClick={()=>setShowScores(s=>!s)} variant="gold">🏆 HIGH SCORES</Btn>
              </div>
              {showScores && (
                <div style={{ marginTop:20, borderTop:"2px solid #2e2808", paddingTop:16 }}>
                  {highScores.length>0 ? highScores.map((s,i)=>(
                    <div key={i} style={{ fontSize:7, color:"#5a4018", lineHeight:2.4 }}>
                      {i+1}. 💰 {s.gold} <span style={{color:"#3a2e0a"}}>— {s.date}</span>
                    </div>
                  )) : <div style={{ fontSize:8, color:"#5a4a18", lineHeight:2.4 }}>NO HIGH SCORES YET</div>}
                </div>
              )}
            </TileBox>
          )}
          {phase==="gamewon" && (
            <TileBox highlight style={{ textAlign:"center", padding:24 }}>
              <div style={{ color:"#f8e000", fontSize:12, marginBottom:6, animation:"blink 0.8s infinite" }}>★ DUNGEON CLEARED! ★</div>
              <div style={{ color:"#80d0f8", fontSize:8, marginBottom:20, lineHeight:2.4 }}>LEVEL {level} REACHED!<br />FINAL GOLD: 💰 {gold}</div>
              <div style={{ textAlign:"left", fontSize:8, color:"#5a4a18", lineHeight:2.4, marginBottom:20 }}>
                {gameStats.biggestHit>0      && <div>⚔ BIGGEST HIT: <span style={{color:"#50d850"}}>{gameStats.biggestHit} DMG</span></div>}
                {gameStats.biggestHitTaken>0 && <div>💥 BIGGEST HIT TAKEN: <span style={{color:"#e04040"}}>{gameStats.biggestHitTaken} DMG</span></div>}
                {mostKilled && <div>💀 MOST KILLED: <span style={{color:"#f8c840"}}>{mostKilled[0]} ×{mostKilled[1]}</span></div>}
                {mostUsed   && <div>🎒 MOST USED ITEM: <span style={{color:"#c080f8"}}>{mostUsed[0]} ×{mostUsed[1]}</span></div>}
              </div>
              <Btn onClick={restart} variant="gold">▶ PLAY AGAIN</Btn>
            </TileBox>
          )}

          {inBattle && enemy && (
            <>
              <div style={{ border:"3px solid #1a1a0a", outline:"3px solid #000", outlineOffset:-6, background:"#050b06", marginBottom:14, padding:"18px 12px 14px" }}>
                <div style={{ display:"flex", justifyContent:"space-around", alignItems:"flex-end", minHeight:86 }}>
                  <div style={{ textAlign:"center", flex:1 }}>
                    <div style={{ fontSize:44, lineHeight:1, display:"inline-block", animation:playerAnim }}>{player.emoji}</div>
                    <div style={{ height:2, background:"#1c2210", margin:"6px auto 0", width:56 }} />
                    <div style={{ fontSize:6, color:"#303820", marginTop:4 }}>
                      {player.name}
                      {stun>0   && <span style={{color:"#80d0f8"}}> 💫</span>}
                      {poison>0 && <span style={{color:"#80d050"}}> ☠</span>}
                      {burn>0   && <span style={{color:"#e08020"}}> 🔥</span>}
                      {bleed>0  && <span style={{color:"#e04040"}}> 🩸</span>}
                    </div>
                  </div>
                  <div style={{ color:"#242408", fontSize:10, paddingBottom:22, flexShrink:0 }}>⚡</div>
                  <div style={{ textAlign:"center", flex:1 }}>
                    <div style={{ fontSize:enemy.isBoss?54:44, lineHeight:1, display:"inline-block", animation:enemyAnim }}>{enemy.emoji}</div>
                    <div style={{ height:2, background:"#1c2210", margin:"6px auto 0", width:56 }} />
                    <div style={{ fontSize:6, color:enemy.isBoss?"#6a5000":"#3a2010", marginTop:4 }}>
                      {enemy.name}
                      {enemy.immuneToCrit && <span style={{color:"#80b8e8"}}> 🛡</span>}
                      {enemy.poisonOnHit  && <span style={{color:"#80d050"}}> ☠</span>}
                      {enemy.burnsOnHit   && <span style={{color:"#e08020"}}> 🔥</span>}
                      {enemy.stunsOnHit   && <span style={{color:"#80d0f8"}}> 💫</span>}
                      {enemy.enraged      && <span style={{color:"#e04040"}}> ⚡</span>}
                      {enemy.poison>0     && <span style={{color:"#80d050"}}> ☠</span>}
                      {enemy.burn>0       && <span style={{color:"#e08020"}}> 🔥</span>}
                      {enemy.bleed>0      && <span style={{color:"#e04040"}}> 🩸</span>}
                    </div>
                  </div>
                </div>
              </div>

              <div style={{ display:"flex", gap:12, marginBottom:14 }}>
                <TileBox highlight={phase==="player"} style={{ flex:1 }}>
                  <div className={shaking==="player"?"shake":""}>
                    <div style={{ fontSize:10, color:"#b8a840", marginBottom:10 }}>{player.emoji} {player.name}</div>
                    <Hearts hp={ep.hp} maxHp={ep.maxHp} />
                    <div style={{ fontSize:8, color:"#5a4a18", marginTop:8, lineHeight:2.2 }}>
                      ATK {dmgRange(ep.atkDmg,ep.dieIdx)} · ARM {ep.armor}<br />
                      HIT {ep.hitChance}% · CRT {ep.critChance}%
                      {ep.dodgeChance>0       && <> · DOD {ep.dodgeChance}%</>}
                      {player.counterChance>0 && <> · CTR {player.counterChance}%</>}
                      {" · "}{getDie(ep.dieIdx).label}
                    </div>
                    {(equipment.rings.length>0||BODY_SLOTS.some(s=>equipment[s.key])) && (
                      <div style={{ marginTop:6 }}><EquipDisplay equip={equipment} /></div>
                    )}
                    {stun>0   && <div style={{ fontSize:7, color:"#80d0f8", marginTop:6 }}>💫 STUNNED · TURN SKIPPED</div>}
                    {poison>0 && <div style={{ fontSize:7, color:"#80d050", marginTop:2 }}>☠ POISONED {poison} TURNS</div>}
                    {burn>0   && <div style={{ fontSize:7, color:"#e08020", marginTop:2 }}>🔥 BURNING {burn} TURNS</div>}
                    {bleed>0  && <div style={{ fontSize:7, color:"#e04040", marginTop:2 }}>🩸 BLEEDING {bleed} TURNS · +50% DMG</div>}
                    {tempBuffs.length>0 && (
                      <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:8 }}>
                        {tempBuffs.map((b,i)=>(
                          <span key={i} style={{ fontSize:7, color:"#50d850", background:"#0a1a0a", border:"1px solid #205020", padding:"2px 5px" }}>
                            +{b.val} {STAT_LABEL[b.stat]} {b.battles}B
                          </span>
                        ))}
                      </div>
                    )}
                  </div>
                </TileBox>

                <div style={{ display:"flex", alignItems:"center", color:"#2e2808", fontSize:9 }}>VS</div>

                <TileBox highlight={phase==="enemy"} style={{ flex:1 }}>
                  <div className={shaking==="enemy"?"shake":""}>
                    <div style={{ fontSize:10, color:enemy.isBoss?"#f8e000":"#e07050", marginBottom:4 }}>{enemy.emoji} {enemy.name}</div>
                    {enemy.niche        && <div style={{ fontSize:7, color:"#604030", marginBottom:8 }}>[{enemy.niche}]</div>}
                    {enemy.immuneToCrit && <div style={{ fontSize:7, color:"#80b8e8", marginBottom:4 }}>🛡 CRIT IMMUNE</div>}
                    {enemy.poisonOnHit  && <div style={{ fontSize:7, color:"#80d050", marginBottom:4 }}>☠ POISONS ON HIT</div>}
                    {enemy.burnsOnHit   && <div style={{ fontSize:7, color:"#e08020", marginBottom:4 }}>🔥 BURNS ON HIT</div>}
                    {enemy.stunsOnHit   && <div style={{ fontSize:7, color:"#80d0f8", marginBottom:4 }}>💫 STUNS ON HIT (30%)</div>}
                    {enemy.enraged      && <div style={{ fontSize:7, color:"#e04040", marginBottom:4 }}>⚡ ENRAGED! ATK {enemy.attack}</div>}
                    <Hearts hp={enemy.hp} maxHp={enemy.maxHp} />
                    <div style={{ fontSize:8, color:"#5a4a18", marginTop:8, lineHeight:2.2 }}>
                      ATK {dmgRange(enemy.attack,{count:1,size:3})} · ARM {enemy.armor}<br />
                      HIT {enemy.hitChance}%{enemy.dodgeChance>0&&<> · DOD {enemy.dodgeChance}%</>}
                      <span style={{color:"#a08020"}}> · 💰{enemy.goldMin}-{enemy.goldMax}</span>
                    </div>
                    {enemy.poison>0 && <div style={{ fontSize:7, color:"#80d050", marginTop:6 }}>☠ POISONED {enemy.poison} TURNS</div>}
                    {enemy.burn>0   && <div style={{ fontSize:7, color:"#e08020", marginTop:2 }}>🔥 BURNING {enemy.burn} TURNS</div>}
                    {enemy.bleed>0  && <div style={{ fontSize:7, color:"#e04040", marginTop:2 }}>🩸 BLEEDING {enemy.bleed} TURNS · TAKES +50% DMG</div>}
                  </div>
                </TileBox>
              </div>

              <TileBox style={{ marginBottom:14 }}>
                <div ref={logRef} style={{ height:130, overflowY:"auto", display:"flex", flexDirection:"column", gap:4 }}>
                  {log.map((e,i)=><div key={i} style={{ fontSize:9, color:LOG_COLORS[e.type]||"#b8a840", lineHeight:1.9 }}>▷ {e.text}</div>)}
                </div>
              </TileBox>

              {phase==="perk" && perkOpts.length>0 && (
                <TileBox highlight style={{ padding:18 }}>
                  <div style={{ color:"#f8e000", fontSize:11, marginBottom:6, animation:"blink 0.8s infinite" }}>★ MILESTONE PERK ★</div>
                  <div style={{ color:"#80b8e8", fontSize:9, marginBottom:14, lineHeight:1.8 }}>PICK ONE — IT'S YOURS FOR THE RUN.</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {perkOpts.map(opt=>(
                      <Btn key={opt.id} onClick={()=>pickPerk(opt)} variant="gold">
                        ▶ {opt.label}<br /><span style={{color:"#806010",fontSize:8}}>{opt.desc}</span>
                      </Btn>
                    ))}
                  </div>
                </TileBox>
              )}

              {phase==="levelup" && (
                <TileBox highlight style={{ padding:18 }}>
                  <div style={{ color:"#f8e000", fontSize:10, marginBottom:6 }}>★ LEVEL UP! PICK 1 ABILITY</div>
                  <div style={{ color:"#5a4a18", fontSize:8, marginBottom:16 }}>ABILITY SCORES SHAPE EVERY RUN</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {levelUpOpts.map(opt=>(
                      <Btn key={opt.id} onClick={()=>pickStat(opt)} variant="stat">
                        ▶ {opt.label}<br /><span style={{color:"#405870",fontSize:8}}>{opt.descFn?opt.descFn(player):opt.desc}</span>
                      </Btn>
                    ))}
                  </div>
                </TileBox>
              )}

              {phase==="win" && (
                <TileBox style={{ textAlign:"center", padding:20 }}>
                  <div style={{ color:"#f8e000", fontSize:12, marginBottom:16, animation:"blink 1s infinite" }}>★ VICTORY! ★</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {shopUnlocked && <Btn onClick={()=>{ setShopUnlocked(false); setPhase("shop"); }} variant="shop">🏪 ENTER SHOP</Btn>}
                    <Btn onClick={()=>setPhase("idle")} variant="neutral">▶ EXPLORE DUNGEON</Btn>
                    {inventory.length>0 && (
                      <>
                        <Btn onClick={()=>setSelectingItem(s=>!s)} variant="shop">🎒 USE ITEM  ({inventory.length} in bag)</Btn>
                        {selectingItem && <ItemButtons items={inventory} onUse={handleUseItem} inBattle={false} />}
                        {selectingItem && <Btn onClick={()=>setSelectingItem(false)} variant="flee">✕ CANCEL</Btn>}
                      </>
                    )}
                    <Btn onClick={()=>{ setSelectedSlot(null); setEquipOpen(true); }} variant="stat">🧍 VIEW GEAR</Btn>
                    <Btn onClick={enterRest} variant="flee">🏕  MAKE CAMP  (LOSE XP, HEAL ALL)</Btn>
                  </div>
                </TileBox>
              )}

              {phase==="lose" && (
                <TileBox style={{ textAlign:"center", padding:20 }}>
                  <div style={{ color:"#e04040", fontSize:12, marginBottom:16, animation:"blink 0.8s infinite" }}>GAME OVER</div>
                  <Btn onClick={restart} variant="attack">▶ TRY AGAIN</Btn>
                </TileBox>
              )}

              {phase==="player" && (
                <TileBox>
                  {selectingItem ? (
                    <>
                      <div style={{ fontSize:8, color:"#c080f8", marginBottom:12 }}>🎒 USE WHICH ITEM?</div>
                      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                        <ItemButtons items={inventory} onUse={handleUseItem} inBattle={true} />
                        <Btn onClick={()=>setSelectingItem(false)} variant="flee">✕ CANCEL</Btn>
                      </div>
                    </>
                  ) : (
                    <>
                      <div style={{ fontSize:8, color:"#5a4a18", marginBottom:12 }}>▶ CHOOSE ACTION</div>
                      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                        <Btn onClick={()=>handleAction("attack")} variant="attack">
                          ⚔  ATTACK
                          {ep.tripleStrikeChance>0                               && <span style={{color:"#e0a040",fontSize:9}}> (DBL + {ep.tripleStrikeChance}% TPL)</span>}
                          {ep.doubleStrikeChance>=100&&ep.tripleStrikeChance===0 && <span style={{color:"#e0a040",fontSize:9}}> (ALWAYS DBL)</span>}
                          {ep.doubleStrikeChance>0&&ep.doubleStrikeChance<100   && <span style={{color:"#e0a040",fontSize:9}}> ({ep.doubleStrikeChance}% DBL)</span>}
                        </Btn>
                        {inventory.length>0 && <Btn onClick={()=>setSelectingItem(true)} variant="shop">🎒 USE ITEM  ({inventory.length} in bag)</Btn>}
                        <Btn onClick={()=>handleAction("flee")} variant="flee">🏃  FLEE</Btn>
                      </div>
                    </>
                  )}
                </TileBox>
              )}

              {phase==="enemy" && (
                <TileBox style={{ textAlign:"center", padding:16 }}>
                  <div style={{ color:"#e07050", fontSize:10, animation:"blink 0.6s infinite" }}>ENEMY TURN...</div>
                </TileBox>
              )}
            </>
          )}

          {phase==="shop" && (
            <TileBox highlight style={{ padding:20 }}>
              <div style={{ fontSize:13, color:"#c080f8", marginBottom:4, textAlign:"center" }}>🏪 MERCHANT</div>
              <div style={{ fontSize:8, color:"#604090", marginBottom:10, textAlign:"center" }}>💰 {gold} GOLD</div>
              <div style={{ background:"#06030f", border:"2px solid #3a1860", padding:"12px 8px", marginBottom:16, display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                <div style={{ fontSize:7, color:"#503870", letterSpacing:"0.1em" }}>EQUIPPED GEAR</div>
                <BodyLayout equip={equipment} cellSize={34} />
              </div>
              {shopItems.filter(i=>i.slot).length>0 && (
                <>
                  <div style={{ fontSize:7, color:"#806030", letterSpacing:"0.1em", marginBottom:8 }}>⚙ EQUIPMENT</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:14 }}>
                    {shopItems.filter(i=>i.slot).map(item=>{
                      const cost = getShopCost(item,idlePlayer);
                      const equipOK = canEquipItem(item, equipment, idlePlayer);
                      let reason = '';
                      if (!equipOK && item.slot==='offhand') {
                        if (equipment.weapon?.hand==='two')                       reason = 'TWO-HANDED WEAPON BLOCKS OFFHAND';
                        else if (item.dieIdx!=null && !idlePlayer.dualWield)      reason = 'NEEDS DUAL WIELD PERK';
                        else if (item.dieIdx!=null && equipment.weapon?.hand!=='light') reason = 'NEEDS LIGHT MAIN WEAPON';
                      }
                      return (
                        <Btn key={item.id} onClick={()=>buyItem(item)} variant="shop" disabled={gold<cost || !equipOK}>
                          {item.emoji} {item.label}  <span style={{color:"#f8c840"}}>[{cost}💰]</span>
                          <span style={{color:"#806040",fontSize:7}}> [{item.slot.toUpperCase()}{item.hand?` ${item.hand.toUpperCase()}`:''}]</span><br />
                          <span style={{color:"#503870",fontSize:8}}>{describeItem(item,roomPlayer)}</span>
                          {reason && <><br /><span style={{color:"#e08020",fontSize:7}}>⚠ {reason}</span></>}
                        </Btn>
                      );
                    })}
                  </div>
                </>
              )}
              {shopItems.filter(i=>!i.slot).length>0 && (
                <>
                  <div style={{ fontSize:7, color:"#806030", letterSpacing:"0.1em", marginBottom:8 }}>🧪 CONSUMABLES</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:14 }}>
                    {shopItems.filter(i=>!i.slot).map(item=>{
                      const cost=getShopCost(item,idlePlayer);
                      return (
                        <Btn key={item.id} onClick={()=>buyItem(item)} variant="shop" disabled={gold<cost}>
                          ▶ {item.label}  <span style={{color:"#f8c840"}}>[{cost}💰]</span><br />
                          <span style={{color:"#503870",fontSize:8}}>{describeItem(item,roomPlayer)}</span>
                        </Btn>
                      );
                    })}
                  </div>
                </>
              )}
              {shopItems.length===0 && <div style={{ color:"#604090", fontSize:9, textAlign:"center", padding:12, marginBottom:14 }}>SOLD OUT</div>}
              <Btn onClick={()=>{ setShopUnlocked(false); setPhase("idle"); }} variant="flee">🚪  BACK TO DUNGEON</Btn>
            </TileBox>
          )}

          {phase==="rest" && (
            <TileBox style={{ textAlign:"center", padding:32 }}>
              <div style={{ fontSize:32, marginBottom:16 }}>🏕️</div>
              <div style={{ color:"#b8a840", fontSize:10, marginBottom:8, lineHeight:2.4 }}>CAMPFIRE LIT<br />WOUNDS MENDED</div>
              <div style={{ color:"#5a4a18", fontSize:8, marginBottom:6, lineHeight:2 }}>
                {restXpLost>0?`–${restXpLost} XP LOST`:"NO XP LOST"} · ENEMIES REMAIN
              </div>
              <div style={{ color:"#50c050", fontSize:8, marginBottom:24, lineHeight:2 }}>HP FULLY RESTORED · STATUS CLEARED</div>
              <Btn onClick={()=>{ setPlayer(p=>({...p,hp:getEffectivePlayer(p,equipment).maxHp})); setPoison(0); setBurn(0); setBleed(0); setStun(0); setPhase("idle"); }} variant="neutral">▶ BREAK CAMP</Btn>
            </TileBox>
          )}

          {phase==="idle" && (
            <TileBox style={{ textAlign:"center", padding:28 }}>
              <div style={{ fontSize:34, marginBottom:14 }}>🧝🧭🕯️</div>
              <div style={{ color:"#b8a840", fontSize:10, marginBottom:8, lineHeight:2.4 }}>CHOOSE YOUR PATH</div>
              <div style={{ color:"#3a2e0a", fontSize:7, marginBottom:14, letterSpacing:"0.08em" }}>
                WAVE {waveNumber} · ROOM {Math.min(wavePos+1,WAVE_LENGTH)}/{WAVE_LENGTH}
              </div>
              <DungeonMap wavePos={wavePos} waveNumber={waveNumber} roomChoices={roomChoices} />

              <div style={{ color:"#3a3010", fontSize:8, marginBottom:16, lineHeight:2.2 }}>
                HP {idlePlayer.hp}/{idlePlayer.maxHp} · ARM -{idlePlayer.armor} · ATK {dmgRange(idlePlayer.atkDmg,idlePlayer.dieIdx)}<br />
                HIT {idlePlayer.hitChance}% · DOD {idlePlayer.dodgeChance}% · CRT {idlePlayer.critChance}% · ☠ RES {idlePlayer.poisonResist}%<br />
                STR {roomPlayer.strength} · DEX {roomPlayer.dexterity} · CON {roomPlayer.constitution} · WIS {roomPlayer.wisdom} · CHA {roomPlayer.charisma} · INT {roomPlayer.intelligence}
                {player.counterChance>0 && <><br />CTR {player.counterChance}%</>}
                {player.doubleStrikeChance>=100&&player.tripleStrikeChance===0 && <><br /><span style={{color:"#e0a040"}}>⚔⚔ DOUBLE STRIKE (GUARANTEED)</span></>}
                {player.doubleStrikeChance>0&&player.doubleStrikeChance<100   && <><br /><span style={{color:"#e0a040"}}>⚔⚔ DOUBLE STRIKE {player.doubleStrikeChance}%</span></>}
                {player.tripleStrikeChance>0 && <><br /><span style={{color:"#f8c840"}}>⚔⚔⚔ TRIPLE STRIKE {player.tripleStrikeChance}% (DOUBLE GUARANTEED)</span></>}
                {player.ironWill    && <><br /><span style={{color:"#80d0f8"}}>🛡 IRON WILL READY</span></>}
                {player.armorPierce && <><br /><span style={{color:"#e080f8"}}>💥 ARMOR PIERCE READY</span></>}
                {player.dualWield   && <><br /><span style={{color:"#f8c840"}}>⚔⚔ DUAL WIELD ENABLED</span></>}
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {roomChoices.map(room=>{
                  const showEnemy = (room.enemyKnown||devMode) && room.enemy;
                  return (
                    <Btn key={room.id} onClick={()=>startBattle(room)} variant={room.isBoss?"attack":"neutral"}>
                      {room.icon} {room.label}
                      {showEnemy && <span style={{color:"#e08020",fontSize:8}}> · {room.enemy.emoji} {room.enemy.name}</span>}<br />
                      <span style={{color:room.known?"#608060":"#3a3010",fontSize:8}}>{(room.known||devMode)?room.desc:"WISDOM TOO LOW · DETAILS HIDDEN"}</span>
                      {!showEnemy && <><br /><span style={{color:"#3a3010",fontSize:7}}>FOE UNKNOWN · RAISE WISDOM</span></>}
                    </Btn>
                  );
                })}
                <Btn onClick={()=>{ setSelectedSlot(null); setEquipOpen(true); }} variant="stat">🧍 VIEW GEAR</Btn>
              </div>
              <div style={{ marginTop:18, display:"flex", justifyContent:"center" }}>
                <BodyLayout equip={equipment} cellSize={32} selected={null}
                            onSelect={k=>{ setSelectedSlot(k); setEquipOpen(true); }} />
              </div>

            </TileBox>
          )}

        </div>
      </div>

     {equipOpen && (
  <div style={{ position:"fixed", inset:0, background:"rgba(4,3,1,0.92)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}
       onClick={e=>{ if(e.target===e.currentTarget) setEquipOpen(false); }}>
    <div style={{ width:"100%", maxWidth:580 }}>
      <TileBox highlight style={{ padding:24 }}>
        <div style={{ fontSize:14, color:"#f8e000", textAlign:"center", marginBottom:20, letterSpacing:"0.08em" }}>
          🧍 CHARACTER GEAR
        </div>
        
        <div style={{ display:"flex", gap:24, alignItems:"flex-start" }}>
          <BodyLayout equip={equipment} selected={selectedSlot} onSelect={setSelectedSlot} cellSize={48} />

          <div style={{ flex:1 }}>
            <GearDetail selectedSlot={selectedSlot} equipment={equipment} />

            {/* STATS SECTION - Improved readability */}
            <div style={{ marginTop:28, padding:18, background:"rgba(20,15,5,0.6)", border:"2px solid #3a2f15" }}>
              <div style={{ fontSize:12, color:"#f8e000", marginBottom:14, letterSpacing:"0.1em" }}>CURRENT STATS</div>
              
              <div style={{ fontSize:10.5, lineHeight:2.1, color:"#d4c3a0" }}>
                <div><strong>HP</strong> {ep.hp}/{ep.maxHp} — Health. You die at 0.</div>
                <div><strong>ATK</strong> {dmgRange(ep.atkDmg, ep.dieIdx)} — Base damage before dice.</div>
                <div><strong>ARM</strong> {ep.armor} — Reduces incoming physical damage.</div>
                <div><strong>HIT</strong> {ep.hitChance}% — Chance to land attacks.</div>
                <div><strong>DOD</strong> {ep.dodgeChance}% — Chance to avoid enemy attacks.</div>
                <div><strong>CRT</strong> {ep.critChance}% — Chance for double damage (crits).</div>

                <div style={{marginTop:12, paddingTop:10, borderTop:"1px solid #2e2808"}}>
                  <strong>STR</strong> {ep.strength} — +Damage • +Hit Chance<br />
                  <strong>DEX</strong> {ep.dexterity} — +Dodge • +Crit Chance<br />
                  <strong>CON</strong> {ep.constitution} — +Max HP • +Poison Resist<br />
                  <strong>WIS</strong> {ep.wisdom} — +Room Awareness<br />
                  <strong>INT</strong> {ep.intelligence} — +Item Identify Chance<br />
                  <strong>CHA</strong> {ep.charisma} — Better shop prices
                </div>

                {(ep.poisonResist > 0 || ep.counterChance > 0 || ep.doubleStrikeChance > 0 || ep.armorPierce) && (
                  <div style={{marginTop:12, paddingTop:10, borderTop:"1px solid #2e2808"}}>
                    {ep.poisonResist > 0 && <div><strong>☠ RESIST</strong> {ep.poisonResist}%</div>}
                    {ep.counterChance > 0 && <div><strong>COUNTER</strong> {ep.counterChance}% — Strike back when hit</div>}
                    {ep.doubleStrikeChance > 0 && <div><strong>⚔ DOUBLE STRIKE</strong> {ep.doubleStrikeChance}% {ep.tripleStrikeChance > 0 ? `(+ ${ep.tripleStrikeChance}% Triple)` : ""}</div>}
                    {ep.armorPierce && <div><strong>💥 ARMOR PIERCE</strong> — Crits ignore enemy armor</div>}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>

        <div style={{ marginTop:24, textAlign:"center" }}>
          <Btn onClick={()=>setEquipOpen(false)} variant="flee">✕ CLOSE GEAR</Btn>
        </div>
      </TileBox>
    </div>
  </div>
)}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
