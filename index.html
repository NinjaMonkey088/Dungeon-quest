// Point-buy cost to RAISE a stat from one value to the next. Per-step cost, only applies to
// character creation (level-up uses flat 1-point-per-+1). 18 is the creation cap.
//   8→9..12→13: 1 pt each step
//   13→14, 14→15: 2 pts each step
//   15→16: 3 pts
//   16→17: 4 pts
//   17→18: 5 pts
const POINT_COST_STEP = (fromScore) => {
  if (fromScore < 8) return 0;
  if (fromScore < 13) return 1;
  if (fromScore < 15) return 2;
  if (fromScore === 15) return 3;
  if (fromScore === 16) return 4;
  if (fromScore === 17) return 5;
  return Infinity; // 18 is the cap at creation
};
// Total cost to bring a stat from 8 to `score`.
const POINT_COST_TOTAL = (score) => {
  let cost = 0;
  for (let s = 8; s < score; s++) cost += POINT_COST_STEP(s);
  return cost;
};

const DICE_PROGRESSION = (() => {
  const d = (c,s) => ({ count:c, size:s, label:c>1?`${c}D${s}`:`D${s}` });
  const p=[];
  for (let n=1; n<=5; n++) for (const s of [4,6,8,10,12,20]) p.push(d(n,s));
  return p.sort((a, b) => (a.count * a.size) - (b.count * b.size));
})();

// MIGHT/ZIP/GUTS/SAVVY/CHARM/WITS — to steer clear of the classic tabletop six. STAT_LABEL holds the
// 3-letter codes used in tight UI; STAT_FULL holds the full display names for headers/buttons.
const STAT_LABEL  = { atkDmg:'ATK', armor:'ARM', hitChance:'HIT', dodgeChance:'DOD', critChance:'CRT', maxHp:'MAX HP', speed:'SPD', greedPenalty:'DMG TAKEN', strength:'MGT', dexterity:'ZIP', constitution:'GUT', wisdom:'SAV', charisma:'CHM', intelligence:'WIT' };

// ─── Helpers ──────────────────────────────────────────────────────────────────

const roll  = n => Math.floor(Math.random()*n)+1;
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const pct   = c => roll(100)<=c;
const getDie = i => DICE_PROGRESSION[Math.min(i||0,DICE_PROGRESSION.length-1)];

function rollDiceV(idx) {
  const {count,size,label} = getDie(idx);
  const rs = Array.from({length:count},()=>roll(size));
  return { total:rs.reduce((a,b)=>a+b,0), text:`[${label}:${rs.join('+')}]` };
}

function d20Hit(chance) {
  const rolled = roll(20);
  return { rolled, hit:rolled >= Math.max(1,Math.round(21-chance/5)) };
}

function dmgRange(atk, die) {
  const d = (die && typeof die==='object') ? die : getDie(die);
  return `${Math.max(0,atk+d.count)}-${atk+d.count*d.size}`;
}

function applyBuffs(p, buffs) {
  const out = {...p};
  buffs.forEach(b => { out[b.stat]=(out[b.stat]||0)+b.val; });
  return out;
}

function applyEquipment(p, equip) {
  const out = {...p};
  [...BODY_SLOTS.map(s=>equip[s.key]), ...equip.rings]
    .filter(Boolean)
    .forEach(item => Object.entries(item.stats||{}).forEach(([k,v]) => { out[k]=(out[k]||0)+v; }));
  // Both swinging weapons go into out.weapons. Offhand only counts if it's a weapon (has dieIdx) — shields just contribute stats.
  const offIsWeapon = equip.offhand?.dieIdx != null;
  const weapons = [equip.weapon, offIsWeapon ? equip.offhand : null].filter(Boolean);
  if (weapons.length > 0) {
    out.weapons = weapons;
    out.dieIdx = weapons[0].dieIdx;
    out.weaponProcs = weapons[0].procs || {};
  }
  return out;
}

const abilityMod = score => Math.floor(((score||10)-10)/2);

// One-line human-readable description of what a given ability score does mechanically. Used by the
// character creation panel and the level-up panel to show effects update as the score changes.
// Negative mods are reported so players can see the penalty they're paying — even where the actual
// in-game value clamps at 0 (poison resist, awareness, identify all clamp; shop discount goes
// negative as markup). Crit shows total chance (base 5% + bonus) since "0% crit" reads naturally.
const statEffectLine = (statId, score, ctx={level:1, hitDice:null}) => {
  const m = abilityMod(score);
  const sign = (n) => (n >= 0 ? `+${n}` : `${n}`);
  switch (statId) {
    case "strength":     return `ATK ${sign(m)} · HIT ${sign(m*5)}%`;
    case "dexterity": {
      const crit = Math.max(0, 5 + m*5); // base 5% from PLAYER_BASE.critChance + DEX bonus
      return `DODGE ${sign(m*5)}% · CRIT ${crit}% · SPD ${sign(m)}`;
    }
    case "constitution": {
      const hp = computeMaxHpFor(score, ctx.level, ctx.hitDice);
      return `MAX HP ${hp} @ LVL ${ctx.level} · ☠ RES ${sign(m*5)}%`;
    }
    case "wisdom":       return `AWARENESS ${sign(m*15)}% · HEAL ${sign(m)} HP`;
    case "charisma":     return `SHOP DISCOUNT ${sign(m*5)}%${m<0?" (MARKUP)":""}`;
    case "intelligence": return `ITEM IDENTIFY ${sign(m*15)}%`;
    default:             return "";
  }
};

function applyAbilityStats(p) {
  const out = {...p};
  const str = abilityMod(out.strength);
  const dex = abilityMod(out.dexterity);
  const con = abilityMod(out.constitution);
  const wis = abilityMod(out.wisdom);
  const cha = abilityMod(out.charisma);
  const int = abilityMod(out.intelligence);
  // Max HP = floor((sum of all level rolls + conMod × #levels) / 2) + 2 baseline + equipment bonus.
  // The +2 baseline (BASE_HP_BUFFER) prevents the floor-1 "2 enemy attacks = dead" trap that a
  // default 8-CON character used to fall into. At low level it's a meaningful buffer; at high level
  // it's a rounding error compared to the dice contribution.
  const dice = out.hitDice || [8];
  const equipBonus = out.maxHp || 0;
  const BASE_HP_BUFFER = 2;
  const baseHp = Math.max(1, Math.floor((dice.reduce((a,b)=>a+b,0) + con*dice.length) / 2)) + BASE_HP_BUFFER;
  out.maxHp       = baseHp + equipBonus;
  out.hp          = Math.min(out.hp, out.maxHp);
  out.atkDmg      = Math.max(0,out.atkDmg + str);
  out.hitChance   = clamp(out.hitChance + str*5,5,200);
  // DEX milestone perks apply BEFORE the dodge cap clamp so Lightning Reflexes' +5% dodge and +10%
  // dodge cap actually compose with normal DEX mods.
  const reflexBonus = out.dexPerk === "reflex" ? 5 : 0;
  const dodgeCap = out.dexPerk === "reflex" ? 110 : 100;
  out.dodgeChance = clamp(out.dodgeChance + dex*5 + reflexBonus, 0, dodgeCap);
  out.critChance  = clamp(out.critChance + dex*5,0,80);
  // Speed: drives initiative at battle start. DEX matters. Equipment may also stack onto out.speed via stats.speed.
  out.speed       = Math.max(1,(out.speed||0)+10+dex);
  // Negative ability mods now apply mechanically. Awareness/identify/poison-resist clamp at 0 (you
  // can't have negative resistance/awareness), but shop discount allows negative values — that's how
  // low-charisma characters pay markup.
  out.poisonResist= clamp((out.poisonResist||0)+con*5,0,100);
  out.awareness   = clamp((out.awareness||0)+wis*15,0,100);
  out.identify    = clamp((out.identify||0)+int*15,0,100);
  out.shopDiscount= clamp((out.shopDiscount||0)+cha*5,-100,100);
  // Milestone perks: passive effects applied at the end so they compose with the base stats.
  if (out.strPerk === "brute") out.atkDmg += 1;
  if (out.conPerk === "hide")  out.armor   = (out.armor||0) + 1;
  if (out.dexPerk === "flurry") {
    out.doubleStrikeChance = (out.doubleStrikeChance||0) + 10;
    out.tripleStrikeChance = (out.tripleStrikeChance||0) + 5;
  }
  if (out.intPerk === "tactician") out.identify = 100; // unlocks full shop labels regardless of INT
  return out;
}

// Compute the player's maximum HP given an arbitrary CON score, level, and hitDice array. Used by
// statEffectLine for the CON row so character creation shows actual HP, not "HP DIE +m". The level-1
// default assumes the standard max-roll opener (`[8]`) since players see this in character creation.
function computeMaxHpFor(conScore, level=1, hitDice=null, equipBonus=0) {
  const mod = abilityMod(conScore);
  const dice = hitDice || Array.from({length: level}, () => 8);
  const sum = dice.reduce((a,b)=>a+b, 0);
  // Mirrors applyAbilityStats — +2 baseline buffer beyond the dice/CON formula.
  return Math.max(1, Math.floor((sum + mod * dice.length) / 2)) + 2 + equipBonus;
}

function getEffectivePlayer(p, equip, buffs=[]) {
  return applyBuffs(applyAbilityStats(applyEquipment(p,equip)),buffs);
}

// Weapons are always replaceable (buying a new one supplants the old). Shields too. Other slots only offer once.
const getAvailableEquipment = equip =>
  EQUIPMENT_DEFS.filter(item => {
    if (item.slot==='ring')    return equip.rings.length<5;
    if (item.slot==='weapon')  return equip.weapon?.id !== item.id;
    if (item.slot==='offhand') return equip.offhand?.id !== item.id;
    return !equip[item.slot];
  });

// Runtime equip validation. Used to grey out shop / inventory buttons that would be illegal.
// `targetSlot` overrides `item.slot` — pass `'offhand'` to ask "could this light weapon go in offhand?"
// even though the item itself is a normal `slot: 'weapon'` shop pick.
function canEquipItem(item, equip, p, targetSlot=null) {
  const slot = targetSlot || item.slot;
  if (slot === 'offhand') {
    // Two-handed main weapon blocks ANY offhand item (shield or weapon).
    if (equip.weapon?.hand === 'two') return false;
    // Weapons in the offhand: need Dual Wield perk + the weapon itself must be light + the main
    // weapon (if any) must also be light. Shields skip these checks (they have no dieIdx).
    if (item.dieIdx != null) {
      if (!p?.dualWield) return false;
      if (item.hand !== 'light') return false;
      if (equip.weapon && equip.weapon.hand !== 'light') return false;
    }
  }
  return true;
}

const getShopCost = (item, p) => Math.max(1,Math.ceil(item.cost*(1-(p.shopDiscount||0)/100)));

// True when the player can't even read the labels in the shop — INT mod < 0. Surfaces as `???`
// substitutions in describeItem / labelItem so low-INT players have to gamble on what they're buying.
function isIlliterate(p) { return abilityMod(p.intelligence||10) < 0; }

function describeItem(item, p) {
  if (isIlliterate(p)) return "??? — TOO ARCANE TO READ";
  if (!item.slot || (p.identify||0)>=50) return item.desc;
  if (item.stats.maxHp) return "VITAL GEAR";
  if (item.stats.armor) return "DEFENSIVE GEAR";
  if (item.stats.atkDmg || item.stats.hitChance || item.stats.critChance) return "COMBAT GEAR";
  return "ENCHANTED GEAR";
}

// Visible name of an item in the shop. Obscures to "???" for low-INT players.
function labelItem(item, p) {
  return isIlliterate(p) ? "???" : item.label;
}

function pickRandom(pool, n) {
  const src=[...pool], out=[];
  while (out.length<n && src.length) out.push(src.splice(Math.floor(Math.random()*src.length),1)[0]);
  return out;
}

// Inventory helpers — items stack by id so a player can carry e.g. ANTIDOTE (×3) in one slot.
// Both consumables and equipment use the same mechanism; equipment will only ever stack if the player
// buys two of the same item id or repeatedly displaces identical gear into the bag.
const addToInventory = (inv, item) => {
  const idx = inv.findIndex(x => x.id === item.id);
  if (idx >= 0) return inv.map((x,i) => i===idx ? {...x, count:(x.count||1)+1} : x);
  return [...inv, {...item, count:1}];
};
const removeFromInventory = (inv, item) => {
  const idx = inv.findIndex(x => x.id === item.id);
  if (idx < 0) return inv;
  const cur = inv[idx];
  if ((cur.count||1) > 1) return inv.map((x,i) => i===idx ? {...x, count:x.count-1} : x);
  return [...inv.slice(0,idx), ...inv.slice(idx+1)];
};

// Shop equipment is biased toward common items: each pick has a 25% chance to come
// from the rare pool when both pools are non-empty. Falls back gracefully when one is empty.
// If the player has dual-wield + a light main weapon equipped, light weapon picks may be
// re-tagged as offhand variants so they slot into the offhand instead of replacing the main.
function pickShopEquipment(avail, n) {
  const src=[...avail], out=[];
  while (out.length<n && src.length) {
    const common=src.filter(i=>!i.rare), rare=src.filter(i=>i.rare);
    const pool = (rare.length && common.length) ? (pct(25)?rare:common) : (common.length?common:rare);
    const item = pool[Math.floor(Math.random()*pool.length)];
    src.splice(src.indexOf(item),1);
    out.push(item);
  }
  return out;
}

// Fight room types — any can spawn 1–2 foes (35% chance of 2); big rooms ALWAYS have 2 (30% chance
// of 3). Enemy-count logic lives in rollEnemyCount / makeFloorMap.
const ROOM_TYPES = [
  { id:"small",  icon:"▦", label:"SMALL ROOM", desc:"A TIGHT FIGHT · MAY SWARM" },
  { id:"big",    icon:"▣", label:"BIG ROOM",   desc:"MORE GOLD · 2+ FOES", enemyMod:e=>({...e,goldMin:e.goldMin+1,goldMax:e.goldMax+3}), maybeDouble:true },
  { id:"bridge", icon:"═", label:"BRIDGE",     desc:"SWIFT FOE · GOOD GOLD · MAY SWARM", enemyMod:e=>({...e,dodgeChance:(e.dodgeChance||0)+15,goldMax:e.goldMax+2}) },
  { id:"shrine", icon:"✚", label:"OLD SHRINE", desc:"WEAKER FOE · SMALL GOLD · MAY SWARM", enemyMod:e=>({...e,hitChance:Math.max(30,e.hitChance-10),goldMin:Math.max(1,e.goldMin-1)}) },
];
// Trap rooms: no combat. Walking in forces a ZIP (dexterity) shrug-off vs a floor-scaled target;
// failing deals damage (sometimes + a status). Spotting the trap first (the awareness/WIS roll) adds
// +5 to the shrug-off. See triggerTrap.
const TRAP_ROOM = { id:"trap", icon:"⚠", label:"TRAP ROOM", desc:"SOMETHING'S RIGGED HERE", isTrap:true };
// How many foes a fight room spawns. Big rooms are always a crowd; others may swarm.
const rollEnemyCount = (type) => type.maybeDouble ? (pct(30) ? 3 : 2) : (pct(35) ? 2 : 1);
// Chance a non-entrance, non-boss room is a trap instead of a fight.
const TRAP_ROOM_CHANCE = 20;

// makeFloorMap builds the persistent layout for a floor. Always 1 boss + (size-1) fight rooms;
// positions are shuffled. Rooms carry a stable `key` so React reconciles correctly and we can flip
// the `cleared` flag in-place after victories. The boss room transforms into a stairs tile on kill
// (see resolveVictory). WIS-based `known` / `enemyKnown` rolls happen once at floor creation. The
// boss room is always fully known — no surprise round on bosses (room-less ambush bosses, future).
// Floor layout scales with floorNum: deeper floors use bigger grids. Each room gets a `pos:{col,row}`
// so the fog-of-war map can compute adjacency. The entrance — position {0,0} — is always a fight
// room and is marked `visited:true` so the player spawns somewhere safe (the boss never appears at
// the start).
const getFloorLayout = floorNum => {
  if (floorNum <= 3)  return { cols:3, rows:2 };  // 6 tiles
  if (floorNum <= 7)  return { cols:3, rows:3 };  // 9 tiles
  if (floorNum <= 13) return { cols:4, rows:3 };  // 12 tiles
  return                { cols:4, rows:4 };       // 16 tiles (waves 14–20)
};
const floorPositions = floorNum => {
  const {cols, rows} = getFloorLayout(floorNum);
  const out = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      out.push({col:c, row:r});
  return out;
};
const isAdjacentPos = (a, b) => !!a && !!b && (Math.abs(a.col-b.col) + Math.abs(a.row-b.row)) === 1;

function makeFloorMap(floorNum, level, p, revealAll=false) {
  const awareness = revealAll ? 100 : (p.awareness||0);
  const enemyKnown = () => revealAll || pct(awareness);
  const known = () => revealAll || pct(35+awareness);
  const positions = floorPositions(floorNum);
  const size = positions.length;
  const bossRoom = {
    id:'boss', icon:'▰', label:'BOSS DOOR', desc:'THE FLOOR GUARDIAN WAITS',
    isBoss:true, enemies:[pickBoss(floorNum, level)], cleared:false,
    known:true, enemyKnown:true, key:'boss',
  };
  const fightRooms = Array.from({length: size - 1}, (_, i) => {
    // The entrance (i===0) is always a single-foe fight — never a trap, never a swarm — so floor 1
    // can't open on a 3-enemy ambush or a blind trap. Every other room may be a trap or a swarm.
    if (i > 0 && pct(TRAP_ROOM_CHANCE)) {
      return {
        ...TRAP_ROOM,
        enemies:    [],
        cleared:    false,
        known:      known(),
        trapAware:  enemyKnown(), // spotted the trap? → +5 to the shrug-off
        key:        `room_${i}`,
      };
    }
    const type = ROOM_TYPES[Math.floor(Math.random()*ROOM_TYPES.length)];
    const enemyCount = i === 0 ? 1 : rollEnemyCount(type);
    const enemies = pickRoomEnemies(level, enemyCount);
    return {
      ...type,
      enemies,
      cleared:    false,
      known:      known(),
      enemyKnown: enemyKnown(),
      key:        `room_${i}`,
    };
  });
  // The entrance is the first fight room — pinned to position {0,0} and pre-visited so the player
  // can't insta-trigger a boss fight by spawning at the wrong tile.
  const entrance = { ...fightRooms[0], pos: positions[0], visited: true };
  // Everything else (boss + remaining fight rooms) gets shuffled across the remaining tiles.
  const others = [bossRoom, ...fightRooms.slice(1)];
  for (let i = others.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [others[i], others[j]] = [others[j], others[i]];
  }
  others.forEach((r, idx) => { r.pos = positions[idx + 1]; r.visited = false; });
  return [entrance, ...others];
}

function applyRoomToEnemy(e, room) {
  const next = room?.enemyMod ? room.enemyMod(e) : e;
  return {...next, hp:Math.min(next.hp,next.maxHp)};
}

// ─── Save / resume (localStorage) ───────────────────────────────────────────────
// The run is autosaved at non-combat phases only — mid-fight state lives in combatRef + async enemy
// chains and isn't safely serializable, so a reload mid-battle resumes from the last safe point.
// JSON.stringify drops functions, so consumables (onUse) and room types (enemyMod) are rehydrated by
// id on load.
const SAVE_KEY = "dq_save";
const SAVE_PHASES = new Set(["idle","win","shop","rest","levelup","perk","statperk"]);
const CONSUMABLE_BY_ID = Object.fromEntries(SHOP_CONSUMABLES.map(c => [c.id, c]));
const ROOM_TYPE_BY_ID  = Object.fromEntries(ROOM_TYPES.map(t => [t.id, t]));
const rehydrateItem = it => {
  const def = it && CONSUMABLE_BY_ID[it.id];
  return def && def.onUse ? { ...it, onUse: def.onUse } : it;
};
const rehydrateRoom = r => {
  const def = r && ROOM_TYPE_BY_ID[r.id];
  return def && def.enemyMod ? { ...r, enemyMod: def.enemyMod } : r;
};
const clearSave = () => { try { localStorage.removeItem(SAVE_KEY); } catch (e) {} };

// Ramps to 100 by level 15, then +1/level above 15 (counters player dodge)
const roundToFive = v => Math.round(v/5)*5;
const scaleHit = (base,level) =>
  roundToFive(base + Math.min(level-1,14)/14*(100-base) + Math.max(0,level-15));

function pickEnemy(level, { allowHealer = true } = {}) {
  const wave = WAVES[clamp(level-1,0,WAVES.length-1)];
  // Healers (witches) can't roll in slots where allowHealer is false — used to prevent solo witches
  // (single-enemy rooms) and double-witch rooms (would heal each other indefinitely).
  const pool = wave.flatMap(([n,w])=>Array(w).fill(n))
    .filter(name => allowHealer || !ENEMY_DEFS[name].healsAllies);
  const name = pool[Math.floor(Math.random()*pool.length)];
  const base = ENEMY_DEFS[name];
  const over = Math.max(0,level-WAVES.length);
  return { name, ...base,
    maxHp:     base.maxHp+over,
    hp:        base.maxHp+over,
    attack:    base.attack+Math.floor(over/5),
    hitChance: scaleHit(base.hitChance,level),
  };
}

// Roll the enemy list for a room, enforcing the witch-spawn rule: witches can only appear alongside
// at least one non-healer enemy. Single-enemy rooms never get a witch; double-enemy rooms get at
// most one witch.
function pickRoomEnemies(level, count) {
  if (count <= 1) return [pickEnemy(level, { allowHealer:false })];
  // Up to `count` foes, but at most one healer in the room (so it can't stall into an un-winnable
  // heal-loop). Each subsequent pick disallows a healer once one is already present.
  const out = [];
  for (let i = 0; i < count; i++) {
    const hasHealer = out.some(e => e.healsAllies);
    out.push(pickEnemy(level, { allowHealer: !hasHealer }));
  }
  return out;
}

function pickBoss(waveNumber, level) {
  if (waveNumber<=WAVE_BOSSES.length) {
    const def=WAVE_BOSSES[waveNumber-1];
    return {...def, hp:def.maxHp, hitChance:scaleHit(def.hitChance,level)};
  }
  const idx   = clamp(waveNumber-WAVE_BOSSES.length-1, 0, BOSS_DEFS.length-1);
  const def   = BOSS_DEFS[idx];
  const bonus = Math.max(0, waveNumber-WAVE_BOSSES.length-idx-1);
  return { ...def,
    maxHp:     def.maxHp+bonus*2,
    hp:        def.maxHp+bonus*2,
    attack:    def.attack+Math.floor(bonus/2),
    hitChance: scaleHit(def.hitChance,level),
    goldMin:   def.goldMin+bonus,
    goldMax:   def.goldMax+bonus*2,
    xp:        def.xp+bonus,
    name:      bonus>2?`ELDER ${def.name}`:def.name,
  };
}

// ─── Combat ───────────────────────────────────────────────────────────────────

function playerAttack(p, e, verbose=false) {
  const results = [];
  const weapons = (p.weapons && p.weapons.length) ? p.weapons : [{ dieIdx: p.dieIdx, procs: {} }];

  // 1. BLEED LOGIC: Damage increases based on how "bad" the current bleed is
  const bleedBonus = e.bleed || 0;
  const applyBleed = dmg => dmg + Math.floor(bleedBonus);

  let didPoison = false, didBurn = false, didBleed = false;
  let newBleedVal = 0;

  const doSwing = (weapon, isOffhand = false) => {
    const procs = weapon.procs || {};
    const { rolled, hit } = d20Hit(p.hitChance - e.dodgeChance);
    const wouldCrit = rolled >= 20 - p.critChance / 5;

    if (!hit && !wouldCrit) {
      results.push({ type: "miss", text: `${rolled}! ${e.dodgeChance > 0 ? "DODGE!" : "MISS!"}` });
      return 0;
    }

    // Arcane Sense (INT 20 perk): +5% to existing weapon proc chances. Only amplifies procs the
    // weapon already has — a plain dagger gets nothing, but a Venom Dagger's 25% poison becomes 30%.
    const arcaneBonus = p.intPerk === "arcane" ? 5 : 0;
    const procPierce = procs.pierceChance > 0 && pct(procs.pierceChance + arcaneBonus);
    const r1 = rollDiceV(weapon.dieIdx);
    let dmg;

    // 2. CRIT & DAMAGE CALCULATION
    const armorUsed = (procPierce || (wouldCrit && p.armorPierce)) ? 0 : e.armor;

    if (wouldCrit && hit && !e.immuneToCrit) {
      const r2 = rollDiceV(weapon.dieIdx);
      dmg = p.atkDmg + r1.total + r2.total - armorUsed;
      results.push({ type: "crit", text: `${rolled}! ★ CRIT! ${dmg} DMG!` });
    } else {
      dmg = p.atkDmg + r1.total - armorUsed;
      const typeText = wouldCrit ? "AUTO-HIT!" : "HIT!";
      results.push({ type: "player", text: `${rolled}! ${typeText} ${Math.max(0, dmg)} DMG` });
    }

    dmg = Math.max(0, dmg);

    // 3. OFFHAND PENALTY: 30% damage cut (70% effective) unless they have Master Duelist. Was 50%
    //    before tuning — bumped to make dual-wielding actually attractive vs. a 2H weapon.
    if (isOffhand && !p.masterDuelist) {
      dmg = Math.floor(dmg * 0.7);
    }

    // Apply the current bleed bonus damage to the final result
    dmg = applyBleed(dmg);

    // 4. BLEED PROC: Set to weapon's average damage (Die Average + ATK)
    if (dmg > 0) {
      if (procs.poisonChance && pct(procs.poisonChance + arcaneBonus)) didPoison = true;
      if (procs.burnChance && pct(procs.burnChance + arcaneBonus)) didBurn = true;
      if (procs.bleedChance && pct(procs.bleedChance + arcaneBonus)) {
        didBleed = true;
        const die = getDie(weapon.dieIdx);
        // Average of a die is (max + 1) / 2. Bleed stacks both as damage and counter, so we halve
        // the raw (avg + atkDmg) — the un-halved value compounded to 100+ bonus damage in mid-game
        // when a Bleeding Spear procced once.
        const avgWeaponDmg = ((die.count * (die.size + 1)) / 2) + p.atkDmg;
        newBleedVal = Math.max(1, Math.floor(avgWeaponDmg / 2));
      }
    }
    return dmg;
  };

  // --- Execute Swings ---
  // We track running damage and short-circuit once the enemy would already be dead, so
  // double/triple/offhand swings don't whiff against a corpse.
  let total = 0;
  const enemyDead = () => total >= e.hp;

  // Main Strike
  total += doSwing(weapons[0], false);

  // Offhand Strike (Standard Dual Wielding)
  if (weapons.length > 1 && !enemyDead()) {
    results.push({ type: "player", text: "⚔ OFFHAND STRIKE!" });
    total += doSwing(weapons[1], true);
  }

  // 5. MULTI-STRIKE LOGIC — Double and Triple Strike are independent bonus-swing rolls; neither is
  //    guaranteed. Triple is gated behind Double landing first so a 3rd swing always implies a 2nd
  //    (you never see "TRIPLE STRIKE" without "DOUBLE STRIKE").

  // Double Strike: bonus main-hand swing on a doubleStrikeChance roll.
  let doubled = false;
  if (!enemyDead() && pct(p.doubleStrikeChance)) {
    doubled = true;
    results.push({ type: "player", text: "⚔⚔ DOUBLE STRIKE!" });
    total += doSwing(weapons[0], false);
  }

  // Triple Strike: a further bonus swing, only possible once a Double has landed this turn. Uses the
  // offhand weapon (with its penalty) when dual-wielding; otherwise a bonus main-hand swing, no penalty.
  if (doubled && !enemyDead() && pct(p.tripleStrikeChance)) {
    results.push({ type: "player", text: "⚔⚔⚔ TRIPLE STRIKE!" });
    total += doSwing(weapons[1] || weapons[0], !!weapons[1]);
  }

  return { total, results, didPoison, didBurn, didBleed, newBleedVal };
}

function enemyAttack(p, e, verbose=false) {
  const results=[];
  let dmgToPlayer=0, counterDmg=0, gotCrit=false, didPoison=false, didBurn=false, didBleed=false, didStun=false;
  const hitRoll   = d20Hit(e.hitChance);
  const dodgeRoll = hitRoll.hit ? d20Hit(p.dodgeChance) : null;
  if (!hitRoll.hit) {
    results.push({type:"miss", text:`${e.name} ${hitRoll.rolled}! MISS!`});
  } else if (dodgeRoll?.hit) {
    results.push({type:"dodge", text:`${e.name} ${hitRoll.rolled}! → YOU ${dodgeRoll.rolled}! DODGE!`});
  } else {
    const isCrit = hitRoll.rolled===20;
    const d1 = roll(3);
    const gp  = p.greedPenalty||0;
    if (isCrit) {
      gotCrit=true;
      const d2=roll(3);
      dmgToPlayer = Math.max(0,e.attack+d1+d2-p.armor+gp);
      results.push({type:"enemy", text:`${e.name} 20! ★ CRIT!${verbose?` [D3:${d1}+D3:${d2}]`:""} ${dmgToPlayer} DMG!`});
    } else {
      dmgToPlayer = Math.max(0,e.attack+d1-p.armor+gp);
      results.push({type:"enemy", text:`${e.name} ${hitRoll.rolled}! HIT!${verbose?` [D3:${d1}]`:""} ${dmgToPlayer} DMG${dmgToPlayer===0?" (BLOCKED)":""}`});
    }
    if (dmgToPlayer>0) {
      if (e.poisonOnHit)              didPoison=true;
      if (e.burnsOnHit)               didBurn=true;
      if (e.bleedsOnCrit && isCrit)   didBleed=true;
      if (e.stunsOnHit && pct(30))    didStun=true;
    }
    if (pct(p.counterChance)) {
      counterDmg = Math.max(0,Math.ceil(p.atkDmg/2));
      results.push({type:"counter", text:`COUNTER! ${counterDmg} DMG!`});
    }
  }
  return { dmgToPlayer, counterDmg, results, gotCrit, didPoison, didBurn, didBleed, didStun };
}

// D&D-style spell attack. Returns the same shape as enemyAttack so attackOne can dispatch uniformly.
//   DC = 8 + spell.mod + floor(floor/2)
//   Player rolls d20 + abilityMod(player[spell.ability])
//   roll > DC → saved. saved outcome controlled by spell.onSave:
//     "avoid"  → 0 dmg, no status
//     "half"   → floor(damage/2), no status
//     "status" → 0 dmg, status still lands
//     "both"   → floor(damage/2) + status lands
//   roll ≤ DC → full damage + status. Bypasses dodge and armor — saves replace both for spells.
function enemySpellAttack(p, e, floor) {
  const sp = e.spell;
  const results = [];
  let dmgToPlayer = 0, didPoison = false, didBurn = false, didBleed = false, didStun = false;
  const abilityKey = sp.ability;
  const playerMod = abilityMod(p[abilityKey] || 10);
  const dc = 8 + (sp.mod || 0) + Math.floor((floor || 1) / 2);
  const saveRoll = roll(20);
  const saveTotal = saveRoll + playerMod;
  const saved = saveTotal > dc;
  const stat = STAT_LABEL[abilityKey] || (abilityKey || "wis").slice(0,3).toUpperCase();
  const signMod = playerMod >= 0 ? `+${playerMod}` : `${playerMod}`;
  const applyStatus = () => {
    if (sp.effect === "poison") didPoison = true;
    if (sp.effect === "burn")   didBurn   = true;
    if (sp.effect === "bleed")  didBleed  = true;
    if (sp.effect === "stun")   didStun   = true;
  };
  const intro = `${e.name} casts ${sp.name}!`;
  const saveDesc = `YOU ${stat} SHRUG ${saveRoll}${signMod} (${saveTotal}) vs ${dc}`;

  if (saved) {
    if (sp.onSave === "half" || sp.onSave === "both") dmgToPlayer = Math.floor(sp.damage / 2);
    if (sp.onSave === "status" || sp.onSave === "both") applyStatus();
    const tag = sp.onSave === "avoid"  ? "SHAKED OFF!"
              : sp.onSave === "half"   ? `GLANCING — ${dmgToPlayer} DMG`
              : sp.onSave === "status" ? "PARTIAL — STATUS LANDS!"
              : /* both */               `PARTIAL — ${dmgToPlayer} DMG + STATUS!`;
    results.push({ type: sp.onSave === "avoid" ? "dodge" : "enemy", text: `${intro} ${saveDesc} → ${tag}` });
  } else {
    dmgToPlayer = sp.damage;
    applyStatus();
    results.push({ type: "enemy", text: `${intro} ${saveDesc} → OOF — ${dmgToPlayer} DMG!` });
  }
  // Spells bypass counter-strike. Crit is meaningless for save-based spells.
  return { dmgToPlayer, counterDmg: 0, results, gotCrit: false, didPoison, didBurn, didBleed, didStun };
}

// ─── UI Components ────────────────────────────────────────────────────────────

function Hearts({ hp, maxHp }) {
  return (
    <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
      {Array.from({length:Math.ceil(maxHp/2)}).map((_,i) => {
        const full=hp>=i*2+2, half=!full&&hp>=i*2+1;
        if (full) return <span key={i} style={{ fontSize:18, lineHeight:1 }}>❤️</span>;
        if (half) return (
          <span key={i} style={{ fontSize:18, lineHeight:1, position:"relative", display:"inline-block" }}>
            🤍
            <span aria-hidden="true" style={{ position:"absolute", left:0, top:0, clipPath:"inset(0 50% 0 0)", pointerEvents:"none" }}>❤️</span>
          </span>
        );
        return <span key={i} style={{ fontSize:18, lineHeight:1 }}>🤍</span>;
      })}
    </div>
  );
}

function TileBox({ children, style={}, highlight=false }) {
  return (
    <div className="dq-panel" style={{ border:`4px solid ${highlight?"#caa23c":"#6b4a28"}`, borderRadius:18, background:"linear-gradient(165deg, #2c1e11 0%, #20160b 58%, #160e07 100%)", padding:"16px 18px", boxShadow: highlight ? "0 8px 0 rgba(0,0,0,0.3), 0 16px 30px rgba(0,0,0,0.45), 0 0 22px rgba(202,162,60,0.28), inset 0 2px 0 rgba(255,236,170,0.18), inset 0 -12px 20px rgba(0,0,0,0.38)" : "0 8px 0 rgba(0,0,0,0.3), 0 16px 30px rgba(0,0,0,0.4), inset 0 2px 0 rgba(255,224,160,0.1), inset 0 -12px 20px rgba(0,0,0,0.36)", ...style }}>
      {children}
    </div>
  );
}

// FloorMap: spatial grid with fog of war. Each room sits at a fixed `pos` set by makeFloorMap. The
// grid size scales with floor depth via getFloorLayout(waveNumber). A tile is visible if it's been
// visited OR is adjacent (Manhattan-1) to any visited tile; everything else renders as a fog "?".
// Clicking a tile fires `onEnter(room)` — the App decides whether to move silently (cleared /
// fast-travel) or kick off combat / stairs. Adjacent-or-visited tiles are clickable; foggy tiles are
// inert. Player avatar renders at `playerPos`.
function FloorMap({ waveNumber, floorRooms, playerPos, revealAll=false, onEnter, playerEmoji }) {
  const cleared = floorRooms.filter(r => r.cleared && !r.isBoss && !r.descend).length;
  const total   = floorRooms.filter(r => !r.isBoss && !r.descend).length;
  const visible = room => room.visited || floorRooms.some(o => o.visited && isAdjacentPos(o.pos, room.pos)) || revealAll;
  const canEnter = room => room.visited || isAdjacentPos(room.pos, playerPos);
  // Derive grid dimensions from the rooms themselves so the map adapts when makeFloorMap returns a
  // different layout for higher floors.
  const cols = Math.max(1, ...floorRooms.map(r => (r.pos?.col ?? 0) + 1));
  const rows = Math.max(1, ...floorRooms.map(r => (r.pos?.row ?? 0) + 1));
  const gridPositions = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      gridPositions.push({col:c, row:r});
  // Tile minHeight shrinks slightly on bigger maps so 16-tile floors still fit on a phone screen.
  const tileMinHeight = cols >= 4 ? 62 : 78;
  return (
    <div style={{ background:"linear-gradient(165deg,#16100a,#0c0805)", border:"2px solid #4a371d", borderRadius:14, padding:"12px 10px", marginBottom:16, boxShadow:"inset 0 2px 0 rgba(255,224,160,0.05)" }}>
      <div style={{ color:"#caa86a", fontSize:10, letterSpacing:"0.08em", marginBottom:10, textAlign:"center", fontWeight:600 }}>
        DUNGEON FLOOR {waveNumber} · {cleared}/{total} CLEARED · {cols}×{rows}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:`repeat(${cols}, 1fr)`, gridTemplateRows:`repeat(${rows}, 1fr)`, gap:6 }}>
        {gridPositions.map(({col, row}) => {
          const room = floorRooms.find(r => r.pos && r.pos.col === col && r.pos.row === row);
          if (!room) return <div key={`${col}_${row}`} />;
          const isCurrent  = playerPos.col === col && playerPos.row === row;
          const isVisible  = visible(room);
          const isClickable = isVisible && canEnter(room);
          // Hidden fog tile — no info leaks.
          if (!isVisible) {
            return (
              <div key={room.key}
                   style={{ minHeight:tileMinHeight, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                            background:"#0c0a07", border:"2px solid #241c12", borderRadius:9,
                            color:"#3a3010", fontSize:22, cursor:"default" }}>
                ?
              </div>
            );
          }
          const isBoss   = !!room.isBoss;
          const isStairs = !!room.descend;
          const isTrap   = !!room.isTrap;
          const done     = room.cleared;
          const showEnemies = !done && (room.enemyKnown || revealAll) && room.enemies && room.enemies.length > 0;
          const bg = isCurrent ? "#1a2010"
                   : isStairs  ? "#08081c"
                   : done      ? "#0a220a"
                   : isBoss    ? "#220808"
                   : isTrap    ? "#1f1405"
                   : "#101006";
          const border = isCurrent ? "#f8e000"
                       : isStairs  ? "#5060a0"
                       : done      ? "#50c050"
                       : isBoss    ? "#a05050"
                       : isTrap    ? "#a07020"
                       : isClickable ? "#806030"
                       : "#3a3010";
          return (
            <div key={room.key}
                 onClick={isClickable ? () => onEnter(room) : undefined}
                 style={{ minHeight:tileMinHeight, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                          gap:2, background:bg, border:`2px solid ${border}`, borderRadius:9, padding:"4px 2px",
                          boxShadow:"inset 0 1px 0 rgba(255,255,255,0.06)",
                          position:"relative", cursor:isClickable?"pointer":"default" }}>
              {isCurrent && <div style={{ position:"absolute", top:2, left:3, fontSize:13 }}>{playerEmoji||"🧝"}</div>}
              <div style={{ fontSize:16, color: isStairs?"#80b8e8":done?"#50c050":isBoss?"#e07070":isTrap?"#e0a040":"#a08a40" }}>
                {done && !isStairs ? "✓" : room.icon}
              </div>
              {showEnemies && (
                <div style={{ fontSize:11, display:"flex", gap:1, justifyContent:"center" }}>
                  {room.enemies.map((e,i) => <span key={i}>{e.emoji}</span>)}
                </div>
              )}
              <div style={{ fontSize:11, fontWeight:600, color: isStairs?"#9fd8f5":done?"#93e78d":isBoss?"#e09090":isTrap?"#e0a86c":"#9a7c44", textAlign:"center" }}>
                {isStairs ? "STAIRS" : isBoss ? "BOSS" : isTrap ? (done ? "SPRUNG" : (room.trapAware||revealAll) ? "TRAP!" : "TRAP") : done ? "CLEAR" : room.label.split(" ")[0]}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function GearDetail({ selectedSlot, equipment }) {
  if (!selectedSlot) return (
    <div style={{ color:"#3a2e0a", fontSize:10, lineHeight:2, marginTop:8 }}>← CLICK A SLOT<br />TO INSPECT</div>
  );
  const isRing  = selectedSlot.startsWith("ring:");
  const ringIdx = isRing ? parseInt(selectedSlot.split(":")[1]) : null;
  const item    = isRing ? equipment.rings[ringIdx] : equipment[selectedSlot];
  const slotDef = isRing ? null : BODY_SLOTS.find(s=>s.key===selectedSlot);
  const label   = isRing ? `RING SLOT ${ringIdx+1}` : selectedSlot.toUpperCase();
  return (
    <>
      <div style={{ fontSize:9, color:"#806030", letterSpacing:"0.1em", marginBottom:12 }}>
        {slotDef?.emoji??"💍"} {label}
      </div>
      {item ? (
        <>
          <div style={{ fontSize:13, color:"#c080f8", marginBottom:10, lineHeight:1.5 }}>{item.label}</div>
          <div style={{ fontSize:10, color:"#9070b0", lineHeight:1.8, marginBottom:14 }}>{item.desc}</div>
          <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
            {Object.entries(item.stats).map(([k,v]) => {
              const bad = v<0 || k==='greedPenalty';
              return <div key={k} style={{ fontSize:11, color:bad?"#e08020":"#50d850" }}>{v>0?"+":""}{v} {STAT_LABEL[k]||k.toUpperCase()}</div>;
            })}
          </div>
          {item.vampiric && <div style={{ fontSize:10, color:"#e040e0", marginTop:10 }}>🩸 HEAL 2 HP ON CRIT</div>}
          <div style={{ fontSize:10, color:"#a07020", marginTop:14 }}>COST {item.cost}💰</div>
        </>
      ) : (
        <div style={{ fontSize:11, color:"#5a4018", marginTop:18, lineHeight:2 }}>
          — EMPTY —<br /><span style={{ fontSize:9, color:"#3a2e0a" }}>VISIT THE SHOP<br />AFTER A BOSS</span>
        </div>
      )}
    </>
  );
}

function ItemButtons({ items, onUse, onEquipOffhand, canEquipOffhand, inBattle=true }) {
  return items.map((item,i) => {
    const isEquip = !!item.slot;
    const count = item.count||1;
    const countTag = count>1 ? ` (×${count})` : '';
    // Light weapons can ALSO be sent to the offhand slot when the player has Dual Wield + a light
    // main weapon. We expose a SECOND button labelled OFFHAND so the player can choose where the
    // weapon ends up. The primary button still routes to the item's natural slot (mainhand here).
    const offhandOK = isEquip && canEquipOffhand && canEquipOffhand(item);
    const mainLabel = (isEquip && offhandOK) ? `⚔ EQUIP → MAIN ${item.label}${countTag}`
                    : isEquip                ? `⚔ EQUIP ${item.label}${countTag}`
                    :                          `▶ ${item.label}${countTag}`;
    return (
      <React.Fragment key={i}>
        <Btn onClick={()=>onUse(item,inBattle)} variant={isEquip?"stat":"shop"}>
          {mainLabel}<br />
          <span style={{ color:isEquip?"#405870":"#503870", fontSize:11 }}>{item.desc}</span>
        </Btn>
        {offhandOK && (
          <Btn onClick={()=>onEquipOffhand(item,inBattle)} variant="stat">
            🛡 EQUIP → OFFHAND {item.label}<br />
            <span style={{ color:"#405870", fontSize:11 }}>DUAL WIELD · SECOND LIGHT WEAPON</span>
          </Btn>
        )}
      </React.Fragment>
    );
  });
}
