// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [player,       setPlayer]       = useState({...PLAYER_BASE});
  // Multi-enemy combat: `enemies` is the array of foes in the current battle (1 or 2 entries).
  // `targetIdx` is which enemy the player is currently aiming at. `enemy` is derived below — it
  // points to the alive enemy at targetIdx (or the first alive if the target has died) so existing
  // single-enemy UI and combat code keeps working.
  const [enemies,      setEnemies]      = useState([]);
  const [targetIdx,    setTargetIdx]    = useState(0);
  const [log,          setLog]          = useState([{text:"PRESS START TO BEGIN",type:"sys"}]);
  const [phase,        setPhase]        = useState("title");
  const [showScores,   setShowScores]   = useState(false);
  const [ironUsed,     setIronUsed]     = useState(false);
  const [level,        setLevel]        = useState(1);
  const [xp,           setXp]           = useState(0);
  const [restXpLost,   setRestXpLost]   = useState(0);
  const [restUsed,     setRestUsed]     = useState(false);
  const [gold,         setGold]         = useState(0);
  const [shaking,      setShaking]      = useState(null);
  const [levelUpOpts,  setLevelUpOpts]  = useState([]);
  const [pickedStats,  setPickedStats]  = useState([]);
  const [perkOpts,     setPerkOpts]     = useState([]);
  // wavePos removed — progression now tracked by `cleared` flags on each room in floorRooms.
  const [waveNumber,   setWaveNumber]   = useState(1);
  const [floorRooms,   setFloorRooms]   = useState(()=>makeFloorMap(1,1,applyAbilityStats(PLAYER_BASE),false));
  // Fog-of-war navigation. The player occupies one tile at a time and can move to adjacent rooms
  // (Manhattan-distance 1) or fast-travel back to any previously-visited tile. Resets to {0,0} every
  // time the floor regenerates (boss kill / stairs descent / restart).
  const [playerPos,    setPlayerPos]    = useState({col:0, row:0});
  const [shopItems,    setShopItems]    = useState([]);
  const [equipment,    setEquipment]    = useState({...EMPTY_EQUIP});
  const [inventory,    setInventory]    = useState([]);
  const [tempBuffs,    setTempBuffs]    = useState([]);
  const [shopUnlocked, setShopUnlocked] = useState(false);
  const [selectingItem,setSelectingItem]= useState(false);
  const [selectingSpell,setSelectingSpell]= useState(false);
  const [arenaAnim,    setArenaAnim]    = useState({player:'idle',enemy:'idle'});
  const [devMode,      setDevMode]      = useState(false);
  const [equipOpen,    setEquipOpen]    = useState(false);
  const [selectedSlot, setSelectedSlot] = useState(null);
  const [poison,       setPoison]       = useState(0);
  const [burn,         setBurn]         = useState(0);
  const [bleed,        setBleed]        = useState(0);
  const [stun,         setStun]         = useState(0);
  // Temp HP — granted by Sage's Reservoir on every heal. Absorbed before real HP during enemy
  // attacks. Capped at maxHp. Cleared at battle start (does not carry between fights).
  const [tempHp,       setTempHp]       = useState(0);
  // Unspent stat points. Topped up by 27 at character creation and +2 per level-up. Spendable in
  // the "create" and "levelup" phases via pickStat. Persist on the player between sessions of the run.
  const [unspentPoints,setUnspentPoints]= useState(0);
  // Which stat triggered the milestone-perk picker. Cleared when the player chooses a perk.
  const [milestoneStat,setMilestoneStat]= useState(null);
  // Character creation working state — name, emoji, and a draft scores object. Initialized when the
  // player enters the "create" phase from the title screen.
  const [draft,        setDraft]        = useState(null);
  const [gameStats,    setGameStats]    = useState({biggestHit:0,biggestHitTaken:0,killCounts:{},itemsUsed:{}});
  const [highScores,   setHighScores]   = useState(()=>JSON.parse(localStorage.getItem('dq_scores')||'[]'));
  // Tutorial + story UI state. `activeHint` = the floating one-time hint currently shown (or null).
  // `storyBeat` = content for the `story` phase (prologue / floor beats). `howtoReturn` = where the
  // HOW-TO-PLAY screen's button goes ("create" on the first-play auto-show, else back to "title").
  const [activeHint,   setActiveHint]   = useState(null);
  const [storyBeat,    setStoryBeat]    = useState(null);
  const [howtoReturn,  setHowtoReturn]  = useState("title");
  const [howtoPage,    setHowtoPage]    = useState(0);
  const seenHintsRef = useRef(null);
  const logRef = useRef(null);
  // Live initiative-round context. Holds the rolled turn queue + pointer + working combat state so
  // async enemy turns and the (input-gated) player turn can resume the round without stale closures.
  // { queue:[{actor,idx}], ptr, round, curP, curTempHp }. curEnemies is read from `enemies` state.
  const combatRef = useRef({ queue: [], ptr: 0, round: 0, curP: null, curTempHp: 0 });

  const ep         = getEffectivePlayer(player,equipment,tempBuffs);
  const idlePlayer = getEffectivePlayer(player,equipment);
  const roomPlayer = devMode ? {...idlePlayer,awareness:95,wisdom:30,intelligence:30,identify:95} : idlePlayer;
  const XP_NEEDED = level*3;

  // Derived "current target": the alive enemy at targetIdx, or the first alive if the target died,
  // or null if the battle is over. Single-enemy UI/logic reading `enemy` continues to work transparently.
  const enemy = (enemies[targetIdx] && enemies[targetIdx].hp > 0)
    ? enemies[targetIdx]
    : (enemies.find(e => e && e.hp > 0) || null);

  useEffect(()=>{ if(logRef.current) logRef.current.scrollTop=logRef.current.scrollHeight; },[log]);

  // ── Save / resume + screenshot-friendly "still" mode ─────────────────────────
  const [hasSave, setHasSave] = useState(() => { try { return !!localStorage.getItem(SAVE_KEY); } catch (e) { return false; } });
  // ?still=1 freezes the looping animations so the screenshot tool can capture a stable frame
  // (prefers-reduced-motion gets the same treatment via CSS).
  useEffect(() => {
    try { if (new URLSearchParams(location.search).has("still")) document.body.classList.add("dq-still"); } catch (e) {}
  }, []);
  // Autosave the run at safe (non-combat) phases only. onUse/enemyMod functions are dropped by
  // JSON here and rehydrated in continueRun.
  useEffect(() => {
    if (!SAVE_PHASES.has(phase)) return;
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        v:1, phase, player, level, xp, gold, waveNumber, floorRooms, playerPos,
        equipment, inventory, tempBuffs, poison, burn, bleed, stun, tempHp,
        unspentPoints, ironUsed, shopItems, shopUnlocked, gameStats, restUsed,
        enemies, targetIdx,
      }));
    } catch (e) {}
  }, [phase, player, level, xp, gold, waveNumber, floorRooms, playerPos, equipment, inventory, tempBuffs, poison, burn, bleed, stun, tempHp, unspentPoints, ironUsed, shopItems, shopUnlocked, gameStats, restUsed, enemies, targetIdx]);
  // A finished run (death / full clear) can't be resumed — drop its save.
  useEffect(() => {
    if (phase === "lose" || phase === "gamewon") { clearSave(); setHasSave(false); }
  }, [phase]);

  function continueRun() {
    let snap;
    try { snap = JSON.parse(localStorage.getItem(SAVE_KEY) || "null"); } catch (e) { snap = null; }
    if (!snap) { setHasSave(false); return; }
    setPlayer(snap.player);
    setLevel(snap.level); setXp(snap.xp); setGold(snap.gold);
    setWaveNumber(snap.waveNumber);
    setFloorRooms((snap.floorRooms || []).map(rehydrateRoom));
    setPlayerPos(snap.playerPos || {col:0, row:0});
    setEquipment(snap.equipment || {...EMPTY_EQUIP});
    setInventory((snap.inventory || []).map(rehydrateItem));
    setTempBuffs(snap.tempBuffs || []);
    setPoison(snap.poison||0); setBurn(snap.burn||0); setBleed(snap.bleed||0); setStun(snap.stun||0);
    setTempHp(snap.tempHp||0);
    setUnspentPoints(snap.unspentPoints||0);
    setIronUsed(!!snap.ironUsed);
    setShopItems((snap.shopItems || []).map(rehydrateItem));
    setShopUnlocked(!!snap.shopUnlocked);
    setGameStats(snap.gameStats || {biggestHit:0, biggestHitTaken:0, killCounts:{}, itemsUsed:{}});
    setRestUsed(!!snap.restUsed);
    setEnemies(snap.enemies || []); setTargetIdx(snap.targetIdx || 0); setShowScores(false);
    setPhase(SAVE_PHASES.has(snap.phase) ? snap.phase : "idle");
  }

  const addLog = (text,type="sys") => setLog(prev=>[...prev.slice(-60),{text,type}]);
  const shake  = who => { setShaking(who); setTimeout(()=>setShaking(null),350); };

  const triggerArenaAnim = (p,e,dur=620) => {
    setArenaAnim({player:p,enemy:e});
    setTimeout(()=>setArenaAnim({player:'idle',enemy:'idle'}),dur);
  };

  function saveHighScore(finalGold) {
    const scores = [...JSON.parse(localStorage.getItem('dq_scores')||'[]'), {gold:finalGold,date:new Date().toLocaleDateString()}]
      .sort((a,b)=>b.gold-a.gold).slice(0,5);
    localStorage.setItem('dq_scores',JSON.stringify(scores));
    setHighScores(scores);
  }

  // ── One-time contextual hints ──────────────────────────────────────────────
  // Fire at teachable moments (first combat, first cast, first gear panel, first level-up); each
  // shows once via the floating overlay, then is remembered in localStorage `dq_hints`. Dev mode
  // and the static HOW-TO-PLAY screen both bypass / cover these.
  function hintsSeen() {
    if (!seenHintsRef.current) {
      try { seenHintsRef.current = new Set(JSON.parse(localStorage.getItem('dq_hints')||'[]')); }
      catch (e) { seenHintsRef.current = new Set(); }
    }
    return seenHintsRef.current;
  }
  function maybeHint(key) {
    if (devMode || activeHint || !HINTS[key]) return;
    if (hintsSeen().has(key)) return;
    setActiveHint(HINTS[key]);
  }
  function dismissHint() {
    if (activeHint) {
      const seen = hintsSeen();
      seen.add(activeHint.key);
      try { localStorage.setItem('dq_hints', JSON.stringify([...seen])); } catch (e) {}
    }
    setActiveHint(null);
  }

  function triggerLevelUp(newLevel, currentPlayer) {
    // First level-up teaches the progression loop (stats / perks / shop / status).
    maybeHint("progression");
    setLevelUpOpts(STAT_POOL);
    setPickedStats([]);
    // Level-up grants +2 stat points, added to any leftover unspent points the player banked.
    setUnspentPoints(p => p + 2);
    // Every 5th level (capped at 20), offer a perk pick from any not-yet-taken perks. Prereq gates:
    //  - Triple Strike needs Double Strike capability (the perk or DEX flurry) — a 3rd swing chains
    //    off a 2nd, so it'd be dead without it.
    //  - Master Duelist needs Dual Wield — it only removes the offhand penalty, meaningless solo.
    if (newLevel % 5 === 0 && newLevel <= 20) {
      const remaining = PERK_POOL.filter(p => {
        if (currentPlayer[p.id]) return false; // already taken
        if (p.id === "tripleStrikeChance" && !(currentPlayer.doubleStrikeChance > 0)) return false;
        if (p.id === "masterDuelist" && !currentPlayer.dualWield) return false;
        return true;
      });
      if (remaining.length > 0) { setPerkOpts(remaining); setPhase("perk"); return; }
    }
    setPhase("levelup");
  }

  // Spend ONE stat point during level-up (called per-click — player picks individually, no escalating
  // cost). If a stat hits 20 for the first time, route to that stat's milestone perk choice before resuming.
  function pickStat(stat) {
    if (unspentPoints <= 0) return;
    const updated = stat.apply({...player});
    setPlayer(updated);
    setUnspentPoints(p => p - 1);
    const perkField = STAT_PERK_FIELD[stat.id];
    if (perkField && updated[stat.id] >= 20 && !player[perkField]) {
      setMilestoneStat(stat.id);
      setPhase("statperk");
      return;
    }
    // Stay in levelup — player can keep spending until they click DONE.
  }

  // Player chooses to leave the level-up panel; any unspent points carry forward to future level-ups.
  function finishLevelUp() {
    setPhase("win");
  }

  // Learn a spell at level-up. Requires the player to already meet the spell's stat prereq AND have
  // enough unspent points to cover its cost. Once learned, the spell goes into player.spells and is
  // castable in combat via the CAST button.
  function pickSpell(spell) {
    if (unspentPoints < spell.cost) return;
    if ((player[spell.stat] || 0) < spell.req) return;
    if (player.spells && player.spells[spell.id]) return; // already learned
    setPlayer(p => ({...p, spells:{...(p.spells||{}), [spell.id]: 1}}));
    setUnspentPoints(p => p - spell.cost);
    addLog(`✦ LEARNED ${spell.name}!`, "level");
  }

  // Upgrade an already-learned spell by 1 level. Costs `spell.cost` points. Requires the relevant
  // ability score to be at `spell.req + nextLevel - 1` (so LV 2 needs req+1, LV 3 needs req+2, etc).
  function upgradeSpell(spell) {
    const cur = (player.spells && player.spells[spell.id]) || 0;
    if (cur < 1) return; // must be learned first
    const next = cur + 1;
    const required = spell.req + (next - 1);
    if ((player[spell.stat] || 0) < required) return;
    if (unspentPoints < spell.cost) return;
    setPlayer(p => ({...p, spells:{...(p.spells||{}), [spell.id]: next}}));
    setUnspentPoints(p => p - spell.cost);
    addLog(`✦ ${spell.name} → LV ${next}!`, "level");
  }

  function pickPerk(perk) {
    setPlayer(p => perk.apply({...p}));
    setPerkOpts([]);
    addLog(`${perk.label} UNLOCKED!`, "level");
    setPhase("levelup");
  }

  function pickWisPerk(perk) {
    setPlayer(p => ({...p, wisPerk: perk.id}));
    addLog(`${perk.label} AWAKENED!`, "level");
    setPhase("levelup"); // Return to stat-pick panel so any remaining points can still be spent.
  }

  // Generalized milestone-perk pick. Routes the chosen perk into the right `<stat>Perk` field based
  // on which ability score just hit 20 (tracked by `milestoneStat`). Same return-to-levelup pattern
  // as pickWisPerk so the player can keep spending banked points after locking in the perk.
  function pickStatPerk(perk) {
    const field = STAT_PERK_FIELD[milestoneStat];
    if (field) setPlayer(p => ({...p, [field]: perk.id}));
    addLog(`${perk.label} AWAKENED!`, "level");
    setMilestoneStat(null);
    setPhase("levelup");
  }

  // ── Character creation ────────────────────────────────────────────────────
  // Enter the create phase from the title screen. Initializes the draft to all-8s and grants 27 points.
  function beginCreation() {
    clearSave(); setHasSave(false);
    setDraft({
      name: "Hero",
      emoji: "🧝",
      strength:8, dexterity:8, constitution:8,
      wisdom:8, charisma:8, intelligence:8,
    });
    setUnspentPoints(27);
    setPhase("create");
  }

  // Adjust a draft stat by +1 / -1 during character creation. Uses the escalating POINT_COST table.
  // Refunds the exact cost when decrementing. Caps at 18 (creation cap) and 8 (floor).
  function draftAdjust(statId, delta) {
    if (!draft) return;
    const cur = draft[statId];
    const next = cur + delta;
    if (next < 8 || next > 18) return;
    if (delta > 0) {
      const cost = POINT_COST_STEP(cur);
      if (cost > unspentPoints) return;
      setDraft(d => ({...d, [statId]: next}));
      setUnspentPoints(p => p - cost);
    } else {
      const refund = POINT_COST_STEP(cur - 1);
      setDraft(d => ({...d, [statId]: next}));
      setUnspentPoints(p => p + refund);
    }
  }

  // Commit the character creation draft to the player state and start the run. Player starts at full
  // HP — the base hp on PLAYER_BASE may be lower than the computed maxHp for high-CON characters, so
  // we explicitly set hp to the computed maxHp.
  function finishCreation() {
    if (!draft) return;
    setPlayer(p => {
      const next = {...p, name: draft.name, emoji: draft.emoji,
        strength: draft.strength, dexterity: draft.dexterity, constitution: draft.constitution,
        wisdom: draft.wisdom, charisma: draft.charisma, intelligence: draft.intelligence,
      };
      const ep = applyAbilityStats(next);
      next.hp = ep.maxHp;
      return next;
    });
    // Forfeit any unspent creation points — they don't carry into level-ups. Stops a player from
    // banking 27 - X points at creation (where the 18 cap applies) and then dumping them at the
    // first level-up under the lower-cost level-up rules to skip the escalating-cost curve.
    setUnspentPoints(0);
    const heroName = draft.name || "Hero";
    setDraft(null);
    // Prologue plays once, right after the hero is forged, then drops into the floor-1 map.
    setStoryBeat({ ...STORY.prologue(heroName), next: "idle" });
    setPhase("story");
  }

  function enterRest() {
    // We no longer reset XP here
    setEnemies([]);
    setPhase("rest");
    setRestUsed(true);
  }
  // Stairs are unlocked only by defeating the floor's boss (resolveVictory transforms the boss tile
  // into a descend tile). Walking onto the stairs advances waveNumber and regenerates the next floor.
  function descendStairs() {
    const nextFloor = waveNumber + 1;
    setWaveNumber(nextFloor);
    setRestUsed(false);
    setFloorRooms(makeFloorMap(nextFloor, level, idlePlayer, devMode));
    setPlayerPos({col:0, row:0});
    addLog(`⇣ YOU DESCEND TO FLOOR ${nextFloor}.`, "level");
    // Baron heckles over the "dungeon intercom" at floor milestones (5/10/15/20).
    const beat = STORY.beats[nextFloor];
    if (beat) { setStoryBeat({ ...beat, next: "idle" }); setPhase("story"); }
    else setPhase("idle");
  }

  // Navigation handler for fog-of-war map clicks. Validates that the player can actually reach the
  // target tile (adjacent OR already visited for fast-travel), updates `playerPos`, marks the room
  // visited, then dispatches to combat / stairs / silent-walk based on the room's state.
  function handleRoomEnter(room) {
    if (!room || !room.pos) return;
    const visible = room.visited || floorRooms.some(o => o.visited && isAdjacentPos(o.pos, room.pos)) || devMode;
    if (!visible) return;
    const reachable = room.visited || isAdjacentPos(room.pos, playerPos);
    if (!reachable) {
      addLog("▷ TOO FAR — EXPLORE CLOSER FIRST.", "miss");
      return;
    }
    setPlayerPos(room.pos);
    if (!room.visited) {
      setFloorRooms(rooms => rooms.map(r => r.key === room.key ? {...r, visited:true} : r));
    }
    // Stairs always descend, whether walked-onto fresh or revisited.
    if (room.descend) { descendStairs(); return; }
    if (!room.cleared) {
      if (room.isTrap) { triggerTrap(room); return; }
      startBattle(room);
      return;
    }
    // Cleared & visited: silent walk-through.
    addLog(`▷ YOU CROSS BACK THROUGH ${room.label}.`, "miss");
  }

  // Trap room: a ZIP (dexterity) shrug-off against a floor-scaled target. Spotting the trap first
  // (trapAware, from the awareness/WIS roll) grants +5. Fail → damage (+ a chance of poison). No
  // combat — resolves instantly and marks the room cleared. Lethal traps end the run.
  function triggerTrap(room) {
    const ep = idlePlayer;
    const aware = !!room.trapAware || devMode;
    const zipMod = abilityMod(ep.dexterity || 10);
    const awareBonus = aware ? 5 : 0;
    const target = 10 + Math.floor(waveNumber / 2);
    const rollV = roll(20);
    const total = rollV + zipMod + awareBonus;
    const saved = total >= target;
    const clearRoom = () => setFloorRooms(rooms => rooms.map(r => r.key === room.key ? {...r, cleared:true} : r));
    const breakdown = `${rollV}${zipMod>=0?'+':''}${zipMod}${awareBonus?`+${awareBonus} SPOTTED`:''} (${total}) vs ${target}`;
    addLog(`⚠ TRAP! ${aware ? "YOU SPOTTED IT —" : "AMBUSH —"} ZIP SHRUG ${breakdown}`, aware ? "sys" : "warn");
    if (saved) {
      addLog("⚠ NIMBLE! YOU SLIP PAST THE TRAP UNHARMED!", "level");
      clearRoom();
      return;
    }
    // Failed: floor-scaled damage, with a 30% chance of a poison-dart rider.
    const dmg = roll(6) + Math.floor(waveNumber / 2);
    const poisons = pct(30);
    const newHp = Math.max(0, ep.hp - dmg);
    setPlayer(p => ({...p, hp: Math.max(0, p.hp - dmg)}));
    setGameStats(s => ({...s, biggestHitTaken: Math.max(s.biggestHitTaken, dmg)}));
    addLog(`⚠ THE TRAP CATCHES YOU! ${dmg} DMG!`, "warn");
    if (newHp <= 0) {
      setPlayer(p => ({...p, hp:0})); saveHighScore(gold); setPhase("lose");
      addLog("THE TRAP DID YOU IN...", "warn");
      return;
    }
    if (poisons) { setPoison(3); addLog("☠ POISON DARTS! POISONED 3 TURNS!", "warn"); }
    clearRoom();
  }

  function startBattle(room) {
    const isBoss = !!room?.isBoss;
    // Pull pre-rolled enemies from the room (always an array now). Fall back to a fresh roll if the
    // room is malformed somehow (defensive — shouldn't happen with the new makeFloorMap).
    const baseEnemies = (room?.enemies && room.enemies.length)
      ? room.enemies
      : [isBoss ? pickBoss(waveNumber,level) : pickEnemy(level)];
    // Surprise: if the player failed to spot the foe (low WIS / room.enemyKnown === false), every
    // enemy in the room gets a +5 speed bonus for this battle. The surprise flag rides on each enemy
    // so the panel can show 💢 individually.
    // Surprise rounds are gated behind floor 3+ — early floors are about learning the game,
    // and a low-WIS character getting blown up by a surprise on floor 1 is bad UX. From floor 3
    // onward, failing the WIS preview still triggers the +5 SPD ambush.
    const surprised = waveNumber >= 3 && room && room.enemyKnown === false;
    const battleEnemies = baseEnemies.map(be => {
      const finalSpeed = (be.speed||10) + (surprised ? 5 : 0);
      return {
        ...applyRoomToEnemy(be, room),
        roomKey:   room?.key,
        roomLabel: room?.label,
        speed:     finalSpeed,
        surprised,
      };
    });
    setEnemies(battleEnemies);
    setTargetIdx(0);
    setIronUsed(false);
    setTempBuffs(prev=>prev.map(b=>({...b,battles:b.battles-1})).filter(b=>b.battles>0));
    setSelectingItem(false);
    setArenaAnim({player:'idle',enemy:'idle'});
    // Stun is a single-turn-skip effect and never carries between battles. Poison / burn / bleed
    // persist across battles intentionally — they're only cleared via rest, an item with a cure
    // flag, or game restart.
    setStun(0);
    setTempHp(0);

    const intro = battleEnemies.length === 1
      ? `${room?.icon||"▶"} ${room?.label||"ROOM"}: ${battleEnemies[0].emoji} ${battleEnemies[0].name}!`
      : `${room?.icon||"▶"} ${room?.label||"ROOM"}: ${battleEnemies.map(e=>`${e.emoji} ${e.name}`).join(" + ")}!`;
    const logs = [{ text: isBoss ? `★★ ${battleEnemies[0].name} APPROACHES! ★★` : intro, type: isBoss?"crit":"sys" }];
    if (surprised) logs.push({ text: `💢 SURPRISE! THEY CATCH YOU OFF-GUARD! (+5 SPD)`, type: "warn" });
    // Recurring villain voice: the Baron (🐷) taunts; his lieutenants get a short snarl.
    if (isBoss) {
      const b = battleEnemies[0];
      const taunt = b.emoji === "🐷"
        ? (waveNumber >= 20 ? BARON_TAUNTS.final : /^ELDER/.test(b.name) ? BARON_TAUNTS.elder : BARON_TAUNTS.first)
        : (LIEUTENANT_SNARLS[b.name] || "✦ One of BARON VON BACON's lieutenants blocks the stairs!");
      logs.push({ text: taunt, type: "villain" });
    }
    setLog(logs);

    // First time the player ever enters combat, surface the one-time combat hint.
    maybeHint("combat");

    // Initiative is re-rolled at the top of every round (see beginRound). Kick off round 1.
    beginRound(1, ep, battleEnemies, 0);
  }

  // ── Initiative-based round system ───────────────────────────────────────────
  // Every round: tick statuses + flee checks, then roll initiative (speed + d10) for the player and
  // each living enemy, sort high→low (player wins ties), and walk the queue one actor at a time.
  // The player's slot pauses for input (phase "player"); enemy slots auto-resolve. When the queue is
  // exhausted the next round begins with a fresh initiative roll. State threads through `combatRef`.
  const rollInit = (speed) => (speed || 10) + roll(10);

  function beginRound(round, curP, curEnemies, curTempHp) {
    setPhase("enemy"); // transient — "rolling/resolving" banner until a player slot pauses
    setTimeout(() => {
      let p = curP;
      let es = curEnemies.map(e => e ? {...e} : e);
      let tHp = curTempHp;

      // --- Status ticks (enemy DOTs, then player's, once per round) ---
      for (let i = 0; i < es.length; i++) {
        let e = es[i];
        if (!e || e.hp <= 0) continue;
        if ((e.poison||0) > 0) {
          const left = e.poison - 1;
          addLog(`☠ ${e.name} POISON! 1 DMG${left>0?` (${left} LEFT)`:" CURED!"}`, "level");
          e = { ...e, hp: Math.max(0, e.hp - 1), poison: left };
          if (e.hp === 0) addLog(`${e.name} SUCCUMBS TO POISON!`, "gold");
        }
        if (e.hp > 0 && (e.burn||0) > 0) {
          const left = e.burn - 1;
          addLog(`🔥 ${e.name} BURN! 2 DMG${left>0?` (${left} LEFT)`:" FADED!"}`, "level");
          e = { ...e, hp: Math.max(0, e.hp - 2), burn: left };
          if (e.hp === 0) addLog(`${e.name} IS CONSUMED BY FLAMES!`, "gold");
        }
        if (e.hp > 0 && (e.bleed||0) > 0) {
          const left = e.bleed - 1;
          e = { ...e, bleed: Math.max(0, left) };
          if (left <= 0) addLog(`🩸 ${e.name} BLEED FADED.`, "miss");
        }
        es[i] = e;
      }
      if (poison > 0) {
        const left = poison - 1; setPoison(left);
        addLog(`☠ POISON! 1 DMG!${left>0?` (${left} LEFT)`:" CURED!"}`, "warn");
        if (p.hp - 1 <= 0) { setPlayer(pr=>({...pr,hp:0})); setEnemies(es); saveHighScore(gold); setPhase("lose"); addLog("POISON CLAIMED YOUR LIFE...","warn"); return; }
        p = {...p, hp: p.hp - 1};
      }
      if (burn > 0) {
        const left = burn - 1; setBurn(left);
        addLog(`🔥 BURN! 2 DMG!${left>0?` (${left} LEFT)`:" FADED!"}`, "warn");
        if (p.hp - 2 <= 0) { setPlayer(pr=>({...pr,hp:0})); setEnemies(es); saveHighScore(gold); setPhase("lose"); addLog("THE FLAMES TOOK YOU...","warn"); return; }
        p = {...p, hp: p.hp - 2};
      }
      if (bleed > 0) { const left = bleed - 1; setBleed(left); if (left <= 0) addLog("🩸 BLEED FADED.", "miss"); }

      // --- Flee checks (low-HP archers may bail for half reward) ---
      for (let i = 0; i < es.length; i++) {
        const e = es[i];
        if (!e || e.hp <= 0) continue;
        if (e.fleesWhenLow && e.hp <= Math.ceil(e.maxHp*0.3) && pct(35)) {
          addLog(`${e.name} FLEES! HALF REWARD.`, "warn");
          es[i] = { ...e, hp:0, fled:true };
        }
      }

      setPlayer(pr => ({...pr, hp: p.hp}));
      setEnemies(es);
      setTempHp(tHp);

      // All foes down already? Resolve.
      if (es.every(en => !en || en.hp <= 0)) { resolveVictory(es); return; }

      // --- Roll initiative for the player + each living enemy ---
      const order = [];
      const pInit = rollInit(p.speed);
      order.push({ actor:'player', init:pInit, tiebreak:1 });
      es.forEach((e, idx) => {
        if (e && e.hp > 0) order.push({ actor:'enemy', idx, init: rollInit(e.speed), tiebreak:0 });
      });
      order.sort((a,b) => b.init - a.init || b.tiebreak - a.tiebreak || Math.random() - 0.5);
      const orderStr = order.map(o => o.actor === 'player' ? `${player.emoji||"🧝"}${o.init}` : `${es[o.idx].emoji}${o.init}`).join(" ▸ ");
      addLog(`⚡ ROUND ${round} — ${orderStr}`, "sys");

      combatRef.current = { queue: order, ptr: 0, round, curP: p, curTempHp: tHp };
      runQueueFrom(0, p, es, tHp);
    }, 600);
  }

  // Walk the initiative queue from index `i`. Enemy slots resolve and chain on a timer; the player's
  // slot commits state and pauses (phase "player") so the action handlers can resume via resumeAfterPlayer.
  function runQueueFrom(i, curP, curEnemies, curTempHp) {
    const { queue, round } = combatRef.current;
    let p = curP, es = curEnemies, tHp = curTempHp;

    // Skip slots whose enemy died earlier this round.
    while (i < queue.length) {
      const slot = queue[i];
      if (slot.actor === 'enemy' && (!es[slot.idx] || es[slot.idx].hp <= 0)) { i++; continue; }
      break;
    }

    if (i >= queue.length) {
      // Round over. Vital Surge regen, then re-roll and go again. Like all healing it scales off
      // SAVVY: regen = 1 + savvyMod, floored at 1 (it's an invested perk, so it always does something).
      if (player.conPerk === "vital" && p.hp > 0 && p.hp < p.maxHp) {
        const regen = Math.max(1, 1 + abilityMod(p.wisdom));
        const newHp = Math.min(p.hp + regen, p.maxHp);
        const actual = newHp - p.hp;
        p = {...p, hp: newHp};
        setPlayer(pr => ({...pr, hp: newHp}));
        addLog(`✦ VITAL SURGE — +${actual} HP`, "level");
      }
      combatRef.current = { ...combatRef.current, curP: p, curTempHp: tHp };
      beginRound(round + 1, p, es, tHp);
      return;
    }

    const slot = queue[i];
    combatRef.current = { queue, ptr: i, round, curP: p, curTempHp: tHp };

    if (slot.actor === 'player') {
      // Stunned? The player loses this slot; clear the stun and move on.
      if (stun > 0) {
        setStun(0);
        addLog("💫 STUNNED — YOU SKIP YOUR TURN!", "warn");
        setTimeout(() => runQueueFrom(i + 1, p, es, tHp), 700);
        return;
      }
      // Pause for input. State is committed; handlers read fresh state and call resumeAfterPlayer.
      setPlayer(pr => ({...pr, hp: p.hp}));
      setEnemies(es);
      setTempHp(tHp);
      setPhase("player");
      addLog("YOUR TURN.", "sys");
      return;
    }

    // Enemy slot — a beat (so the player reads the prior action), then the enemy acts, then chain.
    setPhase("enemy");
    setTimeout(() => {
      enemyAct(slot.idx, p, es, tHp, (np, nes, nTmp, playerDied) => {
        if (playerDied) return; // enemyAct already set the lose phase
        runQueueFrom(i + 1, np, nes, nTmp);
      });
    }, 600);
  }

  // Called by the player action handlers after they finish resolving the player's turn. Advances the
  // initiative queue from the player's stored slot. `curP` is the post-action effective player.
  function resumeAfterPlayer(curP, curEnemies) {
    const { ptr } = combatRef.current;
    runQueueFrom(ptr + 1, curP, curEnemies, tempHp);
  }

  // One enemy's turn: charm-skip → healer → spell/melee → counter → tempHP → damage → death checks.
  // Mutates a fresh copy of curEnemies and threads curP/curTempHp; calls `done(curP, curEnemies,
  // curTempHp, playerDied)` when finished. Lifted from the old per-enemy `attackOne` body.
  function enemyAct(i, curP, curEnemiesIn, curTempHp, done) {
    let curEnemies = curEnemiesIn.map(e => e ? {...e} : e);
    let p = curP;
    let tHp = curTempHp;
    const e = curEnemies[i];
    if (!e || e.hp <= 0) { done(p, curEnemies, tHp, false); return; }

    // Charmed (player BAT EYES) — skip and decrement.
    if ((e.charmed || 0) > 0) {
      curEnemies[i] = { ...e, charmed: (e.charmed||0) - 1 };
      addLog(`💖 ${e.name} is CHARMED — stares blankly, skips their turn!`, "miss");
      setEnemies([...curEnemies]);
      done(p, curEnemies, tHp, false);
      return;
    }

    // Healer (Witch) — heal a wounded ally or self, on a 2-turn cooldown.
    if (e.healsAllies) {
      const cd = Math.max(0, (e.healCooldown || 0) - 1);
      curEnemies[i] = { ...e, healCooldown: cd };
      if (cd === 0) {
        const wounded = curEnemies.map((other, j) => ({other, j}))
          .filter(x => x.j !== i && x.other && x.other.hp > 0 && x.other.hp < x.other.maxHp)
          .sort((a,b) => (a.other.hp/a.other.maxHp) - (b.other.hp/b.other.maxHp))[0];
        if (wounded) {
          const tgt = wounded.other; const newHp = Math.min(tgt.maxHp, tgt.hp + 3);
          curEnemies[wounded.j] = { ...tgt, hp: newHp };
          curEnemies[i] = { ...curEnemies[i], healCooldown: 2 };
          addLog(`✦ ${e.name} HEALS ${tgt.name} +${newHp - tgt.hp} HP!`, "enemy");
          setEnemies([...curEnemies]);
          done(p, curEnemies, tHp, false);
          return;
        }
        if (e.hp < e.maxHp * 0.5) {
          const newHp = Math.min(e.maxHp, e.hp + 2);
          curEnemies[i] = { ...curEnemies[i], hp: newHp, healCooldown: 2 };
          addLog(`✦ ${e.name} CHANNELS HEALING! +${newHp - e.hp} HP!`, "enemy");
          setEnemies([...curEnemies]);
          done(p, curEnemies, tHp, false);
          return;
        }
      }
      // else fall through to a normal attack
    }

    const willCast = !!e.spell && pct(e.spellChance ?? 100);
    const {dmgToPlayer:rawDmg, counterDmg, results, gotCrit, didPoison, didBurn, didBleed, didStun} =
      willCast ? enemySpellAttack(p, e, waveNumber) : enemyAttack(p, e, devMode);
    const dmgToPlayer = devMode ? 0 : (bleed > 0 ? Math.ceil(rawDmg * 1.5) : rawDmg);
    results.forEach(r => addLog(r.text, r.type));

    if (didPoison) {
      if (pct(p.poisonResist||0)) addLog("☠ POISON RESISTED!", "level");
      else { setPoison(3); addLog(poison>0?"☠ POISON REFRESHED!":"☠ POISONED! 3 TURNS!", "warn"); }
    }
    if (didBurn)  { setBurn(3);  addLog(burn>0?"🔥 BURN REFRESHED!":"🔥 BURNING! 3 TURNS!", "warn"); }
    if (didBleed) { setBleed(3); addLog(bleed>0?"🩸 BLEED REFRESHED!":"🩸 BLEEDING! 3 TURNS! (+50% DMG)", "warn"); }
    if (didStun)  { setStun(1);  addLog("💫 STUNNED! YOUR NEXT TURN IS SKIPPED!", "warn"); }

    if (dmgToPlayer > 0) setGameStats(s=>({...s,biggestHitTaken:Math.max(s.biggestHitTaken,dmgToPlayer)}));

    if (counterDmg > 0) {
      const newEnemyHp = Math.max(0, e.hp - counterDmg);
      curEnemies[i] = { ...curEnemies[i], hp: newEnemyHp };
      if (newEnemyHp === 0) addLog(`${e.name} FELL TO YOUR COUNTER!`, "level");
    }

    // Temp HP absorbs first.
    let dmgRemaining = dmgToPlayer;
    if (tHp > 0 && dmgRemaining > 0) {
      const absorbed = Math.min(tHp, dmgRemaining);
      tHp -= absorbed; dmgRemaining -= absorbed;
      if (absorbed > 0) addLog(`✦ TEMP HP ABSORBS ${absorbed}${tHp > 0 ? ` (${tHp} LEFT)` : " (DEPLETED)"}`, "level");
    }

    let newHp = p.hp - dmgRemaining;
    if (newHp <= 0 && p.ironWill && !ironUsed) { newHp = 1; setIronUsed(true); addLog("IRON WILL! SURVIVED WITH 1 HP!", "level"); }
    p = { ...p, hp: newHp };

    setPlayer(pr => ({...pr, hp: p.hp}));
    setEnemies([...curEnemies]);
    setTempHp(tHp);
    const r0 = results[0];
    if      (r0?.type === 'dodge') triggerArenaAnim('dodge',    'attack', 600);
    else if (r0?.type === 'miss')  triggerArenaAnim('idle',     'attack', 600);
    else if (gotCrit)              triggerArenaAnim('crit-hit', 'attack', 700);
    else                           triggerArenaAnim('hit',      'attack', 600);
    shake("player");

    if (newHp <= 0) {
      setPlayer(pr=>({...pr,hp:0})); setEnemies(curEnemies); saveHighScore(gold); setPhase("lose"); addLog("YOU HAVE FALLEN...", "warn");
      done(p, curEnemies, tHp, true);
      return;
    }
    done(p, curEnemies, tHp, false);
  }

  function handleAction(key) {
    if (phase!=="player"||!enemy) return;
    if (key==="flee") {
      if (pct(75)) {
        addLog("YOU FLEE INTO THE DARKNESS!","warn");
        enterRest();
      } else {
        addLog("BLOCKED! CAN'T ESCAPE!","warn"); resumeAfterPlayer(ep, enemies);
      }
      return;
    }
    // Target = the currently-selected live enemy. `enemy` is already derived to fall back to first
    // alive when targetIdx points to a corpse.
    const target = enemy;
    if (!target || target.hp <= 0) return;
    const targetSlot = enemies.findIndex(e => e === target);
    if (targetSlot < 0) return;

    const {total,results,didPoison,didBurn,didBleed,newBleedVal} = playerAttack(ep,target,devMode);

    // Vampiric blade: heal on crit (still works from either hand)
    let effectivePlayer = ep;
    if ((equipment.weapon?.vampiric || equipment.offhand?.vampiric) && results.some(r=>r.type==='crit')) {
      const heal=2;
      effectivePlayer = {...ep, hp:Math.min(ep.hp+heal, ep.maxHp)};
      setPlayer(p=>({...p, hp:Math.min(p.hp+heal, ep.maxHp)}));
      addLog(`🗡️ VAMPIRIC! +${heal} HP!`,"level");
    }

    if (total>0) setGameStats(s=>({...s,biggestHit:Math.max(s.biggestHit,total)}));
    const r0=results[0];
    if      (r0.type==='crit') triggerArenaAnim('attack','crit',700);
    else if (r0.type==='miss') triggerArenaAnim('miss','dodge',620);
    else                       triggerArenaAnim('attack','hit',620);
    shake("enemy");
    results.forEach(r=>addLog(r.text,r.type));

    const newHp = target.hp - total;
    let next = {...target, hp: Math.max(0, newHp)};

    // Weapon procs only land if the target survives the swing.
    if (next.hp>0) {
      if (didPoison) { next={...next, poison:3}; addLog(target.poison>0?`☠ ${target.name} POISON REFRESHED!`:`☠ ${target.name} POISONED! 3 TURNS!`,"level"); }
      if (didBurn)   { next={...next, burn:3};   addLog(target.burn>0  ?`🔥 ${target.name} BURN REFRESHED!`:`🔥 ${target.name} BURNING! 3 TURNS!`,"level"); }
      if (didBleed)  {
        const bleedVal = Math.max(newBleedVal||3, target.bleed||0);
        next = {...next, bleed: bleedVal};
        addLog(target.bleed>0 ? `🩸 ${target.name} BLEED DEEPENS! +${Math.floor(bleedVal)} DMG/HIT` : `🩸 ${target.name} BLEEDING! +${Math.floor(bleedVal)} DMG/HIT`, "level");
      }
    }

    // Berserker enrages at half HP
    if (target.enragesWhenLow && !target.enraged && next.hp>0 && next.hp<=Math.ceil(target.maxHp/2)) {
      next = {...next, enraged:true, attack:next.attack+3};
      addLog(`${target.name} ENRAGES! ATK +3!`,"enemy");
    }

    // Splice the updated target back into the array.
    let newEnemies = enemies.map((e, i) => i === targetSlot ? next : e);

    // Cleaving Blow (STR 20 perk): 25% chance on a damaging hit to spill HALF damage onto another
    // living enemy in the room. Only matters in multi-enemy fights; the dice were rolled once on the
    // primary target, the cleave just re-uses that total.
    if (player.strPerk === "cleave" && total > 0 && newEnemies.length > 1 && pct(25)) {
      const otherIdx = newEnemies.findIndex((e, i) => i !== targetSlot && e && e.hp > 0);
      if (otherIdx >= 0) {
        const cleaveDmg = Math.max(1, Math.floor(total / 2));
        const otherE = newEnemies[otherIdx];
        const otherHp = Math.max(0, otherE.hp - cleaveDmg);
        newEnemies = newEnemies.map((e, i) => i === otherIdx ? {...e, hp: otherHp} : e);
        addLog(`⚔ CLEAVING BLOW! ${cleaveDmg} DMG → ${otherE.name}!`, "crit");
      }
    }

    setEnemies(newEnemies);

    // Target died — auto-fall-back the selection to the next alive foe (if any).
    if (next.hp <= 0) {
      const nextAlive = newEnemies.findIndex(e => e && e.hp > 0);
      if (nextAlive >= 0) {
        setTargetIdx(nextAlive);
        addLog(`▶ ${target.name} DOWN! NOW TARGETING ${newEnemies[nextAlive].name}.`, "sys");
      }
    }

    // Victory check — all enemies must be down.
    if (newEnemies.every(e => !e || e.hp <= 0)) { resolveVictory(newEnemies); return; }
    resumeAfterPlayer(effectivePlayer, newEnemies);
  }

  // Cast a learned spell during combat. Uses the player's current `enemy` as the target for attack
  // and control spells; heal spells target the player. The spell ends the player's turn — enemy
  // turn fires immediately afterwards (unless a victory check resolves the fight first).
  function handleCastSpell(spell) {
    if (phase !== "player") return;
    const lvl = (player.spells && player.spells[spell.id]) || 0;
    if (lvl < 1) return;
    const levelBonus = lvl - 1; // +1 per level above base
    setSelectingSpell(false);
    addLog(`✦ ${player.name} casts ${spell.name}${lvl>1?` LV ${lvl}`:""}!`, "level");

    const statBonus = spell.statBonus ? abilityMod(player[spell.statBonus] || 10) : 0;
    const rollSpellDie = () => {
      const d = spell.die || { count: 1, size: 4 };
      let total = 0;
      for (let i = 0; i < d.count; i++) total += Math.floor(Math.random() * d.size) + 1;
      return total;
    };

    // Heal spells: target self. Roll the heal die + statBonus + levelBonus. No save.
    if (spell.type === "heal") {
      const roll = rollSpellDie();
      const healAmount = Math.max(0, roll + statBonus + levelBonus);
      const newHp = Math.min(ep.maxHp, player.hp + healAmount);
      const actualHeal = newHp - player.hp;
      const updatedPlayer = {...player, hp: newHp};
      setPlayer(updatedPlayer);
      const formula = `${roll}${statBonus>=0?'+':''}${statBonus}${levelBonus>0?`+${levelBonus}`:''}`;
      if (actualHeal > 0) addLog(`${spell.emoji} +${actualHeal} HP! (${formula})`, "level");
      if (spell.cureOne) {
        if (poison > 0)      { setPoison(0); addLog("☠ POISON CURED!", "level"); }
        else if (burn > 0)   { setBurn(0);   addLog("🔥 BURN CURED!", "level"); }
        else if (bleed > 0)  { setBleed(0);  addLog("🩸 BLEED CURED!", "level"); }
        else if (stun > 0)   { setStun(0);   addLog("💫 STUN CLEARED!", "level"); }
      }
      resumeAfterPlayer(getEffectivePlayer(updatedPlayer, equipment, tempBuffs), enemies);
      return;
    }

    // Attack and control spells need a live target.
    const target = enemy;
    if (!target || target.hp <= 0) return;
    const targetSlot = enemies.findIndex(e => e === target);
    if (targetSlot < 0) return;

    // Shrug-off: target = 8 + caster's stat mod + floor(playerLevel/2). Enemy rolls d20 + their
    // saveStat mod. roll-total > target = shook it off. autoHit spells skip this entirely.
    let saved = false;
    if (!spell.autoHit) {
      const saveStat = spell.saveStat || spell.stat;
      const casterMod = abilityMod(player[spell.stat] || 10);
      const dc = 8 + casterMod + Math.floor((level || 1) / 2);
      const enemyAttrs = target.attrs || {};
      const enemyMod = abilityMod(enemyAttrs[saveStat] || 10);
      const saveRoll = Math.floor(Math.random() * 20) + 1;
      const saveTotal = saveRoll + enemyMod;
      saved = saveTotal > dc;
      const ss = STAT_LABEL[saveStat] || saveStat.slice(0,3).toUpperCase();
      const signMod = enemyMod >= 0 ? `+${enemyMod}` : `${enemyMod}`;
      addLog(`${target.name} ${ss} SHRUG ${saveRoll}${signMod} (${saveTotal}) vs ${dc} → ${saved?'SHOOK IT OFF!':'NOPE!'}`, saved ? "miss" : "enemy");
    }

    let next = {...target};
    let dmg = 0;

    if (spell.type === "attack") {
      const onSave = spell.onSave || "avoid";
      if (saved && onSave === "avoid") {
        addLog(`${spell.emoji} ${target.name} dodges the spell!`, "miss");
        triggerArenaAnim('idle','dodge',620);
      } else {
        const baseRoll = rollSpellDie();
        let calcDmg = baseRoll + statBonus + levelBonus;
        if (saved && (onSave === "half" || onSave === "both")) calcDmg = Math.floor(calcDmg / 2);
        const armorUsed = spell.ignoreArmor ? 0 : (target.armor || 0);
        dmg = Math.max(0, calcDmg - armorUsed);
        next = {...next, hp: Math.max(0, target.hp - dmg)};
        const formula = `${baseRoll}${statBonus>=0?'+':''}${statBonus}${levelBonus>0?`+${levelBonus}`:''}`;
        addLog(`${spell.emoji} ${dmg} DMG! (${formula}${saved?' HALF':''})`, "crit");
        // Status effects land on a full hit, or on a saved hit only if onSave is status/both.
        const statusLands = !saved || onSave === "status" || onSave === "both";
        if (next.hp > 0 && spell.effect && statusLands) {
          if (spell.effect === "burn")   { next = {...next, burn:3};   addLog(`🔥 ${target.name} BURNING!`, "level"); }
          if (spell.effect === "poison") { next = {...next, poison:3}; addLog(`☠ ${target.name} POISONED!`, "level"); }
          if (spell.effect === "bleed")  {
            // Halved bleed stack value (same balance pass as weapon bleed) — keeps the value/turn-
            // counter coupling from runaway compounding over a high-stat caster's long cast.
            const bleedVal = Math.max(1, Math.floor((3 + statBonus + levelBonus) / 2));
            next = {...next, bleed: Math.max(bleedVal, target.bleed || 0)};
            addLog(`🩸 ${target.name} BLEEDING!`, "level");
          }
        }
        shake("enemy");
        triggerArenaAnim('attack','crit',700);
      }
    } else if (spell.type === "control") {
      if (saved) {
        addLog(`${spell.emoji} ${target.name} resists the spell!`, "miss");
      } else if (spell.stunTarget) {
        const turns = lvl;
        next = {...next, charmed: turns};
        addLog(`${spell.emoji} ${target.name} CHARMED — skips next ${turns} turn${turns>1?"s":""}!`, "level");
      }
    }

    const newEnemies = enemies.map((e, i) => i === targetSlot ? next : e);
    setEnemies(newEnemies);

    if (next.hp <= 0) {
      const nextAlive = newEnemies.findIndex(e => e && e.hp > 0);
      if (nextAlive >= 0) {
        setTargetIdx(nextAlive);
        addLog(`▶ ${target.name} DOWN! NOW TARGETING ${newEnemies[nextAlive].name}.`, "sys");
      }
    }
    if (newEnemies.every(e => !e || e.hp <= 0)) { resolveVictory(newEnemies); return; }
    resumeAfterPlayer(ep, newEnemies);
  }

  function handleUseItem(item, inBattle=true) {
    // Slotted items in the inventory are equipment — route to the equip handler instead of treating them as consumables.
    if (item.slot) { handleEquipFromInventory(item, inBattle); return; }
    const ep = getEffectivePlayer(player, equipment, tempBuffs);
    const wisMod = abilityMod(ep.wisdom); // raw — negative WIS reduces heal power

    let np = {...player};
    let nb = tempBuffs;

    // Heal items: heal = base + wisMod (signed); "full" tops the player off. Reservoir grants
    // tempHp equal to max(0, wisMod). Swift Cure rolls below to skip enemy turn (only if wisMod > 0).
    if (item.heal !== undefined) {
      const heal = item.heal === "full" ? ep.maxHp - np.hp : Math.max(0, item.heal + wisMod);
      const newHp = Math.min(ep.maxHp, np.hp + heal);
      const actual = newHp - np.hp;
      np = {...np, hp: newHp};
      if (actual > 0) addLog(`+${actual} HP from ${item.label}!`, "level");
      if (player.wisPerk === "reservoir" && wisMod > 0) {
        const newTempHp = Math.min(ep.maxHp, tempHp + Math.max(0, wisMod));
        const tmpGain = newTempHp - tempHp;
        if (tmpGain > 0) { setTempHp(newTempHp); addLog(`✦ SAGE'S RESERVOIR! +${tmpGain} TEMP HP`, "level"); }
      }
    } else if (item.onUse) {
      // Buff items (and any remaining items with custom onUse logic).
      const effectiveMaxHp = ep.maxHp;
      const {p:usedPlayer, b:newBuffs} = item.onUse({...np, maxHp:effectiveMaxHp}, nb);
      np = {...usedPlayer, maxHp:player.maxHp};
      nb = newBuffs;
    }

    if (item.curePoison) setPoison(0);
    if (item.cureBurn)   setBurn(0);
    if (item.cureBleed)  setBleed(0);
    if (item.cureStun)   setStun(0);
    if (item.cureAll)    { setPoison(0); setBurn(0); setBleed(0); setStun(0); }

    setPlayer(np); setTempBuffs(nb);
    setGameStats(s=>({...s,itemsUsed:{...s.itemsUsed,[item.label]:(s.itemsUsed[item.label]||0)+1}}));
    setInventory(inv=>removeFromInventory(inv, item));
    setSelectingItem(false);
    addLog(`USED ${item.label}!`,"level");

    if (inBattle) {
      // Swift Cure: heals roll wisMod × 10% to skip the enemy's response turn.
      if (item.heal !== undefined && player.wisPerk === "swift" && wisMod > 0 && pct(wisMod * 10)) {
        addLog("✦ SWIFT CURE! THE FOE HESITATES — YOUR TURN AGAIN!", "level");
        return;
      }
      resumeAfterPlayer(applyBuffs(np,nb), enemies);
    }
  }

  // Equip a piece of equipment from inventory. Any item displaced from the slot (or the offhand when
  // the equipped item is two-handed) goes back into inventory. Mid-fight swaps cost the player their
  // turn — the enemy gets a free strike, but the swing uses the newly-equipped gear's stats.
  function handleEquipFromInventory(item, inBattle=false, targetSlot=null) {
    const slot = targetSlot || item.slot;
    if (!canEquipItem(item, equipment, idlePlayer, targetSlot)) {
      addLog(`✖ CAN'T EQUIP ${item.label} — slot conflict.`, "warn");
      setSelectingItem(false);
      return;
    }
    const displaced = [];
    if (slot !== 'ring') {
      if (equipment[slot]) displaced.push(equipment[slot]);
      // 2H weapon evicts the offhand. Only applies for true mainhand swaps (slot === 'weapon').
      if (slot === 'weapon' && item.hand === 'two' && equipment.offhand) displaced.push(equipment.offhand);
    }
    // Build new equipment and inventory synchronously so we can compute the post-swap effective player
    // for the enemy's free strike (otherwise React's pending state update would leave us swinging
    // — i.e. taking — damage based on stale stats).
    const newEquip = (slot === 'ring')
      ? { ...equipment, rings:[...equipment.rings, item] }
      : { ...equipment, [slot]: item, ...(slot==='weapon' && item.hand==='two' ? {offhand:null} : {}) };
    const newInv = displaced.reduce(
      (acc, d) => addToInventory(acc, d),
      removeFromInventory(inventory, item)
    );
    setInventory(newInv);
    setEquipment(newEquip);
    addLog(`⚔ EQUIPPED ${item.label} → ${slot.toUpperCase()}.`, "level");
    displaced.forEach(d => addLog(`📦 ${d.label} → INVENTORY`, "sys"));
    setSelectingItem(false);
    if (inBattle && enemies.length && enemies.some(e => e && e.hp > 0)) {
      addLog("⏳ GEAR SWAP — ENEMY GETS A FREE STRIKE!", "warn");
      const newEp = getEffectivePlayer(player, newEquip, tempBuffs);
      resumeAfterPlayer(newEp, enemies);
    }
  }

  // Dual-wield helpers — used by ItemButtons and the shop equipment render to decide whether to show
  // a "→ OFFHAND" button alongside the regular "EQUIP" / "BUY" action. Centralised here so the rules
  // stay consistent: item must be a light weapon, player has the Dual Wield perk, the main weapon is
  // light (or empty), and the canEquipItem check passes for the offhand slot.
  const canEquipToOffhand = item =>
    !!item && item.slot === 'weapon' && item.hand === 'light'
    && !!idlePlayer.dualWield
    && (!equipment.weapon || equipment.weapon.hand === 'light')
    && canEquipItem(item, equipment, idlePlayer, 'offhand');
  const equipToOffhand = (item, inBattle) => handleEquipFromInventory(item, inBattle, 'offhand');

  // Sell one of an inventory item at the shop. Stacked items sell one at a time. Half of base cost (rounded down, min 1).
  function handleSellItem(item) {
    const sellValue = Math.max(1, Math.floor((item.cost||0)/2));
    setInventory(inv => removeFromInventory(inv, item));
    setGold(g => g + sellValue);
    addLog(`💰 SOLD ${item.label} (+${sellValue}g)`, "gold");
  }


  // resolveVictory accepts an array of defeated enemies (a single-enemy room passes a length-1 array).
  // XP, gold, and kill-count stats are aggregated per enemy. Fled enemies (Archer) contribute half
  // rewards. Boss kills (only solo, in boss rooms) regenerate the floor + open shop.
  function resolveVictory(defeatedList) {
    const defeated = Array.isArray(defeatedList) ? defeatedList.filter(Boolean) : [defeatedList].filter(Boolean);
    if (defeated.length === 0) { setPhase("win"); return; }
    // Greed Ring stacks multiplicatively with Lucky Coin (CHA 20 perk) — pulling both is the big-coin build.
    const greedMult = (equipment.rings.some(r=>r.id==='ring_greed') ? 1.5 : 1)
                    * (player.chaPerk === "lucky" ? 1.25 : 1);
    let xpGained = 0;
    let goldEarned = 0;
    const killStatsPatch = {};
    for (const e of defeated) {
      const fled    = !!e.fled;
      const baseXp  = e.xp ?? 1;
      const xp      = fled ? Math.ceil(baseXp/2) : baseXp;
      const gMin    = fled ? 1 : e.goldMin;
      const gMax    = fled ? Math.ceil((e.goldMax||2)/2) : e.goldMax;
      const goldRaw = gMin + Math.floor(Math.random()*(gMax-gMin+1));
      xpGained   += xp;
      goldEarned += Math.round(goldRaw * greedMult);
      killStatsPatch[e.name] = (killStatsPatch[e.name]||0) + 1;
    }
    setGold(g => g + goldEarned);
    setGameStats(s => ({
      ...s,
      killCounts: Object.entries(killStatsPatch).reduce(
        (acc, [name, n]) => ({...acc, [name]: (acc[name]||0) + n}),
        {...s.killCounts}
      ),
    }));
    let newXp = xp + xpGained, newLevel = level, nextPlayer = {...player}, didLevel = false;
    if (newXp >= XP_NEEDED) {
      newXp -= XP_NEEDED; newLevel++; didLevel = true;
      const hpRoll = roll(8);
      nextPlayer = {...nextPlayer, hitDice:[...(nextPlayer.hitDice||[8]), hpRoll]};
      const effectiveMax = getEffectivePlayer(nextPlayer, equipment).maxHp;
      const heal = Math.ceil(effectiveMax/2);
      nextPlayer = {...nextPlayer, hp: Math.min(nextPlayer.hp+heal, effectiveMax)};
      setPlayer(nextPlayer);
      addLog(`★ LEVEL UP! LV ${newLevel}! GROWTH DIE: ${hpRoll} · +${heal} HP! ★`, "level");
    }
    setXp(newXp); setLevel(newLevel);
    setTimeout(()=>{
      // Defeat log — single enemy reads natural, multi summarises with "&".
      const names = defeated.map(e => e.name).join(" & ");
      addLog(`${names} DEFEATED! +${goldEarned} 💰`, "gold");
      setRestUsed(false);
      const wasBossFight = defeated.some(e => e.isBoss);
      const roomKey = defeated[0]?.roomKey;
      if (wasBossFight) {
        // Wave 20 boss is the final encounter — defeating it ends the run with the victory screen.
        if (waveNumber >= 20) {
          saveHighScore(gold + goldEarned);
          setEnemies([]);
          setPhase("gamewon");
          return;
        }
        // Boss kill transforms the boss tile into stairs. Player stays put; floor persists until
        // they choose to descend (walk onto the stairs tile or click DESCEND from the HERE strip).
        setFloorRooms(rooms => rooms.map(r => r.isBoss ? {
          ...r,
          isBoss: false,
          descend: true,
          cleared: true,
          enemies: [],
          icon: "⇣",
          label: "STAIRS DOWN",
          desc: "DESCEND TO NEXT FLOOR",
        } : r));
        // "He flees deeper": the Baron retreats a floor after every loss; lieutenants just fall.
        const slainBoss = defeated.find(e => e.isBoss);
        if (slainBoss && slainBoss.emoji === "🐷") {
          addLog(`🐷 BARON VON BACON scrambles downstairs: "STRATEGIC RETREAT! To floor ${waveNumber + 1}!"`, "villain");
        } else if (slainBoss) {
          addLog("✦ Another of the Baron's lieutenants falls. He won't be pleased.", "villain");
        }
        addLog("⇣ STAIRS REVEALED — DESCEND WHEN READY.", "level");
      } else if (roomKey) {
        // Mark the room cleared; the rest of the floor persists.
        setFloorRooms(rooms => rooms.map(r => r.key === roomKey ? {...r, cleared:true} : r));
      }
      if (wasBossFight) {
        const avail = getAvailableEquipment(equipment);
        const extraEquip = (nextPlayer.chaPerk === "silver") ? 1 : 0;
        setShopItems([...pickRandom(SHOP_CONSUMABLES,3), ...pickShopEquipment(avail, Math.min(2+extraEquip,avail.length))]);
        setShopUnlocked(true);
      }
      didLevel ? triggerLevelUp(newLevel, nextPlayer) : setPhase("win");
    }, 200);

  function buyItem(item, targetSlot=null) {
    const cost = getShopCost(item,idlePlayer);
    if (gold<cost) return;
    if (!canEquipItem(item, equipment, idlePlayer, targetSlot)) return;
    setGold(g=>g-cost);
    if (item.slot) {
      const slot = targetSlot || item.slot;
      // Anything displaced from a slot moves to inventory so the player can re-equip or sell later.
      const displaced = [];
      if (slot !== 'ring') {
        if (equipment[slot]) displaced.push(equipment[slot]);
        // Equipping a 2H weapon also evicts the offhand (shield or off-weapon).
        if (slot === 'weapon' && item.hand === 'two' && equipment.offhand) {
          displaced.push(equipment.offhand);
        }
      }
      if (displaced.length) {
        setInventory(inv => displaced.reduce((acc, d) => addToInventory(acc, d), inv));
        displaced.forEach(d => addLog(`📦 ${d.label} → INVENTORY`, "sys"));
      }
      setEquipment(eq=>{
        if (slot==='ring') return {...eq,rings:[...eq.rings,item]};
        const next = {...eq,[slot]:item};
        if (slot==='weapon' && item.hand==='two') next.offhand = null;
        return next;
      });
      // Filter the shop. For dual-equip purchases we used a `targetSlot` of 'offhand' but the item's
      // canonical slot is 'weapon' — that's what we match against in the shop list.
      setShopItems(prev=>prev.filter(i=>i.id!==item.id&&(item.slot==='ring'||i.slot!==item.slot)));
    } else {
      // Consumables stay in the shop after purchase so the player can stock up on antidotes, potions etc.
      setInventory(inv=>addToInventory(inv, item));
    }
  }

                          <div style={{ fontSize:9, color:e.isBoss?"#6a5000":"#3a2010", marginTop:4 }}>

                            {e.poisonOnHit  && <span style={{color:"#80d050"}}> ☠</span>}
                            {e.burnsOnHit   && <span style={{color:"#e08020"}}> 🔥</span>}
                            {e.stunsOnHit   && <span style={{color:"#80d0f8"}}> 💫</span>}
                            {e.healsAllies  && <span style={{color:"#f880e0"}}> ✦</span>}
                            {e.enraged      && <span style={{color:"#e04040"}}> ⚡</span>}
                            {e.poison>0     && <span style={{color:"#80d050"}}> ☠</span>}
                            {e.burn>0       && <span style={{color:"#e08020"}}> 🔥</span>}
                            {e.bleed>0      && <span style={{color:"#e04040"}}> 🩸</span>}
                          </div>
                        </div>

                    })}
                  </div>
                </div>
              </div>

              <div style={{ display:"flex", gap:12, marginBottom:14 }}>
                <TileBox highlight={phase==="player"} style={{ flex:1 }}>

                    <div style={{ fontSize:10, color:"#b8a840", marginBottom:10 }}>{player.emoji} {player.name}</div>
                    <Hearts hp={ep.hp} maxHp={ep.maxHp} />

                      HIT {ep.hitChance}% · CRT {ep.critChance}%
                      {ep.dodgeChance>0       && <> · DOD {ep.dodgeChance}%</>}
                      {player.counterChance>0 && <> · CTR {player.counterChance}%</>}

                    {burn>0   && <div style={{ fontSize:10, color:"#e08020", marginTop:2 }}>🔥 BURNING {burn} TURNS</div>}
                    {bleed>0  && <div style={{ fontSize:10, color:"#e04040", marginTop:2 }}>🩸 BLEEDING {bleed} TURNS · +50% DMG</div>}
                    {tempBuffs.length>0 && (
                      <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:8 }}>
                        {tempBuffs.map((b,i)=>(
                          <span key={i} style={{ fontSize:10, color:"#50d850", background:"#0a1a0a", border:"1px solid #205020", padding:"2px 5px" }}>
                            +{b.val} {STAT_LABEL[b.stat]} {b.battles}B
                          </span>
                        ))}
                      </div>
                    )}
                  </div>
                </TileBox>

                <div style={{ display:"flex", alignItems:"center", color:"#2e2808", fontSize:9 }}>VS</div>

                <TileBox highlight={phase==="enemy"} style={{ flex:1 }}>

                        <div key={i}

                               cursor: (!isDead && phase==="player" && i!==targetIdx) ? "pointer" : "default",
                               opacity: isDead ? 0.4 : 1,
                               padding: enemies.length>1 ? 6 : 0,
                               marginBottom: i < enemies.length-1 ? 10 : 0,
                               border: isTarget && enemies.length>1 ? "2px solid #f8e000" : "2px solid transparent",
                               borderRadius: 4,
                             }}>
                          <div style={{ fontSize:10, color: isDead ? "#604030" : e.isBoss ? "#f8e000" : "#e07050", marginBottom:4 }}>
                            {isDead ? "💀 " : ""}{e.emoji} {e.name}{enemies.length>1 && isTarget && <span style={{ color:"#f8e000", fontSize:10 }}> ◀ TARGET</span>}
                          </div>
                          {e.niche        && !isDead && <div style={{ fontSize:10, color:"#604030", marginBottom:8 }}>[{e.niche}]</div>}
                          {e.immuneToCrit && !isDead && <div style={{ fontSize:10, color:"#80b8e8", marginBottom:4 }}>🛡 CRIT IMMUNE</div>}
                          {e.poisonOnHit  && !isDead && <div style={{ fontSize:10, color:"#80d050", marginBottom:4 }}>☠ POISONS ON HIT</div>}
                          {e.burnsOnHit   && !isDead && <div style={{ fontSize:10, color:"#e08020", marginBottom:4 }}>🔥 BURNS ON HIT</div>}
                          {e.stunsOnHit   && !isDead && <div style={{ fontSize:10, color:"#80d0f8", marginBottom:4 }}>💫 STUNS ON HIT (30%)</div>}
                          {e.healsAllies  && !isDead && <div style={{ fontSize:10, color:"#f880e0", marginBottom:4 }}>✦ HEALS ALLIES · KILL FIRST</div>}
                          {e.enraged      && !isDead && <div style={{ fontSize:10, color:"#e04040", marginBottom:4 }}>⚡ ENRAGED! ATK {e.attack}</div>}
                          {!isDead && <Hearts hp={e.hp} maxHp={e.maxHp} />}

                            <div style={{ fontSize:11, color:"#5a4a18", marginTop:8, lineHeight:2.2 }}>

                              HIT {e.hitChance}%{e.dodgeChance>0&&<> · DOD {e.dodgeChance}%</>}

                                <><br /><span style={{color:"#80b8e8"}}>
                                  {statLine(e.attrs)}
                                </span></>
                              )}
                            </div>
                          )}
                          {!isDead && e.poison>0 && <div style={{ fontSize:10, color:"#80d050", marginTop:6 }}>☠ POISONED {e.poison} TURNS</div>}
                          {!isDead && e.burn>0   && <div style={{ fontSize:10, color:"#e08020", marginTop:2 }}>🔥 BURNING {e.burn} TURNS</div>}
                          {!isDead && e.bleed>0  && <div style={{ fontSize:10, color:"#e04040", marginTop:2 }}>🩸 BLEEDING {Math.ceil(e.bleed)} · +{Math.floor(e.bleed)} DMG/HIT</div>}

                <div ref={logRef} style={{ height:130, overflowY:"auto", display:"flex", flexDirection:"column", gap:4 }}>

                </div>
              </TileBox>

              {phase==="perk" && perkOpts.length>0 && (
                <TileBox highlight style={{ padding:18 }}>
                  <div style={{ color:"#f8e000", fontSize:11, marginBottom:6, animation:"blink 0.8s infinite" }}>★ MILESTONE PERK ★</div>
                  <div style={{ color:"#80b8e8", fontSize:9, marginBottom:14, lineHeight:1.8 }}>PICK ONE — IT'S YOURS FOR THE RUN.</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {perkOpts.map(opt=>(
                      <Btn key={opt.id} onClick={()=>pickPerk(opt)} variant="gold">
                        ▶ {opt.label}<br /><span style={{color:"#806010",fontSize:11}}>{opt.desc}</span>
                      </Btn>
                    ))}
                  </div>
                </TileBox>
              )}

              {phase==="wisperk" && (
                <TileBox highlight style={{ padding:18 }}>
                  <div style={{ color:"#80b8e8", fontSize:11, marginBottom:6, animation:"blink 0.8s infinite" }}>✦ SAVVY AWAKENS ✦</div>
                  <div style={{ color:"#a0a0c0", fontSize:9, marginBottom:14, lineHeight:1.8 }}>SAVVY 20 REACHED — CHOOSE A PATH. SCALES WITH FURTHER SAVVY.</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {WIS_PERKS.map(opt=>(
                      <Btn key={opt.id} onClick={()=>pickWisPerk(opt)} variant="stat">
                        ▶ {opt.label}<br /><span style={{color:"#405870",fontSize:11}}>{opt.desc}</span>
                      </Btn>
                    ))}
                  </div>
                </TileBox>
              )}

              {phase==="statperk" && milestoneStat && STAT_PERKS[milestoneStat] && (
                <TileBox highlight style={{ padding:18 }}>
                  <div style={{ color:"#f8e000", fontSize:11, marginBottom:6, animation:"blink 0.8s infinite" }}>✦ {STAT_FULL[milestoneStat]||milestoneStat.toUpperCase()} 20 ✦</div>
                  <div style={{ color:"#b8a840", fontSize:9, marginBottom:14, lineHeight:1.8 }}>{STAT_FULL[milestoneStat]||milestoneStat.toUpperCase()} HAS REACHED 20 — CHOOSE A MILESTONE PERK (LOCKED IN FOR THIS RUN).</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {STAT_PERKS[milestoneStat].map(opt=>(
                      <Btn key={opt.id} onClick={()=>pickStatPerk(opt)} variant="gold">
                        ▶ {opt.label}<br /><span style={{color:"#806010",fontSize:11}}>{opt.desc}</span>
                      </Btn>
                    ))}
                  </div>
                </TileBox>
              )}

              {phase==="levelup" && (
                <TileBox highlight style={{ padding:18 }}>
                  <div style={{ color:"#f8e000", fontSize:10, marginBottom:6 }}>★ LEVEL UP! SPEND POINTS</div>
                  <div style={{ color:"#5a4a18", fontSize:11, marginBottom:10 }}>ONE POINT = +1 STAT · LEAVE ANY UNSPENT</div>
                  <div style={{ background:"#120c06", border:"2px solid #4a371d", borderRadius:10, padding:"7px 11px", marginBottom:10, fontSize:10, color:"#a3daf6", textAlign:"center" }}>
                    POINTS REMAINING · {unspentPoints}
                  </div>
                  <div style={{ fontSize:10, color:"#5a4a18", marginBottom:10, lineHeight:1.8 }}>
                    {statLine(player)}
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {levelUpOpts.map(opt=>{
                      const curScore = player[opt.id];
                      const disabled = unspentPoints <= 0;
                      return (
                        <Btn key={opt.id} onClick={()=>pickStat(opt)} variant="stat" disabled={disabled}>
                          ▶ {opt.label} <span style={{color:"#405870",fontSize:11}}>({curScore} → {curScore+1})</span>
                          <br /><span style={{color:"#405870",fontSize:11}}>NOW: {statEffectLine(opt.id, curScore, {level, hitDice:player.hitDice})}</span>
                          <br /><span style={{color:"#608060",fontSize:11}}>NEXT: {statEffectLine(opt.id, curScore+1, {level, hitDice:player.hitDice})}</span>
                        </Btn>
                      );
                    })}
                  </div>
                  {(() => {
                    const spells = player.spells || {};
                    // Learnable: not yet known AND meets the base prereq.
                    const learnable = PLAYER_SPELLS.filter(s => !spells[s.id] && (player[s.stat] || 0) >= s.req);
                    // Upgradable: already known AND meets the next-level prereq (req + currentLevel).
                    const upgradable = PLAYER_SPELLS.filter(s => {
                      const lvl = spells[s.id] || 0;
                      return lvl >= 1 && (player[s.stat] || 0) >= s.req + lvl;
                    });
                    if (learnable.length === 0 && upgradable.length === 0) return null;
                    return (
                      <div style={{ marginTop:12, paddingTop:10, borderTop:"1px solid #2e2808" }}>
                        {upgradable.length > 0 && (
                          <>
                            <div style={{ fontSize:11, color:"#80b8e8", marginBottom:8 }}>✦ UPGRADE A SPELL</div>
                            <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:learnable.length>0?14:0 }}>
                              {upgradable.map(sp => {
                                const cur = spells[sp.id];
                                const next = cur + 1;
                                const canAfford = unspentPoints >= sp.cost;
                                return (
                                  <Btn key={`up_${sp.id}`} onClick={()=>upgradeSpell(sp)} variant="stat" disabled={!canAfford}>
                                    {sp.emoji} {sp.name} <span style={{color:"#80b8e8",fontSize:11}}>LV {cur} → LV {next}</span> <span style={{color:"#806030",fontSize:11}}>(COST {sp.cost})</span>
                                    <br /><span style={{color:"#608060",fontSize:10}}>+1 {sp.type==="heal"?"HEAL":sp.type==="control"?"TURN":"DMG"}</span>
                                  </Btn>
                                );
                              })}
                            </div>
                          </>
                        )}
                        {learnable.length > 0 && (
                          <>
                            <div style={{ fontSize:11, color:"#80b8e8", marginBottom:8 }}>✦ LEARN A SPELL (instead of a stat point)</div>
                            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                              {learnable.map(sp => {
                                const canAfford = unspentPoints >= sp.cost;
                                return (
                                  <Btn key={sp.id} onClick={()=>pickSpell(sp)} variant="stat" disabled={!canAfford}>
                                    {sp.emoji} {sp.name} <span style={{color:"#806030",fontSize:11}}>(COST {sp.cost})</span>
                                    <br /><span style={{color:"#405870",fontSize:11}}>{sp.desc}</span>
                                    <br /><span style={{color:"#608060",fontSize:10}}>REQ {sp.stat.slice(0,3).toUpperCase()} {sp.req}+</span>
                                  </Btn>
                                );
                              })}
                            </div>
                          </>
                        )}
                      </div>
                    );
                  })()}
                  <div style={{ marginTop:12 }}>
                    <Btn onClick={finishLevelUp} variant="neutral">▶ DONE{unspentPoints>0 && <span style={{color:"#806030",fontSize:11}}> ({unspentPoints} BANKED)</span>}</Btn>
                  </div>
                </TileBox>
              )}

              {phase==="win" && (
                <TileBox style={{ textAlign:"center", padding:20 }}>
                  <div style={{ color:"#f8e000", fontSize:12, marginBottom:16, animation:"blink 1s infinite" }}>★ VICTORY! ★</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {shopUnlocked && <Btn onClick={()=>{ setShopUnlocked(false); setPhase("shop"); }} variant="shop">🏪 ENTER SHOP</Btn>}
                    <Btn onClick={()=>setPhase("idle")} variant="neutral">▶ EXPLORE DUNGEON</Btn>
                    {inventory.length>0 && (
                      <>
                        <Btn onClick={()=>setSelectingItem(s=>!s)} variant="shop">🎒 USE ITEM  ({inventory.reduce((s,i)=>s+(i.count||1),0)} in bag)</Btn>
                        {selectingItem && <ItemButtons items={inventory} onUse={handleUseItem} onEquipOffhand={equipToOffhand} canEquipOffhand={canEquipToOffhand} inBattle={false} />}
                        {selectingItem && <Btn onClick={()=>setSelectingItem(false)} variant="flee">✕ CANCEL</Btn>}
                      </>
                    )}
                    <Btn onClick={()=>{ setSelectedSlot(null); setEquipOpen(true); maybeHint("gear"); }} variant="stat">🧍 VIEW GEAR</Btn>
                    <Btn onClick={enterRest} variant="flee">🏕  MAKE CAMP  (HEAL ALL)</Btn>
                  </div>
                </TileBox>
              )}

              {phase==="lose" && (
                <TileBox style={{ textAlign:"center", padding:20 }}>
                  <div style={{ color:"#e04040", fontSize:12, marginBottom:16, animation:"blink 0.8s infinite" }}>GAME OVER</div>
                  <Btn onClick={restart} variant="attack">▶ TRY AGAIN</Btn>
                </TileBox>
              )}

              {phase==="player" && (
                <TileBox>
                  {selectingItem ? (
                    <>
                      <div style={{ fontSize:11, color:"#c080f8", marginBottom:12 }}>🎒 USE WHICH ITEM?</div>
                      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                        <ItemButtons items={inventory} onUse={handleUseItem} onEquipOffhand={equipToOffhand} canEquipOffhand={canEquipToOffhand} inBattle={true} />
                        <Btn onClick={()=>setSelectingItem(false)} variant="flee">✕ CANCEL</Btn>
                      </div>
                    </>
                  ) : selectingSpell ? (
                    <>
                      <div style={{ fontSize:11, color:"#80b8e8", marginBottom:12 }}>✦ CAST WHICH SPELL?</div>
                      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                        {Object.keys(player.spells||{}).map(id => {
                          const sp = PLAYER_SPELLS.find(s => s.id === id);
                          if (!sp) return null;
                          const lvl = player.spells[id] || 1;
                          return (
                            <Btn key={sp.id} onClick={()=>handleCastSpell(sp)} variant="stat">
                              {sp.emoji} {sp.name} <span style={{color:"#80b8e8",fontSize:11}}>LV {lvl}</span><br />
                              <span style={{color:"#405870",fontSize:11}}>{sp.desc}</span>
                            </Btn>
                          );
                        })}
                        <Btn onClick={()=>setSelectingSpell(false)} variant="flee">✕ CANCEL</Btn>
                      </div>
                    </>
                  ) : (
                    <>
                      <div style={{ fontSize:11, color:"#5a4a18", marginBottom:12 }}>▶ CHOOSE ACTION</div>
                      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                        <Btn onClick={()=>handleAction("attack")} variant="attack">
                          ⚔  ATTACK
                          {ep.doubleStrikeChance>0 && <span style={{color:"#e0a040",fontSize:9}}> ({ep.doubleStrikeChance}% DBL{ep.tripleStrikeChance>0?` → ${ep.tripleStrikeChance}% TPL`:""})</span>}
                        </Btn>
                        {Object.keys(player.spells||{}).length>0 && <Btn onClick={()=>{ maybeHint("magic"); setSelectingSpell(true); }} variant="stat">✦ CAST SPELL ({Object.keys(player.spells||{}).length} KNOWN)</Btn>}
                        {inventory.length>0 && <Btn onClick={()=>setSelectingItem(true)} variant="shop">🎒 USE ITEM  ({inventory.reduce((s,i)=>s+(i.count||1),0)} in bag)</Btn>}
                        <Btn onClick={()=>handleAction("flee")} variant="flee">🏃  FLEE</Btn>
                      </div>
                    </>
                  )}
                </TileBox>
              )}

              {phase==="enemy" && (
                <TileBox style={{ textAlign:"center", padding:16 }}>
                  <div style={{ color:"#e07050", fontSize:10, animation:"blink 0.6s infinite" }}>ENEMY TURN...</div>
                </TileBox>
              )}
            </>
          )}

          {phase==="shop" && (
            <TileBox highlight style={{ padding:20 }}>
              <div style={{ fontSize:13, color:"#c080f8", marginBottom:4, textAlign:"center" }}>🏪 MERCHANT</div>
              <div style={{ fontSize:11, color:"#604090", marginBottom:10, textAlign:"center" }}>💰 {gold} GOLD</div>
              <div style={{ background:"#06030f", border:"2px solid #3a1860", padding:"12px 8px", marginBottom:16, display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                <div style={{ fontSize:10, color:"#503870", letterSpacing:"0.1em" }}>EQUIPPED GEAR</div>
                <BodyLayout equip={equipment} cellSize={34} />
              </div>
              {shopItems.filter(i=>i.slot).length>0 && (
                <>
                  <div style={{ fontSize:10, color:"#806030", letterSpacing:"0.1em", marginBottom:8 }}>⚙ EQUIPMENT</div>
