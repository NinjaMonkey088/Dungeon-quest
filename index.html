                      {stun>0   && <span style={{color:"#80d0f8"}}> 💫</span>}
                      {poison>0 && <span style={{color:"#80d050"}}> ☠</span>}
                      {burn>0   && <span style={{color:"#e08020"}}> 🔥</span>}
                      {bleed>0  && <span style={{color:"#e04040"}}> 🩸</span>}
                    </div>
                  </div>
                  <div style={{ color:"#242408", fontSize:10, paddingBottom:22, flexShrink:0 }}>⚡</div>
                  <div style={{ flex:1, display:"flex", gap:8, justifyContent:"center", alignItems:"flex-end" }}>
                    {enemies.map((e, i) => {
                      if (!e) return null;
                      const isDead   = e.hp <= 0;
                      const isTarget = i === targetIdx && !isDead;
                      // Only animate the targeted enemy (the one being attacked / focused).
                      const anim = isTarget ? enemyAnim : 'none';
                      const onClick = (!isDead && phase === "player" && i !== targetIdx)
                        ? () => { setTargetIdx(i); addLog(`▶ NOW TARGETING ${e.name}.`, "sys"); }
                        : undefined;
                      return (
                        <div key={i} onClick={onClick}
                             style={{
                               textAlign:"center",
                               cursor: onClick ? "pointer" : "default",
                               opacity: isDead ? 0.3 : 1,
                               padding:"4px 6px",
                               border: isTarget ? "2px solid #f8e000" : "2px solid transparent",
                               borderRadius:6,
                               background: isTarget ? "rgba(248,224,0,0.06)" : "transparent",
                             }}>
                          <div style={{ fontSize:e.isBoss?54:44, lineHeight:1, display:"inline-block", animation:anim }}>
                            {isDead ? "💀" : e.emoji}
                          </div>
                          <div style={{ height:2, background:"#1c2210", margin:"6px auto 0", width:56 }} />
                          <div style={{ fontSize:6, color:e.isBoss?"#6a5000":"#3a2010", marginTop:4 }}>
                            {e.name}
                            {e.immuneToCrit && <span style={{color:"#80b8e8"}}> 🛡</span>}
                            {e.poisonOnHit  && <span style={{color:"#80d050"}}> ☠</span>}
                            {e.burnsOnHit   && <span style={{color:"#e08020"}}> 🔥</span>}
                            {e.stunsOnHit   && <span style={{color:"#80d0f8"}}> 💫</span>}
                            {e.healsAllies  && <span style={{color:"#f880e0"}}> ✦</span>}
                            {e.enraged      && <span style={{color:"#e04040"}}> ⚡</span>}
                            {e.poison>0     && <span style={{color:"#80d050"}}> ☠</span>}
                            {e.burn>0       && <span style={{color:"#e08020"}}> 🔥</span>}
                            {e.bleed>0      && <span style={{color:"#e04040"}}> 🩸</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

              <div style={{ display:"flex", gap:12, marginBottom:14 }}>
                <TileBox highlight={phase==="player"} style={{ flex:1 }}>
                  <div className={shaking==="player"?"shake":""}>
                    <div style={{ fontSize:10, color:"#b8a840", marginBottom:10 }}>{player.emoji} {player.name}</div>
                    <Hearts hp={ep.hp} maxHp={ep.maxHp} />
                    {tempHp>0 && <div style={{ fontSize:7, color:"#80b8e8", marginTop:4 }}>✦ TEMP HP +{tempHp}</div>}
                    <div style={{ fontSize:8, color:"#5a4a18", marginTop:8, lineHeight:2.2 }}>
                      ATK {dmgRange(ep.atkDmg,ep.dieIdx)} · ARM {ep.armor} · SPD {ep.speed}<br />
                      HIT {ep.hitChance}% · CRT {ep.critChance}%
                      {ep.dodgeChance>0       && <> · DOD {ep.dodgeChance}%</>}
                      {player.counterChance>0 && <> · CTR {player.counterChance}%</>}
                      {" · "}{getDie(ep.dieIdx).label}
                    </div>
                    {(equipment.rings.length>0||BODY_SLOTS.some(s=>equipment[s.key])) && (
                      <div style={{ marginTop:6 }}><EquipDisplay equip={equipment} /></div>
                    )}
                    {stun>0   && <div style={{ fontSize:7, color:"#80d0f8", marginTop:6 }}>💫 STUNNED · TURN SKIPPED</div>}
                    {poison>0 && <div style={{ fontSize:7, color:"#80d050", marginTop:2 }}>☠ POISONED {poison} TURNS</div>}
                    {burn>0   && <div style={{ fontSize:7, color:"#e08020", marginTop:2 }}>🔥 BURNING {burn} TURNS</div>}
                    {bleed>0  && <div style={{ fontSize:7, color:"#e04040", marginTop:2 }}>🩸 BLEEDING {bleed} TURNS · +50% DMG</div>}
                    {tempBuffs.length>0 && (
                      <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:8 }}>
                        {tempBuffs.map((b,i)=>(
                          <span key={i} style={{ fontSize:7, color:"#50d850", background:"#0a1a0a", border:"1px solid #205020", padding:"2px 5px" }}>
                            +{b.val} {STAT_LABEL[b.stat]} {b.battles}B
                          </span>
                        ))}
                      </div>
                    )}
                  </div>
                </TileBox>

                <div style={{ display:"flex", alignItems:"center", color:"#2e2808", fontSize:9 }}>VS</div>

                <TileBox highlight={phase==="enemy"} style={{ flex:1 }}>
                  <div className={shaking==="enemy"?"shake":""}>
                    {enemies.map((e, i) => {
                      if (!e) return null;
                      const isDead = e.hp <= 0;
                      const isTarget = i === targetIdx && !isDead;
                      return (
                        <div key={i}
                             onClick={(!isDead && phase==="player" && i!==targetIdx) ? () => { setTargetIdx(i); addLog(`▶ NOW TARGETING ${e.name}.`, "sys"); } : undefined}
                             style={{
                               cursor: (!isDead && phase==="player" && i!==targetIdx) ? "pointer" : "default",
                               opacity: isDead ? 0.4 : 1,
                               padding: enemies.length>1 ? 6 : 0,
                               marginBottom: i < enemies.length-1 ? 10 : 0,
                               border: isTarget && enemies.length>1 ? "2px solid #f8e000" : "2px solid transparent",
                               borderRadius: 4,
                             }}>
                          <div style={{ fontSize:10, color: isDead ? "#604030" : e.isBoss ? "#f8e000" : "#e07050", marginBottom:4 }}>
                            {isDead ? "💀 " : ""}{e.emoji} {e.name}{enemies.length>1 && isTarget && <span style={{ color:"#f8e000", fontSize:7 }}> ◀ TARGET</span>}
                          </div>
                          {e.niche        && !isDead && <div style={{ fontSize:7, color:"#604030", marginBottom:8 }}>[{e.niche}]</div>}
                          {e.immuneToCrit && !isDead && <div style={{ fontSize:7, color:"#80b8e8", marginBottom:4 }}>🛡 CRIT IMMUNE</div>}
                          {e.poisonOnHit  && !isDead && <div style={{ fontSize:7, color:"#80d050", marginBottom:4 }}>☠ POISONS ON HIT</div>}
                          {e.burnsOnHit   && !isDead && <div style={{ fontSize:7, color:"#e08020", marginBottom:4 }}>🔥 BURNS ON HIT</div>}
                          {e.stunsOnHit   && !isDead && <div style={{ fontSize:7, color:"#80d0f8", marginBottom:4 }}>💫 STUNS ON HIT (30%)</div>}
                          {e.healsAllies  && !isDead && <div style={{ fontSize:7, color:"#f880e0", marginBottom:4 }}>✦ HEALS ALLIES · KILL FIRST</div>}
                          {e.enraged      && !isDead && <div style={{ fontSize:7, color:"#e04040", marginBottom:4 }}>⚡ ENRAGED! ATK {e.attack}</div>}
                          {!isDead && <Hearts hp={e.hp} maxHp={e.maxHp} />}
                          {!isDead && (
                            <div style={{ fontSize:8, color:"#5a4a18", marginTop:8, lineHeight:2.2 }}>
                              ATK {dmgRange(e.attack,{count:1,size:3})} · ARM {e.armor} · SPD {e.speed||10}{e.surprised && <span style={{color:"#e08020"}}> 💢</span>}<br />
                              HIT {e.hitChance}%{e.dodgeChance>0&&<> · DOD {e.dodgeChance}%</>}
                              <span style={{color:"#a08020"}}> · 💰{e.goldMin}-{e.goldMax}</span>
                            </div>
                          )}
                          {!isDead && e.poison>0 && <div style={{ fontSize:7, color:"#80d050", marginTop:6 }}>☠ POISONED {e.poison} TURNS</div>}
                          {!isDead && e.burn>0   && <div style={{ fontSize:7, color:"#e08020", marginTop:2 }}>🔥 BURNING {e.burn} TURNS</div>}
                          {!isDead && e.bleed>0  && <div style={{ fontSize:7, color:"#e04040", marginTop:2 }}>🩸 BLEEDING {Math.ceil(e.bleed)} · +{Math.floor(e.bleed)} DMG/HIT</div>}
                        </div>
                      );
                    })}
                  </div>
                </TileBox>
              </div>

              <TileBox style={{ marginBottom:14 }}>
                <div ref={logRef} style={{ height:130, overflowY:"auto", display:"flex", flexDirection:"column", gap:4 }}>
                  {log.map((e,i)=><div key={i} style={{ fontSize:9, color:LOG_COLORS[e.type]||"#b8a840", lineHeight:1.9 }}>▷ {e.text}</div>)}
                </div>
              </TileBox>

              {phase==="perk" && perkOpts.length>0 && (
                <TileBox highlight style={{ padding:18 }}>
                  <div style={{ color:"#f8e000", fontSize:11, marginBottom:6, animation:"blink 0.8s infinite" }}>★ MILESTONE PERK ★</div>
                  <div style={{ color:"#80b8e8", fontSize:9, marginBottom:14, lineHeight:1.8 }}>PICK ONE — IT'S YOURS FOR THE RUN.</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {perkOpts.map(opt=>(
                      <Btn key={opt.id} onClick={()=>pickPerk(opt)} variant="gold">
                        ▶ {opt.label}<br /><span style={{color:"#806010",fontSize:8}}>{opt.desc}</span>
                      </Btn>
                    ))}
                  </div>
                </TileBox>
              )}

              {phase==="wisperk" && (
                <TileBox highlight style={{ padding:18 }}>
                  <div style={{ color:"#80b8e8", fontSize:11, marginBottom:6, animation:"blink 0.8s infinite" }}>✦ WISDOM AWAKENS ✦</div>
                  <div style={{ color:"#a0a0c0", fontSize:9, marginBottom:14, lineHeight:1.8 }}>WIS 20 REACHED — CHOOSE A PATH. SCALES WITH FURTHER WIS.</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {WIS_PERKS.map(opt=>(
                      <Btn key={opt.id} onClick={()=>pickWisPerk(opt)} variant="stat">
                        ▶ {opt.label}<br /><span style={{color:"#405870",fontSize:8}}>{opt.desc}</span>
                      </Btn>
                    ))}
                  </div>
                </TileBox>
              )}

              {phase==="levelup" && (
                <TileBox highlight style={{ padding:18 }}>
                  <div style={{ color:"#f8e000", fontSize:10, marginBottom:6 }}>★ LEVEL UP! SPEND POINTS</div>
                  <div style={{ color:"#5a4a18", fontSize:8, marginBottom:10 }}>ONE POINT = +1 STAT · LEAVE ANY UNSPENT</div>
                  <div style={{ background:"#08080a", border:"2px solid #2e2808", padding:"6px 10px", marginBottom:10, fontSize:9, color:"#80b8e8", textAlign:"center" }}>
                    POINTS REMAINING · {unspentPoints}
                  </div>
                  <div style={{ fontSize:7, color:"#5a4a18", marginBottom:10, lineHeight:1.8 }}>
                    STR {player.strength} · DEX {player.dexterity} · CON {player.constitution} · WIS {player.wisdom} · CHA {player.charisma} · INT {player.intelligence}
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {levelUpOpts.map(opt=>{
                      const curScore = player[opt.id];
                      const disabled = unspentPoints <= 0;
                      return (
                        <Btn key={opt.id} onClick={()=>pickStat(opt)} variant="stat" disabled={disabled}>
                          ▶ {opt.label} <span style={{color:"#405870",fontSize:8}}>({curScore} → {curScore+1})</span>
                          <br /><span style={{color:"#405870",fontSize:8}}>NOW: {statEffectLine(opt.id, curScore)}</span>
                          <br /><span style={{color:"#608060",fontSize:8}}>NEXT: {statEffectLine(opt.id, curScore+1)}</span>
                        </Btn>
                      );
                    })}
                    <Btn onClick={finishLevelUp} variant="neutral">▶ DONE{unspentPoints>0 && <span style={{color:"#806030",fontSize:8}}> ({unspentPoints} BANKED)</span>}</Btn>
                  </div>
                </TileBox>
              )}

              {phase==="win" && (
                <TileBox style={{ textAlign:"center", padding:20 }}>
                  <div style={{ color:"#f8e000", fontSize:12, marginBottom:16, animation:"blink 1s infinite" }}>★ VICTORY! ★</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {shopUnlocked && <Btn onClick={()=>{ setShopUnlocked(false); setPhase("shop"); }} variant="shop">🏪 ENTER SHOP</Btn>}
                    <Btn onClick={()=>setPhase("idle")} variant="neutral">▶ EXPLORE DUNGEON</Btn>
                    {inventory.length>0 && (
                      <>
                        <Btn onClick={()=>setSelectingItem(s=>!s)} variant="shop">🎒 USE ITEM  ({inventory.reduce((s,i)=>s+(i.count||1),0)} in bag)</Btn>
                        {selectingItem && <ItemButtons items={inventory} onUse={handleUseItem} inBattle={false} />}
                        {selectingItem && <Btn onClick={()=>setSelectingItem(false)} variant="flee">✕ CANCEL</Btn>}
                      </>
                    )}
                    <Btn onClick={()=>{ setSelectedSlot(null); setEquipOpen(true); }} variant="stat">🧍 VIEW GEAR</Btn>
                    <Btn onClick={enterRest} variant="flee">🏕  MAKE CAMP  (HEAL ALL)</Btn>
                  </div>
                </TileBox>
              )}

              {phase==="lose" && (
                <TileBox style={{ textAlign:"center", padding:20 }}>
                  <div style={{ color:"#e04040", fontSize:12, marginBottom:16, animation:"blink 0.8s infinite" }}>GAME OVER</div>
                  <Btn onClick={restart} variant="attack">▶ TRY AGAIN</Btn>
                </TileBox>
              )}

              {phase==="player" && (
                <TileBox>
                  {selectingItem ? (
                    <>
                      <div style={{ fontSize:8, color:"#c080f8", marginBottom:12 }}>🎒 USE WHICH ITEM?</div>
                      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                        <ItemButtons items={inventory} onUse={handleUseItem} inBattle={true} />
                        <Btn onClick={()=>setSelectingItem(false)} variant="flee">✕ CANCEL</Btn>
                      </div>
                    </>
                  ) : (
                    <>
                      <div style={{ fontSize:8, color:"#5a4a18", marginBottom:12 }}>▶ CHOOSE ACTION</div>
                      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                        <Btn onClick={()=>handleAction("attack")} variant="attack">
                          ⚔  ATTACK
                          {ep.tripleStrikeChance>0                               && <span style={{color:"#e0a040",fontSize:9}}> (DBL + {ep.tripleStrikeChance}% TPL)</span>}
                          {ep.doubleStrikeChance>=100&&ep.tripleStrikeChance===0 && <span style={{color:"#e0a040",fontSize:9}}> (ALWAYS DBL)</span>}
                          {ep.doubleStrikeChance>0&&ep.doubleStrikeChance<100   && <span style={{color:"#e0a040",fontSize:9}}> ({ep.doubleStrikeChance}% DBL)</span>}
                        </Btn>
                        {inventory.length>0 && <Btn onClick={()=>setSelectingItem(true)} variant="shop">🎒 USE ITEM  ({inventory.reduce((s,i)=>s+(i.count||1),0)} in bag)</Btn>}
                        <Btn onClick={()=>handleAction("flee")} variant="flee">🏃  FLEE</Btn>
                      </div>
                    </>
                  )}
                </TileBox>
              )}

              {phase==="enemy" && (
                <TileBox style={{ textAlign:"center", padding:16 }}>
                  <div style={{ color:"#e07050", fontSize:10, animation:"blink 0.6s infinite" }}>ENEMY TURN...</div>
                </TileBox>
              )}
            </>
          )}

          {phase==="shop" && (
            <TileBox highlight style={{ padding:20 }}>
              <div style={{ fontSize:13, color:"#c080f8", marginBottom:4, textAlign:"center" }}>🏪 MERCHANT</div>
              <div style={{ fontSize:8, color:"#604090", marginBottom:10, textAlign:"center" }}>💰 {gold} GOLD</div>
              <div style={{ background:"#06030f", border:"2px solid #3a1860", padding:"12px 8px", marginBottom:16, display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                <div style={{ fontSize:7, color:"#503870", letterSpacing:"0.1em" }}>EQUIPPED GEAR</div>
                <BodyLayout equip={equipment} cellSize={34} />
              </div>
              {shopItems.filter(i=>i.slot).length>0 && (
                <>
                  <div style={{ fontSize:7, color:"#806030", letterSpacing:"0.1em", marginBottom:8 }}>⚙ EQUIPMENT</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:14 }}>
                    {shopItems.filter(i=>i.slot).map(item=>{
                      const cost = getShopCost(item,idlePlayer);
                      const equipOK = canEquipItem(item, equipment, idlePlayer);
                      let reason = '';
                      if (!equipOK && item.slot==='offhand') {
                        if (equipment.weapon?.hand==='two')                       reason = 'TWO-HANDED WEAPON BLOCKS OFFHAND';
                        else if (item.dieIdx!=null && !idlePlayer.dualWield)      reason = 'NEEDS DUAL WIELD PERK';
                        else if (item.dieIdx!=null && equipment.weapon?.hand!=='light') reason = 'NEEDS LIGHT MAIN WEAPON';
                      }
                      return (
                        <Btn key={item.id} onClick={()=>buyItem(item)} variant="shop" disabled={gold<cost || !equipOK}>
                          {item.emoji} {item.label}  <span style={{color:"#f8c840"}}>[{cost}💰]</span>
                          <span style={{color:"#806040",fontSize:7}}> [{item.slot.toUpperCase()}{item.hand?` ${item.hand.toUpperCase()}`:''}]</span><br />
                          <span style={{color:"#503870",fontSize:8}}>{describeItem(item,roomPlayer)}</span>
                          {reason && <><br /><span style={{color:"#e08020",fontSize:7}}>⚠ {reason}</span></>}
                        </Btn>
                      );
                    })}
                  </div>
                </>
              )}
              {shopItems.filter(i=>!i.slot).length>0 && (
                <>
                  <div style={{ fontSize:7, color:"#806030", letterSpacing:"0.1em", marginBottom:8 }}>🧪 CONSUMABLES</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:14 }}>
                    {shopItems.filter(i=>!i.slot).map(item=>{
                      const cost=getShopCost(item,idlePlayer);
                      return (
                        <Btn key={item.id} onClick={()=>buyItem(item)} variant="shop" disabled={gold<cost}>
                          ▶ {item.label}  <span style={{color:"#f8c840"}}>[{cost}💰]</span><br />
                          <span style={{color:"#503870",fontSize:8}}>{describeItem(item,roomPlayer)}</span>
                        </Btn>
                      );
                    })}
                  </div>
                </>
              )}
              {shopItems.length===0 && <div style={{ color:"#604090", fontSize:9, textAlign:"center", padding:12, marginBottom:14 }}>SOLD OUT</div>}
              {inventory.length>0 && (
                <>
                  <div style={{ fontSize:7, color:"#806030", letterSpacing:"0.1em", marginBottom:8 }}>💰 SELL FROM BAG ({inventory.length})</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:14 }}>
                    {inventory.map((item,i)=>{
                      const sellValue = Math.max(1, Math.floor((item.cost||0)/2));
                      const isEquip = !!item.slot;
                      const count = item.count||1;
                      const countTag = count>1 ? ` (×${count})` : '';
                      return (
                        <Btn key={`sell_${i}`} onClick={()=>handleSellItem(item)} variant="gold">
                          {isEquip?'⚔':'▶'} {item.label}{countTag}  <span style={{color:"#f8c840"}}>[+{sellValue}💰]</span><br />
                          <span style={{color:"#806010",fontSize:8}}>{item.desc}</span>
                        </Btn>
                      );
                    })}
                  </div>
                </>
              )}
              <Btn onClick={()=>{ setShopUnlocked(false); setPhase("idle"); }} variant="flee">🚪  BACK TO DUNGEON</Btn>
            </TileBox>
          )}

          {phase==="rest" && (
            <TileBox style={{ textAlign:"center", padding:32 }}>
              <div style={{ fontSize:32, marginBottom:16 }}>🏕️</div>
              <div style={{ color:"#b8a840", fontSize:10, marginBottom:8, lineHeight:2.4 }}>CAMPFIRE LIT<br />WOUNDS MENDED</div>
              <div style={{ color:"#5a4a18", fontSize:8, marginBottom:6, lineHeight:2 }}>
                ENEMIES STILL ROAM THE HALLS
              </div>
              <div style={{ color:"#50c050", fontSize:8, marginBottom:24, lineHeight:2 }}>HP FULLY RESTORED · STATUS CLEARED</div>
              <Btn onClick={()=>{ setPlayer(p=>({...p,hp:getEffectivePlayer(p,equipment).maxHp})); setPoison(0); setBurn(0); setBleed(0); setStun(0); setPhase("idle"); }} variant="neutral">▶ BREAK CAMP</Btn>
            </TileBox>
          )}

          {phase==="idle" && (
            <TileBox style={{ textAlign:"center", padding:28 }}>
              <div style={{ fontSize:34, marginBottom:14 }}>🧝🧭🕯️</div>
              <div style={{ color:"#b8a840", fontSize:10, marginBottom:8, lineHeight:2.4 }}>CHOOSE YOUR PATH</div>
              <div style={{ color:"#3a2e0a", fontSize:7, marginBottom:14, letterSpacing:"0.08em" }}>
                FLOOR {waveNumber} · {clearedFightRooms}/{totalFightRooms} CLEARED
              </div>
              <FloorMap waveNumber={waveNumber} floorRooms={floorRooms} playerPos={playerPos}
                        revealAll={devMode} onEnter={handleRoomEnter} playerEmoji={player.emoji} />
              {/* Selected-tile detail strip — shows the room the player is hovering / standing on.
                  We render the player's current tile by default since touch devices have no hover. */}
              {(() => {
                const here = floorRooms.find(r => r.pos && r.pos.col === playerPos.col && r.pos.row === playerPos.row);
                if (!here) return null;
                const showEnemies = (here.enemyKnown || devMode) && here.enemies && here.enemies.length;
                const preview = showEnemies
                  ? (here.enemies.length === 1
                      ? `${here.enemies[0].emoji} ${here.enemies[0].name}`
                      : here.enemies.map(e => `${e.emoji} ${e.name}`).join(" + "))
                  : null;
                const desc = here.descend ? "STAIRS DOWN · DESCEND TO NEXT FLOOR"
                           : here.cleared ? "ROOM IS EMPTY · YOU MAY MOVE ON"
                           : here.isBoss  ? "BOSS WAITS BEYOND"
                           : here.desc;
                return (
                  <div style={{ background:"#08080a", border:"2px solid #2e2808", padding:"10px 12px", marginBottom:14, textAlign:"left" }}>
                    <div style={{ fontSize:9, color:"#f8e000", marginBottom:6 }}>{here.icon} HERE: {here.label}{here.cleared?" (CLEARED)":""}</div>
                    <div style={{ fontSize:8, color:"#608060", lineHeight:1.8 }}>{desc}</div>
                    {preview && <div style={{ fontSize:8, color:"#e08020", marginTop:4 }}>⚠ {preview}</div>}
                    {!here.cleared && !here.descend && (
                      <div style={{ marginTop:8 }}>
                        <Btn onClick={()=>handleRoomEnter(here)} variant={here.isBoss?"attack":"neutral"}>
                          {here.isBoss?"⚔ FIGHT THE BOSS":"⚔ ENGAGE"}
                        </Btn>
                      </div>
                    )}
                    {here.descend && (
                      <div style={{ marginTop:8 }}>
                        <Btn onClick={()=>handleRoomEnter(here)} variant="stat">⇣ DESCEND</Btn>
                      </div>
                    )}
                  </div>
                );
              })()}
              <div style={{ color:"#3a3010", fontSize:7, marginBottom:14, lineHeight:1.8, textAlign:"center" }}>
                ▷ CLICK A LIT TILE TO MOVE · ?-TILES UNKNOWN · ENGAGE FROM CURRENT TILE
              </div>
              {unspentPoints>0 && (
                <div style={{ background:"#08080a", border:"2px solid #2e2808", padding:"6px 10px", marginBottom:12, fontSize:8, color:"#80b8e8", textAlign:"center" }}>
                  ✦ {unspentPoints} UNSPENT POINTS BANKED · USE ON NEXT LEVEL-UP
                </div>
              )}

              <div style={{ color:"#3a3010", fontSize:8, marginBottom:16, lineHeight:2.2 }}>
                HP {idlePlayer.hp}/{idlePlayer.maxHp} · ARM -{idlePlayer.armor} · ATK {dmgRange(idlePlayer.atkDmg,idlePlayer.dieIdx)} · SPD {idlePlayer.speed}<br />
                HIT {idlePlayer.hitChance}% · DOD {idlePlayer.dodgeChance}% · CRT {idlePlayer.critChance}% · ☠ RES {idlePlayer.poisonResist}%<br />
                STR {roomPlayer.strength} · DEX {roomPlayer.dexterity} · CON {roomPlayer.constitution} · WIS {roomPlayer.wisdom} · CHA {roomPlayer.charisma} · INT {roomPlayer.intelligence}
                {player.counterChance>0 && <><br />CTR {player.counterChance}%</>}
                {player.doubleStrikeChance>=100&&player.tripleStrikeChance===0 && <><br /><span style={{color:"#e0a040"}}>⚔⚔ DOUBLE STRIKE (GUARANTEED)</span></>}
                {player.doubleStrikeChance>0&&player.doubleStrikeChance<100   && <><br /><span style={{color:"#e0a040"}}>⚔⚔ DOUBLE STRIKE {player.doubleStrikeChance}%</span></>}
                {player.tripleStrikeChance>0 && <><br /><span style={{color:"#f8c840"}}>⚔⚔⚔ TRIPLE STRIKE {player.tripleStrikeChance}% (DOUBLE GUARANTEED)</span></>}
                {player.ironWill    && <><br /><span style={{color:"#80d0f8"}}>🛡 IRON WILL READY</span></>}
                {player.armorPierce && <><br /><span style={{color:"#e080f8"}}>💥 ARMOR PIERCE READY</span></>}
                {player.dualWield   && <><br /><span style={{color:"#f8c840"}}>⚔⚔ DUAL WIELD ENABLED</span></>}
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {inventory.length>0 && !selectingItem && (
                  <Btn onClick={()=>setSelectingItem(true)} variant="shop">🎒 USE ITEM  ({inventory.reduce((s,i)=>s+(i.count||1),0)} in bag)</Btn>
                )}
                {selectingItem && (
                  <>
                    <div style={{ fontSize:8, color:"#c080f8", marginTop:4, marginBottom:6 }}>🎒 USE WHICH ITEM?</div>
                    <ItemButtons items={inventory} onUse={handleUseItem} inBattle={false} />
                    <Btn onClick={()=>setSelectingItem(false)} variant="flee">✕ CANCEL</Btn>
                  </>
                )}
                <Btn onClick={()=>{ setSelectedSlot(null); setEquipOpen(true); }} variant="stat">🧍 VIEW GEAR</Btn>
              </div>
              <div style={{ marginTop:18, display:"flex", justifyContent:"center" }}>
                <BodyLayout equip={equipment} cellSize={32} selected={null}
                            onSelect={k=>{ setSelectedSlot(k); setEquipOpen(true); }} />
              </div>

            </TileBox>
          )}

        </div>
      </div>

     {equipOpen && (
  <div style={{ position:"fixed", inset:0, background:"rgba(4,3,1,0.92)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}
       onClick={e=>{ if(e.target===e.currentTarget) setEquipOpen(false); }}>
    <div style={{ width:"100%", maxWidth:580 }}>
      <TileBox highlight style={{ padding:24 }}>
        <div style={{ fontSize:14, color:"#f8e000", textAlign:"center", marginBottom:20, letterSpacing:"0.08em" }}>
          🧍 CHARACTER GEAR
        </div>
        
        <div style={{ display:"flex", flexWrap:"wrap", gap:24, alignItems:"flex-start", justifyContent:"center" }}>
          <BodyLayout equip={equipment} selected={selectedSlot} onSelect={setSelectedSlot} cellSize={48} />

          <div style={{ flex:"1 1 240px", minWidth:240 }}>
            <GearDetail selectedSlot={selectedSlot} equipment={equipment} />

            {/* STATS SECTION - Improved readability */}
            <div style={{ marginTop:28, padding:18, background:"rgba(20,15,5,0.6)", border:"2px solid #3a2f15" }}>
              <div style={{ fontSize:12, color:"#f8e000", marginBottom:14, letterSpacing:"0.1em" }}>CURRENT STATS</div>
              
              <div style={{ fontSize:10.5, lineHeight:2.1, color:"#d4c3a0" }}>
                <div><strong>HP</strong> {ep.hp}/{ep.maxHp} — Health. You die at 0.</div>
                <div><strong>ATK</strong> {dmgRange(ep.atkDmg, ep.dieIdx)} — Base damage before dice.</div>
                <div><strong>ARM</strong> {ep.armor} — Reduces incoming physical damage.</div>
                <div><strong>HIT</strong> {ep.hitChance}% — Chance to land attacks.</div>
                <div><strong>DOD</strong> {ep.dodgeChance}% — Chance to avoid enemy attacks.</div>
                <div><strong>CRT</strong> {ep.critChance}% — Chance for double damage (crits).</div>

                <div style={{marginTop:12, paddingTop:10, borderTop:"1px solid #2e2808"}}>
                  <strong>STR</strong> {ep.strength} — +Damage • +Hit Chance<br />
                  <strong>DEX</strong> {ep.dexterity} — +Dodge • +Crit Chance<br />
                  <strong>CON</strong> {ep.constitution} — +Max HP • +Poison Resist<br />
                  <strong>WIS</strong> {ep.wisdom} — +Room Awareness • +{Math.max(0,abilityMod(ep.wisdom))} HP per Heal{player.wisPerk === "reservoir" ? " • Sage's Reservoir" : player.wisPerk === "swift" ? " • Swift Cure" : ""}<br />
                  <strong>INT</strong> {ep.intelligence} — +Item Identify Chance<br />
                  <strong>CHA</strong> {ep.charisma} — Better shop prices
                </div>

                {(ep.poisonResist > 0 || ep.counterChance > 0 || ep.doubleStrikeChance > 0 || ep.armorPierce) && (
                  <div style={{marginTop:12, paddingTop:10, borderTop:"1px solid #2e2808"}}>
                    {ep.poisonResist > 0 && <div><strong>☠ RESIST</strong> {ep.poisonResist}%</div>}
                    {ep.counterChance > 0 && <div><strong>COUNTER</strong> {ep.counterChance}% — Strike back when hit</div>}
                    {ep.doubleStrikeChance > 0 && <div><strong>⚔ DOUBLE STRIKE</strong> {ep.doubleStrikeChance}% {ep.tripleStrikeChance > 0 ? `(+ ${ep.tripleStrikeChance}% Triple)` : ""}</div>}
                    {ep.armorPierce && <div><strong>💥 ARMOR PIERCE</strong> — Crits ignore enemy armor</div>}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>

        <div style={{ marginTop:24, textAlign:"center" }}>
          <Btn onClick={()=>setEquipOpen(false)} variant="flee">✕ CLOSE GEAR</Btn>
        </div>
      </TileBox>
    </div>
  </div>
)}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
